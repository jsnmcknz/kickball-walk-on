<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- 2026-07-14, Jason: found a documented iOS bug where `maximum-scale`/
     `user-scalable=no` alongside `viewport-fit=cover` throws off
     env(safe-area-inset-*) -- matches exactly what we were seeing (a
     bloated gap below the tab bar on two different standalone-installed
     devices). Dropping them costs nothing: invariant 9 (03-Invariants.md)
     already established iOS has ignored `user-scalable=no` as a meta
     directive since iOS 10 -- `touch-action: manipulation` (CSS, still
     present, untouched) is what actually blocks double-tap-zoom here, not
     this tag. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="__TEAM_NAME__">
<meta name="robots" content="noindex, nofollow">
<title>__TEAM_NAME__ — Walk-On Music</title>
<style>
  :root {
    --bg: #101215;
    --tile: #1d2126;
    --tile-border: #33383e;
    --row-rule: #2c3036;
    --text: #e8eae6;
    --muted: #8f948f;
    --olive: #536840; /* "deep moss" -- active-tab fill, re-derived from --pickle (same hue/sat, darker) when the accent moved to moss (2026-07-06 round 3; was shirt olive #565848, which clashed yellow against the new green) */
    --pickle: #82A167; /* "moss" -- cooler/dimmer than the original #abb163, which read too yellow/bright live (changed 2026-07-06 post-game-1; 4.8:1 on badge text) */
    --badge-text: #2C2E20;
    --olive-label: #D8DBBE;
    --plum-border: #7A5C82;
    --plum-text: #CBA9DD;
    --plum-fill: #4A3C52;
    /* NOW UP card "pop" layer (2026-07-07): the kicker's name + play icon
       in white against the moss/plum card, while labels/captions stay in
       the dark badge-text -- game 1 feedback was that the all-dark card
       text read flat. White on moss is ~2.9:1 -- fine for the display-size
       name, which is why ONLY the name and icon use it. */
    --card-pop: #FFFFFF;
  }
  /* user-select/touch-callout off globally: this is a kiosk soundboard with
     no text entry anywhere, and iOS otherwise treats reorder drags as text-
     selection gestures (blue highlight ranges, loupe, selection handles --
     seen live at game 1, 2026-07-06).
     touch-action: manipulation globally too (2026-07-07): iOS has ignored
     user-scalable=no since iOS 10, so rapid taps anywhere were read as
     double-tap-zoom attempts -- while the gesture recognizer deliberated,
     following taps (e.g. the tab buttons) were silently swallowed until a
     scroll/fidget reset it. manipulation disables double-tap-zoom while
     keeping scroll; .order-tile's touch-action:none still wins on
     specificity for drags. */
  * {
    box-sizing: border-box; -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    touch-action: manipulation;
  }
  html, body {
    /* 100% first as a fallback for browsers without dvh support; 100dvh
       overrides it where available. 2026-07-14, Jason: the meta-tag fix
       alone didn't close the gap -- per docs he found, a static `height:
       100%` can resolve against a stale/cached viewport in iOS standalone
       PWA mode (worse after repeated launches/navigation), where `dvh`
       (dynamic viewport height, iOS 15.4+) is the unit specifically built
       to track the ACTUAL live viewport instead. #app itself still sizes
       off top/bottom insets, not a height value, so this only fixes body's
       own box -- but body's box is what #app's fixed positioning is
       ultimately anchored against in this rendering mode. */
    height: 100%; height: 100dvh;
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-weight: 400; overscroll-behavior-y: contain;
    /* 2026-07-14, Jason (on-device, standalone home-screen app): a screen
       taller than one viewport (e.g. the mid-game lineup editor's full
       roster + full add-grid + done/cancel row) let the WHOLE PAGE drag --
       #app (position:fixed) and its sibling .tabbar visibly moved together,
       revealing content clipped below the physical screen edge, instead of
       only #screen's own overflow-y:auto region scrolling internally as
       intended. overscroll-behavior above only stops scroll from chaining
       to native gestures (pull-to-refresh); it doesn't stop body itself
       from being draggable. Locking body down to the exact viewport (fixed
       + hidden overflow) forces literally all scroll through #screen, which
       is the only element that should ever move. */
    position: fixed; top: 0; left: 0; width: 100%; overflow: hidden;
  }
  button { font-family: inherit; -webkit-appearance: none; appearance: none; cursor: pointer; }

  /* The whole app renders as a rounded card inset from the physical screen
     edges (per the locked mockups), not edge-to-edge. Using fixed
     positioning with all four insets means the box's size is computed
     automatically from the insets -- no manual height/margin math needed.
     clamp() keeps a minimum 12px gutter even where the safe-area inset is 0
     (older non-notch phones), grows past it on notched phones so the frame
     never sits under the status bar or home indicator -- and (2026-07-14,
     Jason, on-device: a "fairly significant" gap below the tab bar on BOTH
     an XS Max and a 15 Pro Max, standalone home-screen installs, previously
     `max(12px, env(...))` with no ceiling) caps how far env() can push it,
     since a real home-indicator inset should never need more than ~40px
     and the previous unbounded max() left room for whatever was inflating
     it on these devices to just keep growing unchecked. If this DIDN'T
     shrink the gap back to something reasonable, the cause isn't env()
     over-reporting and needs a different theory -- flag it back rather
     than stacking more guesses on top. */
  #app {
    position: fixed;
    top: clamp(12px, env(safe-area-inset-top), 40px);
    left: 12px; right: 12px;
    bottom: clamp(12px, env(safe-area-inset-bottom), 40px);
    display: flex; flex-direction: column;
    background: var(--bg);
    border: 1px solid var(--tile-border);
    border-radius: 24px;
    overflow: hidden;
    transition: border-color 0.15s ease;
  }
  #app.reorder-frame { border-color: var(--pickle); }
  #screen { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }

  /* ---- shared header ---- */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 8px; gap: 10px; }
  .wordmark { letter-spacing: 0.1em; text-transform: uppercase; color: var(--pickle); font-size: 12px; font-weight: 500; line-height: 1.3; }
  .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .order-btn, .done-btn, .recall-btn {
    background: transparent; border: 1px solid var(--tile-border); color: var(--text);
    border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 4px; text-align: center;
  }
  .order-btn:active, .done-btn:active, .recall-btn:active { opacity: 0.7; }
  .icon-btn { width: 36px; height: 36px; padding: 0; border-radius: 10px; font-size: 16px; }
  .reorder-banner-pill {
    border: 1px solid var(--pickle); color: var(--pickle); border-radius: 10px;
    padding: 6px 12px; font-size: 12px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; display: inline-block;
  }

  /* ---- lineup tab ---- */
  .lineup-body { padding: 8px 16px 16px; }
  .nowup-card {
    width: 100%; text-align: center; border: none; border-radius: 18px;
    background: var(--pickle); color: var(--badge-text);
    /* 40vh ≈ square on the team phone (was 32vh) -- bigger tap target,
       more presence (Jason, 2026-07-07, on-device). */
    padding: 26px 22px; min-height: 40vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; margin-top: 6px;
  }
  .nowup-label { text-transform: uppercase; letter-spacing: 0.1em; font-size: 13px; font-weight: 500; opacity: 0.75; }
  .nowup-name {
    color: var(--card-pop); text-transform: uppercase; font-weight: 500;
    /* Top margin 8 -> 4: all-caps glyphs carry no descenders, so the line
       box's extra headroom made the name sit visually low between the
       label and counter (Jason, 2026-07-07, on-device). */
    font-size: clamp(36px, 11vw, 56px); line-height: 1.05; margin: 4px 0 8px;
    word-break: break-word;
  }
  /* Moved down from the header (2026-07-06) -- was crowding the wordmark
     row for information that reads just as well on the card itself. */
  .nowup-counter { font-size: 13px; opacity: 0.7; margin-bottom: 12px; }
  .nowup-play-icon {
    width: 0; height: 0; margin-bottom: 12px;
    border-top: 15px solid transparent; border-bottom: 15px solid transparent;
    border-left: 24px solid var(--card-pop);
  }
  .nowup-caption { font-size: 13px; opacity: 0.8; }
  /* Playing state: the card itself becomes the stop control (no separate
     Stop/fade button) -- plum accent signals "tap to stop" the same way
     pickle signals "tap to play" elsewhere. */
  .nowup-card.playing { background: var(--plum-fill); color: var(--plum-text); }
  /* Name stays in the pop color in both states -- one consistent "the name
     is the loudest thing on the card" rule. */
  .nowup-card.playing .nowup-name { color: var(--card-pop); }
  .nowup-stop-icon {
    width: 22px; height: 22px;
    /* Same vertical footprint as the 30px play triangle (4 + 22 + 16 =
       0 + 30 + 12): border-box makes this square 8px shorter than the
       border-drawn triangle, and the card's centered flex stack was
       re-centering on the swap -- the name visibly dropped a few px when
       play flipped to stop (2026-07-07, Jason, on-device). */
    margin: 4px 0 16px;
    border: 3px solid var(--plum-text); border-radius: 4px;
  }
  .navbtns { display: flex; gap: 12px; margin-top: 14px; }
  .navbtn {
    flex: 1; background: var(--tile); border: 1px solid var(--tile-border); color: var(--text);
    border-radius: 12px; padding: 16px 8px; font-size: 15px; font-weight: 500;
    text-align: center;
  }
  .navbtn:active { opacity: 0.7; }
  .ondeck { margin-top: 22px; }
  .ondeck-label { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  .ondeck-row { display: flex; gap: 8px; }
  .ondeck-chip {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: var(--tile); border: 1px solid var(--tile-border); border-radius: 12px;
    padding: 10px 6px; font-size: 13px; color: var(--text);
  }
  .ondeck-chip .badge { background: var(--pickle); color: var(--badge-text); }
  .empty-state { padding: 40px 16px; text-align: center; color: var(--muted); }
  .empty-state .done-btn { margin-top: 14px; background: var(--pickle); border-color: var(--pickle); color: var(--badge-text); font-weight: 500; }

  /* ---- badges ---- */
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 500;
    flex-shrink: 0;
  }

  /* ---- grid (shared): individually rounded tiles with real gaps, not a
     hairline-divided table. ---- */
  .grid-hint { color: var(--muted); font-size: 12px; padding: 0 16px 10px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px; }
  .tile {
    position: relative; background: var(--tile); border: 1px solid var(--tile-border);
    border-radius: 14px;
    color: var(--text); font-size: 14px; font-weight: 500; padding: 8px 6px;
    /* FIXED height, both states (2026-07-07, game-1 follow-up): the playing
       tile's extra lines (stop icon + countdown) used to grow its row and
       reshuffle the whole grid mid-game. Idle tiles got taller, the playing
       tile's stack got tighter, and now nothing moves when playback starts
       or stops. Column layout replaced the old flex-wrap hack. */
    height: 78px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; text-align: center; touch-action: manipulation;
  }
  /* Countdown on a playing grid tile: same "lives on the stop control"
     pattern as the NOW UP card's caption (extended to the grid 2026-07-06
     per Jason's request after game 1). */
  .tile-countdown { width: 100%; font-size: 11px; opacity: 0.85; line-height: 1; }
  .tile:active { opacity: 0.85; }
  /* Playing state: the tile itself becomes the stop control -- same plum
     accent as the NOW UP card's playing state, for one consistent
     "plum = tap to stop" signal across both tabs. */
  .tile.playing { border-color: var(--plum-border); color: var(--plum-text); background: var(--plum-fill); }
  /* Stop icon sits on its own line between name and countdown -- mirrors
     the NOW UP card's stack (name -> stop icon -> countdown) so both stop
     controls read as one pattern (2026-07-06 round 4; was inline after
     the name). */
  /* A few px of air above/below the stop icon (2026-07-07, Jason): the
     name/icon/countdown stack read cramped inside the fixed-height tile. */
  .tile.playing .speaker { width: 100%; line-height: 1; margin: 3px 0 5px; /* asymmetric on purpose: the glyph's own headroom makes equal margins read unequal -- tuned on-device to 3 top / 5 bottom (Jason, 2026-07-07) */ }
  .tile.unavailable { color: var(--muted); opacity: 0.5; }
  .guest-wrap { display: flex; justify-content: center; padding: 14px 16px 0; }
  .tile.guest {
    border-style: dashed; color: var(--muted); width: 45%;
    height: auto; min-height: 44px; /* exempt from the fixed tile height */
    padding: 10px 6px;
  }

  /* ---- reorder mode ---- */
  .reorder-actions { padding: 0 16px 10px; }
  .order-tile { touch-action: none; }
  .order-tile .badge { background: var(--pickle); color: var(--badge-text); position: absolute; top: 6px; left: 6px; }
  /* While dragging, the original tile stays in the grid as a dimmed
     placeholder (it's what actually gets reordered); a fixed-position
     ghost copy follows the finger. */
  .order-tile.drag-placeholder { opacity: 0.35; border-style: dashed; }
  .drag-ghost {
    box-shadow: 0 6px 16px rgba(0,0,0,0.5); border-color: var(--pickle);
    opacity: 0.95; z-index: 10;
  }
  .bench-heading { color: var(--muted); font-size: 12px; padding: 16px 16px 8px; }
  .bench-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px; }
  .bench-tile { border-style: dashed; color: var(--muted); }
  .done-wrap { padding: 16px; }
  .done-full {
    width: 100%; background: var(--pickle); color: var(--badge-text); border: none;
    border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 500;
  }
  .done-full:active { opacity: 0.85; }

  /* Segmented-control style tab bar: one pill container, active side gets
     a solid olive "slider" fill, inactive side is plain text in the same
     pill -- not two separate bordered buttons. */
  .tabbar {
    display: flex; gap: 4px; flex-shrink: 0;
    margin: 8px 16px 12px; padding: 4px;
    background: var(--tile); border-radius: 999px;
  }
  .tabbar.hidden { display: none; } /* portal shell replaces the classic tab UI entirely */
  .tabbtn {
    flex: 1; background: transparent; border: none; color: var(--muted);
    border-radius: 999px; padding: 10px 8px; font-size: 14px; font-weight: 500;
  }
  .tabbtn.active { background: var(--olive); color: var(--text); }

  .loading-screen {
    position: fixed; inset: 0; background: var(--bg); color: var(--muted);
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    flex-direction: column; gap: 10px;
  }
  .loading-screen .wordmark { font-size: 14px; }

  /* Hidden field-debug readout (5 quick taps on the wordmark). Never
     intercepts taps -- display only. Positioned absolute INSIDE the #app
     card (which is position:fixed, so it's the containing block), floating
     just above the tab bar on its own dark chip -- v1 of this used
     position:fixed/bottom:4px, which landed in the 12px gutter BELOW the
     card, under the home-indicator zone: functionally invisible
     (2026-07-07, caught by Jason on-device). */
  .debug-panel {
    position: absolute; bottom: 64px; left: 10px; right: 10px; z-index: 99;
    font: 11px/1.4 ui-monospace, Menlo, monospace; color: var(--text);
    background: rgba(0, 0, 0, 0.72); border: 1px solid var(--tile-border);
    border-radius: 8px; padding: 4px 8px;
    pointer-events: none; text-align: left;
  }
  .debug-readout { pointer-events: none; }
  /* The one interactive element inside an otherwise click-through panel --
     re-enables pointer-events just for itself. Destructive (wipes the whole
     scoring event log for this device), so it's styled as a clear warning
     even though it only ever surfaces behind the same 5-tap gate as the
     rest of the debug readout. Confirmed via window.confirm() before it
     does anything -- see debugClearGameData(). */
  .debug-clear-btn {
    pointer-events: auto; display: block; margin-top: 6px;
    background: transparent; border: 1px solid #a24; color: #e88;
    border-radius: 6px; padding: 4px 8px; font: 11px/1.4 ui-monospace, Menlo, monospace;
  }
  .debug-clear-btn:active { opacity: 0.7; }

  /* __SCORING_START__ */
  /* Shared reference height for the diamond row's matched columns
     (2026-07-08 session; was a bare 132px repeated in five places -- the
     var keeps .diamond-col / .last-action-chip / .diamond-note /
     .correction-panel / .fixlast-chip locked together, which is the whole
     trick behind the S1.5 round-3/4 centering fixes. Bumped to 150px when
     the diamond grew for bigger tap targets, same session). */
  #app { --scoring-ref-h: 166px; } /* 160 -> 166, 2026-07-11: diamond scaled ~10% (wrap 118x114 -> 130x124); ref grows with it to keep the row's proportions */
  /* ---- scoring: shared game-screen chrome (S1.3/S1.4) ----
     Colors/spacing lifted directly from mockups/scoring-screens.html
     (05-Scoring-Architecture.md "Design authority": mockup is normative
     for appearance). New classes alongside the existing ones, per that
     doc's instruction not to port the mockup's markup -- this app never
     uses inline styles, so fixed diamond positions are expressed as
     modifier classes instead of the mockup's inline left/top/right. */
  /* Bigger/bolder per Jason's live feedback -- score + outs are the
     at-a-glance numbers, the original single 12px row under-served that. */
  .score-bug {
    background: var(--tile); border: 1px solid var(--tile-border); border-radius: 10px;
    padding: 8px 14px 10px; margin: 0 16px 10px;
    position: relative; /* anchors the box-score chip in the top-right corner */
  }
  /* Box-score entry point (2026-07-08 round 4): PLACEHOLDER, not yet
     functional -- the live box-score view is a planned build (see
     handoff); this reserves its spot in the top-right of the score bug,
     across from the inning/half line. Quiet chip styling on purpose:
     it's a read-only glance surface, not an operator control. */
  .boxscore-chip {
    position: absolute; top: 6px; right: 8px;
    background: transparent; border: 1px solid var(--tile-border); color: var(--muted);
    border-radius: 8px; padding: 4px 8px; font-size: 11px; font-weight: 500;
  }
  .boxscore-chip:active { opacity: 0.7; }
  .boxscore-chip.active { border-color: var(--pickle); color: var(--pickle); }
  /* Live scorecard takeover panel (round 5 first pass). The canvas draws
     at 2x backing resolution; horizontal scroll takes over if a long
     lineup/extra innings ever outgrow the column. */
  .boxscore-panel { margin: 0 16px 10px; }
  /* Totals (AB/H/R/RBI) are a SEPARATE canvas positioned over the scroll
     container's right edge (2026-07-13, Jason: "fixed to the right side...
     inning representations scrolling horizontally beneath it") -- a single
     canvas is one bitmap and can't be part-sticky, so scorecardLayout/
     drawScorecard/drawScorecardTotals share row geometry and this wrapper
     just stacks the two visually. */
  .boxscore-grid-wrap { position: relative; }
  .boxscore-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .boxscore-totals-sticky { position: absolute; top: 0; right: 0; z-index: 2; }
  .scorecard-canvas, .scorecard-totals-canvas {
    display: block; background: var(--tile);
    border: 1px solid var(--tile-border); border-radius: 10px;
  }
  .boxscore-close { margin-top: 8px; }
  .score-bug-top { font-size: 12px; margin-bottom: 4px; }
  .score-bug .dim-label { color: var(--muted); }
  /* Round 6 (Jason, live feedback, 2026-07-07): outs are back in the
     score bug on the OFFENSE screen only (defense keeps its own dots on
     the +OUT button, per Jason's explicit "not in the score bug" call) --
     rendered conditionally by renderScoreBug() based on which half it is.
     Stacked column now (was a row in round 5): score summary on top,
     outs BELOW it, both centered horizontally. */
  .score-bug-main { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px; }
  .outs-block { text-align: center; }
  .outs-big { font-size: 20px; letter-spacing: 2px; }
  .score-bug .outs-dot { color: var(--text); }
  .score-bug .outs-dot.empty { color: var(--tile-border); }
  .outs-label-big { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  /* Team + verb ("PPP trails") stacked above the score, smaller and dark
     moss, so the actual score stays the visual focal point, centered
     underneath (Jason, live feedback, round 5 -- previously the whole
     line was one size/color, which both buried the score under equal
     weight and made the verb read as odd since numbers usually don't
     carry a color meaning by themselves). */
  .score-stack { display: flex; flex-direction: column; align-items: center; }
  .score-verb { font-size: 13px; font-weight: 600; color: var(--olive); text-transform: uppercase; letter-spacing: 0.04em; }
  .score-total-big { font-size: 26px; font-weight: 600; color: var(--text); }

  /* Top/bottom breathing room around the diamond + last-action row.
     Round 7 (2026-07-06 session, Jason live feedback): was align-items:
     center, which was stable ONLY because .last-action-chip had a fixed
     min-height (round 6) -- centering the diamond against a sibling of
     constant height never has anything to fight.
     S1.5 round 2 (Jason, live feedback, 2026-07-07): that assumption broke
     the moment this row started hosting OTHER right-column content of
     wildly different heights -- the runner-correction panel (3-5 rows
     depending on how many bases are legal), fix-last's one-line note, the
     old fixed-height chip. Centering against each of those independently
     put the diamond at a different absolute Y per screen -- visibly
     "jumping" between otherwise-adjacent states, exactly what Jason
     flagged (and correctly root-caused to the centering logic, not the
     enlarge transform removed in round 1). flex-start makes the diamond's
     position a function of ONLY what's above this row (the score bug --
     identical everywhere), never of whatever happens to be beside it. */
  .diamond-row { display: flex; align-items: flex-start; gap: 10px; margin: 0 16px 10px; padding: 5px 0; }
  /* Hard-set 40/60 split (Jason, live feedback, round 4): the diamond
     column's width used to be implicit (diamond-wrap's fixed 104px plus
     whatever the on-base hint text needed), so a longer hint string like
     "2 on · tap a runner to fix" vs. "bases empty" shifted the whole row
     horizontally. Fixed percentages + centered content stop that.
     Round 6 fix: subtracting half the row's 10px gap from each side's
     percentage -- flexbox doesn't shrink percentage flex-basis to make
     room for `gap`, so the un-adjusted 40%/60% overflowed the row by the
     full 10px, silently eating into the row's own right-hand margin
     (this is why the last-action chip looked flush against the screen
     edge while the diamond side still had its margin). */
  .diamond-col {
    flex: 0 0 calc(40% - 5px); width: calc(40% - 5px); display: flex; flex-direction: column;
    align-items: center; text-align: center; position: relative;
    /* S1.5 round 3 (Jason, live feedback): the aesthetic he liked --
       diamond vertically centered against its neighbor -- decoupled from
       row-level align-items (which has to stay flex-start so the
       still-variable-height runner-correction panel doesn't reintroduce
       the jump). Instead the diamond centers itself within its OWN fixed
       132px reference box, matching the last-action chip's height, and
       every "matched" right-column variant (fix-last's note, the
       undo-only sheet's hint -- see .diamond-note) reserves that same
       132px. Equal-height columns make align-items moot for those cases;
       the not-yet-redesigned correction panel (still taller, pending the
       base-tap conversation) just sits with the diamond centered in its
       own top 132px rather than the panel's full height.
       Round 4 (Jason, live feedback): round 3's fix for the ACROSS-screens
       jump introduced a WITHIN-screen mismatch -- the caption slot below
       the diamond (.diamond-col-caption, added so diamondCol's content
       height matches across screens) was part of THIS centering, which
       pulls the diamond's own midpoint above the box's true center
       (asymmetric block: diamond on top, caption below, centered as one
       unit). The .diamond-note sibling has no such trailing element, so it
       centers on the box's true middle -- an 11px mismatch between the
       two. Fix: the caption is now position:absolute (see
       .diamond-col-caption below), removed from the flex content entirely,
       so the diamond -- now the ONLY flex child -- centers on the box's
       true middle too, matching .diamond-note exactly regardless of
       whether the caption has real text or is empty. */
    min-height: var(--scoring-ref-h); justify-content: center;
  }
  /* Diamond enlarged 2026-07-08 (Jason: bigger tap targets) -- wrap
     104x88 -> 118x102, bases 24 -> 28px, labels sized for the 2-letter
     runner codes that replaced single initials (three Ms on base at once
     were unreadable). Geometry note: bases rotate about their own center,
     so the un-rotated top/left below place the BOX; the visible diamond
     extends ~6px past each edge of it. */
  /* Home-plate placement, round 5 (Jason, screenshot with the red box,
     2026-07-08): width = the diamond's hypotenuse -- the full horizontal
     span of a rotated 28px base (≈40px), so the plate fills the same
     column 2nd base does. TRUE plate proportions: a real plate is 17"
     wide and 17" deep (8.5" straight sides + 8.5" of point), i.e. a
     SQUARE bounding box with the shoulders at half height -- round 4's
     28×24 was vertically squashed. Placement: the lower 45° edges
     (shoulder->apex) are COLLINEAR with the lower OUTER edges of 1st/3rd
     (3rd's outer lower edge runs (0.2,51)->(20,70.8), slope +1; the
     plate's left shoulder (39,90) and apex (59,110) sit on that same
     line). */
  /* Scaled ~10% 2026-07-11 (Jason: fill the column better): wrap
     118x114 -> 130x124, bases 28 -> 30, plate 32 -> 34. Same placement
     rules as rounds 3-5b, re-derived at the new scale: centers 2nd
     (65,17), 1st (108,56), 3rd (22,56); plate apex (65,120) sits at the
     intersection of the lines through 1st/3rd's lower OUTER edges
     (3rd's runs (0.8,56)->(22,77.2), slope +1, y = x + 55.2). */
  .diamond-wrap { position: relative; width: 130px; height: 124px; flex: none;
    /* 2026-07-11 (Jason): a few px of air between the plate and the
       caption. The col flex-centers wrap+margin as one block, so this
       8px margin lifts the diamond 4px while the absolutely-anchored
       caption stays put -- plate apex lands at 137, caption top at 145,
       8px gap. Applies identically on every screen that renders the
       diamond (live, runner sheet, fix-last), so the diamond never
       shifts between edit states. */
    margin-bottom: 8px;
  }
  .diamond-base {
    position: absolute; transform: rotate(45deg); border-radius: 4px;
    background: var(--tile); border: 1px solid var(--tile-border);
  }
  .diamond-base.occupied { background: var(--pickle); border: none; }
  .diamond-base.pos-2nd { left: 50px; top: 2px; width: 30px; height: 30px; }
  .diamond-base.pos-1st { right: 7px; top: 41px; width: 30px; height: 30px; }
  .diamond-base.pos-3rd { left: 7px; top: 41px; width: 30px; height: 30px; }
  /* Home is an actual home plate now (2026-07-08, Jason): un-rotated
     pentagon via clip-path (with the -webkit- prefix old Safari needs).
     Outline effect = a filled outer pentagon with a slightly-inset
     background-colored ::after pentagon on top -- border-drawn outlines
     get clipped away by clip-path, so this two-layer trick is the only
     reliable way to "stroke" the shape. State fills below recolor the
     OUTER layer only. */
  /* Round 5b (Jason): 40px matched 2nd's span exactly, but flat vertical
     edges at the extremes read wider than a diamond's single-point span --
     narrowed to 32px, still square (true 17"x17" plate proportions), same
     placement rule: lower 45° edges collinear with 1st/3rd's outer lower
     edges (apex stays at their intersection (59,110); top = 110 - 32). */
  .diamond-base.pos-home {
    left: 48px; top: 86px; width: 34px; height: 34px; /* apex (65,120) on the re-derived baselines; top = 120 - 34 */
    transform: none; border: none; border-radius: 0;
    background: var(--tile-border); padding: 0;
    -webkit-clip-path: polygon(0 0, 100% 0, 100% 50%, 50% 100%, 0 50%);
    clip-path: polygon(0 0, 100% 0, 100% 50%, 50% 100%, 0 50%);
  }
  .diamond-base.pos-home::after {
    content: ''; position: absolute; left: 2px; top: 2px; right: 2px; bottom: 3px;
    background: var(--bg);
    -webkit-clip-path: polygon(0 0, 100% 0, 100% 50%, 50% 100%, 0 50%);
    clip-path: polygon(0 0, 100% 0, 100% 50%, 50% 100%, 0 50%);
  }
  /* Home-plate states: deep moss = "someone scored this half, tappable to
     fix a run"; pickle = legal forward-set target; white = selected (the
     scored-runner sheet is open on this runner). All recolor the outer
     pentagon; the generic .legal-target/.selected border rules don't
     survive clip-path, hence the explicit overrides. */
  .diamond-base.pos-home.has-scored { background: var(--pickle); }
  .diamond-base.pos-home.legal-target { border: none; background: var(--pickle); }
  .diamond-base.pos-home.selected { border: none; background: #FFFFFF; }
  .diamond-label {
    position: absolute; width: 30px; text-align: center; font-size: 12px;
    font-weight: 500; color: var(--badge-text); pointer-events: none;
    letter-spacing: 0.02em;
  }
  .diamond-label.pos-2nd { left: 50px; top: 10px; }
  .diamond-label.pos-1st { right: 7px; top: 49px; }
  .diamond-label.pos-3rd { left: 7px; top: 49px; }
  .diamond-info { flex: 0 0 calc(60% - 5px); width: calc(60% - 5px); min-width: 0; }
  /* S1.5 round 3 (Jason, live feedback): the fix-last / undo-only sheets'
     right column is a single short line -- give it the SAME 132px
     reference height as the last-action chip and center that line inside
     it, instead of letting it shrink to content height (which is what
     made the diamond's own centering, above, land at a different spot
     than the normal screen's chip). */
  .diamond-note {
    flex: 0 0 calc(60% - 5px); width: calc(60% - 5px); min-width: 0;
    min-height: var(--scoring-ref-h); box-sizing: border-box; display: flex; align-items: center;
    font-size: 12px; color: var(--muted); line-height: 1.5; padding: 0 16px;
  }
  /* Back beside the diamond (Jason, live feedback) -- headline + a list of
     detail lines (who scored, who else moved) instead of one inline
     sentence, with the result spelled out in plain English.
     Round 6 (Jason, live feedback): min-height sized for the largest
     realistic content -- headline (1 line) + up to 3 runner-movement
     detail lines (max 3 other runners can be on base) + the RBI line +
     "tap to fix or undo" -- so the chip (and the row it's in) holds a
     stable height instead of jumping around per play, with content
     top-aligned inside rather than vertically centered. */
  .last-action-chip {
    background: var(--tile); border: 1px solid var(--olive); border-radius: 8px;
    padding: 8px 10px; margin-bottom: 6px; min-height: var(--scoring-ref-h); box-sizing: border-box;
    /* Flex column so "tap to fix or undo" can be pinned to the bottom
       (round 7, Jason, live feedback) regardless of how many detail lines
       sit above it -- headline + details stay naturally stacked at the
       top via normal flow, the sub line's margin-top:auto eats whatever
       space is left in the fixed-height box. */
    display: flex; flex-direction: column;
    /* S1.5 round 1 (Jason, live feedback): now that this is a <button>
       (tappable), WebKit doesn't reliably stretch a flex-display button to
       fill its container the way a div would -- it was shrink-wrapping to
       content width. Explicit width, same fix pattern as every other
       "button that must fill its column" element in this file. */
    width: 100%;
  }
  .la-headline { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; } /* 14 -> 15, 2026-07-11 (Jason: last-action text a step larger) */
  /* Moss for the headline's subject only (the batter/runner this event is
     about) -- NOT the detail list's names below (Jason, live feedback). */
  .la-name { color: var(--pickle); }
  .la-detail { font-size: 13px; color: var(--muted); line-height: 1.4; margin-top: 2px; } /* 12 -> 13, 2026-07-11 */
  /* RBI line: same size as the rest of the movement list, but white --
     Jason, live feedback, 2026-07-07 (moved out of the headline, where it
     was wrapping onto its own line next to the at-bat summary). */
  .la-detail-rbi { color: var(--card-pop); }
  .last-action-chip .sub { font-size: 11px; color: var(--muted); margin-top: auto; padding-top: 4px; }
  .diamond-hint { font-size: 12px; color: var(--muted); line-height: 1.5; padding: 0 16px; text-align: left; }
  /* S1.5 round 4 (Jason, live feedback): dedicated class for the caption
     slot directly under the diamond inside .diamond-col (distinct from the
     general-purpose .diamond-hint above, which is also used for unrelated
     full-width notes elsewhere). position:absolute and pinned to the
     bottom of .diamond-col's 132px box -- deliberately OUT of normal flex
     flow, so it never participates in .diamond-col's justify-content:center
     math. Only the diamond itself is a flex child now, so it centers on
     the box's true midpoint, matching .diamond-note's centering on the
     next screen over exactly (round 3 had this slot IN-flow, which pulled
     the diamond's own midpoint above the box's true center -- an
     asymmetric diamond+caption block centered as one unit -- while
     .diamond-note, with no such trailing element, centered on the true
     middle: an 11px mismatch between the two, only visible with the
     correction sheets' otherwise-empty caption). */
  .diamond-col-caption {
    position: absolute; left: 0; right: 0;
    /* Round 4 (Jason's preview, 2026-07-08): anchored just below the
       diamond wrap (50% of the col + half the 114px wrap + 2px) instead
       of the box's bottom. Bottom-anchoring grew a wrapping caption
       UPWARD into the plate -- overlap whenever the text hit two lines,
       which on a 414pt phone it does. Growing DOWNWARD it can never touch
       the plate; a second line spills a few px past the reference box
       into the row's own padding/margin slack without shifting layout,
       since it's absolutely positioned. Round 5: +2px extra clearance per
       Jason (plate bottom sits 4px above the wrap edge, so the total
       plate-to-text gap is ~6px). KEEP THIS OFFSET IN SYNC with
       .diamond-wrap's height/2 if the diamond is resized again --
       62 = 124/2 as of 2026-07-11, chosen so the caption's single line
       sits level with the last-action chip's bottom-pinned "tap to fix or
       undo" sub across the row (Jason's alignment ask; both are 11px now).
       Plate apex at 137 (wrap's 8px margin-bottom lifts it 4px), caption
       top at 145 -- 8px clearance. */
    top: calc(50% + 62px);
    font-size: 11px; color: var(--muted); line-height: 1.5; text-align: center;
  }

  .result-pad {
    display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 6px;
    margin: 0 16px 8px;
  }
  .result-tile {
    background: var(--tile); border: 1px solid var(--tile-border); border-radius: 8px;
    text-align: center; color: var(--text); font-weight: 500; font-size: 15px;
  }
  .result-tile.span3 { grid-column: span 3; padding: 15px 0; } /* 13 -> 15, 2026-07-11: matches the out row's label+sub height, and gives the 30px indicator diamond more room */
  .result-tile.span4 { grid-column: span 4; padding: 8px 0; }
  .result-tile.span6 { grid-column: span 6; padding: 8px 0; }
  .result-tile .sub { font-size: 11px; color: var(--muted); font-weight: 400; }
  .result-tile.dashed { background: var(--bg); border: 1px dashed var(--tile-border); color: var(--muted); font-size: 13px; }
  /* Baseline indicators (2026-07-11, Jason): hit tiles carry the
     scorecard's mini-diamond motif behind the label -- edges lit moss per
     bases reached (right=1st, +top=2nd, +left=3rd, all four + faint
     fill=HR), the same edge mapping the scorecard cells use. The label
     centers via the tile's own text-align (inline span in a
     text-align:center button); the diamond self-centers absolutely --
     do NOT switch the tile to flex, that was the mockup's centering bug. */
  .result-tile.hit { position: relative; overflow: hidden; }
  .tile-lb { position: relative; z-index: 1; }
  .tile-dia {
    display: block; position: absolute; left: 50%; top: 50%;
    width: 30px; height: 30px; margin: -15px 0 0 -15px;
    transform: rotate(45deg); border-radius: 3px;
    border: 2px solid var(--tile-border);
  }
  .tile-dia.dia-1 { border-right-color: var(--olive); }
  .tile-dia.dia-2 { border-top-color: var(--olive); border-right-color: var(--olive); }
  .tile-dia.dia-3 { border-top-color: var(--olive); border-right-color: var(--olive); border-left-color: var(--olive); }
  .tile-dia.dia-4 { border-color: var(--olive); background: rgba(130, 161, 103, 0.12); }
  /* Bigger + moss names, mirroring the defense screen's leadoff treatment
     (Jason, live feedback) -- both screens now use the same "this is our
     offensive lineup" color language. */
  .scoring-ondeck { text-align: center; padding: 4px 16px 0; }
  .scoring-ondeck-label { font-size: 11px; letter-spacing: 0.08em; color: var(--muted); font-weight: 500; }
  .scoring-ondeck-names { font-size: 15px; font-weight: 500; color: var(--pickle); margin-left: 6px; }
  /* Italic per Jason's live feedback, round 4. */
  .runs-this-inning { text-align: center; font-size: 12px; color: var(--muted); font-style: italic; padding: 8px 16px 0; }

  /* Round 6 fix (Jason, live feedback): this variant never had its own
     side margin -- the classic Next Up tab's card gets its 16px inset for
     free from .lineup-body's own padding, but the scoring screen's outer
     wrapper has no such padding, so the card was rendering flush against
     the screen edges (same class of bug as the diamond-row overflow
     above, different cause).
     Round 7 fix: adding that margin exposed a second bug -- the base
     .nowup-card rule sets width:100%, and `width` never subtracts
     margins, so 100% + 32px of margin overflowed the container by 32px
     (visible as a right-edge overflow + horizontal scroll). Same pattern
     .out-button already gets right below with calc(100% - 32px). */
  .game-nowup-card.compact { padding: 14px 12px 12px; min-height: 0; margin: 0 16px 10px; width: calc(100% - 32px); }
  /* All compact-card text one step up, 2026-07-11 (Jason) -- final sizes
     get a real-phone pass before they're considered settled. */
  .game-nowup-card.compact .nowup-name { font-size: 33px; margin: 2px 0; }
  .game-nowup-card.compact .nowup-label { font-size: 12px; }
  .game-nowup-card.compact .nowup-caption { font-size: 13px; }
  /* "X of Y" on its own line under the playback metadata (Jason, live
     feedback, 2026-07-07) -- was prefixed inline onto the caption before. */
  .game-nowup-card.compact .nowup-position { font-size: 12px; opacity: 0.65; margin-top: 2px; }
  /* Fixed-height icon slot, always present, holding either shape centered --
     eliminates the card-height jump between idle/playing (Jason, live
     feedback: the old inline "▶" glyph vs. block stop-icon moved the card). */
  .game-nowup-card.compact .nowup-icon-slot {
    height: 20px; display: flex; align-items: center; justify-content: center; margin: 4px 0 8px;
  }
  .game-nowup-card.compact .nowup-play-icon {
    width: 0; height: 0; margin: 0;
    border-top: 8px solid transparent; border-bottom: 8px solid transparent;
    border-left: 13px solid var(--card-pop);
  }
  .game-nowup-card.compact .nowup-stop-icon {
    width: 14px; height: 14px; margin: 0;
    border: 2px solid var(--plum-text); border-radius: 3px;
  }

  /* ---- scoring: defense screen (S1.4) ---- */
  .defense-chip {
    background: var(--tile); border: 1px solid var(--tile-border); border-radius: 12px;
    text-align: center; padding: 14px 12px; margin: 0 16px 10px;
  }
  .defense-chip .defense-label { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); font-weight: 500; }
  .defense-chip .defense-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .out-button {
    display: block; background: var(--tile); border: 1px solid var(--olive); border-radius: 12px;
    text-align: center; padding: 26px 0; margin: 0 16px 10px; width: calc(100% - 32px);
  }
  .out-button .out-label { font-size: 26px; font-weight: 500; color: var(--text); }
  /* Bigger + brighter per Jason's live feedback: current outs/runs are the
     most-referenced numbers on defense and were reading as fine print.
     Round 3 (Jason, live feedback, 2026-07-07): replaced the "X of 3" text
     with the same dot notation as the score bug, plus a separate grey
     explainer line underneath instead of cramming both into one line. */
  .out-button .out-dots { font-size: 20px; letter-spacing: 2px; margin-top: 6px; }
  .out-button .outs-dot { color: var(--text); }
  .out-button .outs-dot.empty { color: var(--tile-border); }
  .out-button .out-sub { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 4px; }
  .out-button:active { opacity: 0.85; }
  .runs-stepper {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    background: var(--tile); border: 1px solid var(--tile-border); border-radius: 12px;
    padding: 14px 0; margin: 0 16px 10px;
  }
  .runs-stepper button {
    width: 44px; height: 44px; border: 1px solid var(--tile-border); border-radius: 8px;
    background: transparent; color: var(--text); font-size: 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .runs-stepper button:active { opacity: 0.7; }
  .runs-stepper-count { text-align: center; }
  /* Header above the count, matching the OUTS label's treatment
     elsewhere (Jason, live feedback, 2026-07-07). */
  .runs-stepper-count .hdr { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .runs-stepper-count .num { font-size: 34px; font-weight: 600; color: var(--text); }
  .runs-stepper-count .lbl { font-size: 12px; color: var(--muted); }

  /* Mercy-limit banner: a choice, not an automatic cutoff. */
  .mercy-banner {
    background: var(--plum-fill); border: 1px solid var(--plum-border); border-radius: 12px;
    padding: 10px 12px; margin: 0 16px 10px; text-align: center;
  }
  .mercy-text { font-size: 13px; font-weight: 500; color: var(--plum-text); margin-bottom: 8px; }
  .mercy-actions { display: flex; gap: 8px; }
  .mercy-btn {
    flex: 1; background: var(--tile); border: 1px solid var(--tile-border); border-radius: 8px;
    padding: 8px 0; font-size: 13px; font-weight: 500; color: var(--text);
  }
  .mercy-btn.dashed { background: var(--bg); border-style: dashed; color: var(--muted); }
  .mercy-btn:active { opacity: 0.8; }

  /* Bigger, chip-styled "next up" at the bottom of the defense screen
     (Jason, live feedback) instead of a single muted line. */
  .leadoff-preview-big {
    background: var(--tile); border: 1px solid var(--tile-border); border-radius: 12px;
    text-align: center; padding: 12px; margin: 0 16px;
  }
  .leadoff-label { font-size: 11px; letter-spacing: 0.1em; color: var(--muted); font-weight: 500; }
  /* Moss, not plain text -- Jason, live feedback: this refers to OUR
     offensive lineup, not the defensive stats it sits among, and needs to
     read as visually distinct at a glance. */
  .leadoff-name { font-size: 20px; font-weight: 500; color: var(--pickle); margin-top: 3px; }
  /* Round 3 (Jason, live feedback, 2026-07-07): show the next 3 batters,
     not just the leadoff -- #1 keeps the big treatment above, #2/#3 ride
     underneath in a smaller size so the leadoff is still the clear focal
     point. */
  .leadoff-preview-rest { font-size: 14px; font-weight: 500; color: var(--pickle); margin-top: 4px; opacity: 0.75; }

  /* ---- scoring: correction states (S1.5, 06-Scoring-Specs.md item 5) ---- */
  /* .diamond-base and .last-action-chip are now sometimes <button>s
     (occupied bases, the chip itself) so they're tappable -- reset the UA
     button chrome that would otherwise leak through their existing
     background/border/padding rules above. */
  .diamond-base, button.last-action-chip {
    font: inherit; cursor: pointer; appearance: none; -webkit-appearance: none; text-align: left;
  }
  .diamond-base.selected { border: 2px solid #FFFFFF; }
  .diamond-base.dimmed, .diamond-label.dimmed { opacity: 0.4; }
  /* Round 7 (Jason, live feedback): tap-a-base targets. Takes visual
     priority over .dimmed (renderDiamond only applies .dimmed when a base
     ISN'T also a legal target) -- an occupied base that's a legal forward
     target needs to read as actionable, not de-emphasized. */
  .diamond-base.legal-target { border: 2px dashed var(--pickle); background: transparent; }
  /* Generic "visible but inert" treatment -- the runner sheet's dimmed
     lower half (mockup 3) and the fix-last sheet's dimmed diamond
     (mockup 4) both use this rather than separate dim rules per element. */
  .scoring-dimmed { opacity: 0.4; pointer-events: none; }
  /* Round 7: fixed 132px height, matching the last-action chip -- the
     panel shrank enough once the +N button list became a diamond tap
     (below) that this now actually fits, unlike round 3's stopgap. */
  .correction-panel { flex: 0 0 calc(60% - 5px); width: calc(60% - 5px); min-width: 0; min-height: var(--scoring-ref-h); box-sizing: border-box; }
  .correction-heading { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .correction-out {
    display: block; width: 100%; background: var(--tile); border: 1px solid var(--plum-border);
    color: var(--plum-text); border-radius: 8px; padding: 9px 10px; margin-bottom: 5px;
    font-size: 13px; font-weight: 500;
  }
  .correction-tap-hint { font-size: 12px; color: var(--muted); text-align: center; padding: 6px 0; }
  .correction-cancel {
    display: block; width: 100%; background: var(--bg); border: 1px dashed var(--tile-border);
    color: var(--muted); border-radius: 8px; padding: 7px 10px; text-align: center;
    font-size: 12px; font-weight: 500;
  }

  /* Round 5 (Jason, live feedback): this used to be a separate full-width
     banner below the diamond row, with a generic ("runner state
     re-derives...") note filling the row's right column above it. Two
     problems: the note was too technical to show a live operator, and
     having a whole extra element meant the row's right column wasn't
     really "the chip, now editable" -- it just had unrelated text in it.
     Now this box fills that column directly (same slot .last-action-chip
     and .diamond-note occupy elsewhere), so fix-last visually reads as
     "the chip flipped into edit mode," not a separate screen bolted on. */
  .fixlast-chip {
    background: var(--tile); border: 1px solid var(--pickle); border-radius: 8px;
    padding: 8px 10px; margin-bottom: 6px; min-height: var(--scoring-ref-h); box-sizing: border-box;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  }
  .fixlast-heading { font-size: 11px; letter-spacing: 0.1em; color: var(--pickle); font-weight: 500; }
  .fixlast-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  /* Current logged result, pickle-highlighted, inside the re-targeted pad. */
  .result-tile.current { border: 2px solid var(--pickle); color: var(--pickle); }
  .fixlast-undo {
    grid-column: span 8; background: var(--bg); border: 1px dashed var(--plum-border); color: var(--plum-text);
    border-radius: 8px; padding: 8px 0; font-size: 13px; font-weight: 500; text-align: center;
  }
  .fixlast-cancel {
    grid-column: span 4; background: var(--bg); border: 1px dashed var(--tile-border); color: var(--muted);
    border-radius: 8px; padding: 8px 0; font-size: 12px; font-weight: 500; text-align: center;
  }
  .fixlast-hitstands {
