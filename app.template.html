<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="__TEAM_NAME__">
<meta name="robots" content="noindex, nofollow">
<title>__TEAM_NAME__ — Walk-On Music</title>
<style>
  :root {
    --bg: #101215;
    --tile: #1d2126;
    --tile-border: #33383e;
    --row-rule: #2c3036;
    --text: #e8eae6;
    --muted: #8f948f;
    --olive: #536840; /* "deep moss" -- active-tab fill, re-derived from --pickle (same hue/sat, darker) when the accent moved to moss (2026-07-06 round 3; was shirt olive #565848, which clashed yellow against the new green) */
    --pickle: #82A167; /* "moss" -- cooler/dimmer than the original #abb163, which read too yellow/bright live (changed 2026-07-06 post-game-1; 4.8:1 on badge text) */
    --badge-text: #2C2E20;
    --olive-label: #D8DBBE;
    --plum-border: #7A5C82;
    --plum-text: #CBA9DD;
    --plum-fill: #4A3C52;
    /* NOW UP card "pop" layer (2026-07-07): the kicker's name + play icon
       in white against the moss/plum card, while labels/captions stay in
       the dark badge-text -- game 1 feedback was that the all-dark card
       text read flat. White on moss is ~2.9:1 -- fine for the display-size
       name, which is why ONLY the name and icon use it. */
    --card-pop: #FFFFFF;
  }
  /* user-select/touch-callout off globally: this is a kiosk soundboard with
     no text entry anywhere, and iOS otherwise treats reorder drags as text-
     selection gestures (blue highlight ranges, loupe, selection handles --
     seen live at game 1, 2026-07-06).
     touch-action: manipulation globally too (2026-07-07): iOS has ignored
     user-scalable=no since iOS 10, so rapid taps anywhere were read as
     double-tap-zoom attempts -- while the gesture recognizer deliberated,
     following taps (e.g. the tab buttons) were silently swallowed until a
     scroll/fidget reset it. manipulation disables double-tap-zoom while
     keeping scroll; .order-tile's touch-action:none still wins on
     specificity for drags. */
  * {
    box-sizing: border-box; -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    touch-action: manipulation;
  }
  html, body {
    height: 100%; margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-weight: 400; overscroll-behavior-y: contain;
  }
  button { font-family: inherit; -webkit-appearance: none; appearance: none; cursor: pointer; }

  /* The whole app renders as a rounded card inset from the physical screen
     edges (per the locked mockups), not edge-to-edge. Using fixed
     positioning with all four insets means the box's size is computed
     automatically from the insets -- no manual height/margin math needed.
     max() keeps a minimum 12px gutter even where the safe-area inset is 0
     (older non-notch phones), and grows past it on notched phones so the
     frame never sits under the status bar or home indicator. */
  #app {
    position: fixed;
    top: max(12px, env(safe-area-inset-top));
    left: 12px; right: 12px;
    bottom: max(12px, env(safe-area-inset-bottom));
    display: flex; flex-direction: column;
    background: var(--bg);
    border: 1px solid var(--tile-border);
    border-radius: 24px;
    overflow: hidden;
    transition: border-color 0.15s ease;
  }
  #app.reorder-frame { border-color: var(--pickle); }
  #screen { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }

  /* ---- shared header ---- */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 8px; gap: 10px; }
  .wordmark { letter-spacing: 0.1em; text-transform: uppercase; color: var(--pickle); font-size: 12px; font-weight: 500; line-height: 1.3; }
  .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .order-btn, .done-btn, .recall-btn {
    background: transparent; border: 1px solid var(--tile-border); color: var(--text);
    border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 4px; text-align: center;
  }
  .order-btn:active, .done-btn:active, .recall-btn:active { opacity: 0.7; }
  .icon-btn { width: 36px; height: 36px; padding: 0; border-radius: 10px; font-size: 16px; }
  .reorder-banner-pill {
    border: 1px solid var(--pickle); color: var(--pickle); border-radius: 10px;
    padding: 6px 12px; font-size: 12px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; display: inline-block;
  }

  /* ---- lineup tab ---- */
  .lineup-body { padding: 8px 16px 16px; }
  .nowup-card {
    width: 100%; text-align: center; border: none; border-radius: 18px;
    background: var(--pickle); color: var(--badge-text);
    /* 40vh ≈ square on the team phone (was 32vh) -- bigger tap target,
       more presence (Jason, 2026-07-07, on-device). */
    padding: 26px 22px; min-height: 40vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; margin-top: 6px;
  }
  .nowup-label { text-transform: uppercase; letter-spacing: 0.1em; font-size: 13px; font-weight: 500; opacity: 0.75; }
  .nowup-name {
    color: var(--card-pop); text-transform: uppercase; font-weight: 500;
    /* Top margin 8 -> 4: all-caps glyphs carry no descenders, so the line
       box's extra headroom made the name sit visually low between the
       label and counter (Jason, 2026-07-07, on-device). */
    font-size: clamp(36px, 11vw, 56px); line-height: 1.05; margin: 4px 0 8px;
    word-break: break-word;
  }
  /* Moved down from the header (2026-07-06) -- was crowding the wordmark
     row for information that reads just as well on the card itself. */
  .nowup-counter { font-size: 13px; opacity: 0.7; margin-bottom: 12px; }
  .nowup-play-icon {
    width: 0; height: 0; margin-bottom: 12px;
    border-top: 15px solid transparent; border-bottom: 15px solid transparent;
    border-left: 24px solid var(--card-pop);
  }
  .nowup-caption { font-size: 13px; opacity: 0.8; }
  /* Playing state: the card itself becomes the stop control (no separate
     Stop/fade button) -- plum accent signals "tap to stop" the same way
     pickle signals "tap to play" elsewhere. */
  .nowup-card.playing { background: var(--plum-fill); color: var(--plum-text); }
  /* Name stays in the pop color in both states -- one consistent "the name
     is the loudest thing on the card" rule. */
  .nowup-card.playing .nowup-name { color: var(--card-pop); }
  .nowup-stop-icon {
    width: 22px; height: 22px;
    /* Same vertical footprint as the 30px play triangle (4 + 22 + 16 =
       0 + 30 + 12): border-box makes this square 8px shorter than the
       border-drawn triangle, and the card's centered flex stack was
       re-centering on the swap -- the name visibly dropped a few px when
       play flipped to stop (2026-07-07, Jason, on-device). */
    margin: 4px 0 16px;
    border: 3px solid var(--plum-text); border-radius: 4px;
  }
  .navbtns { display: flex; gap: 12px; margin-top: 14px; }
  .navbtn {
    flex: 1; background: var(--tile); border: 1px solid var(--tile-border); color: var(--text);
    border-radius: 12px; padding: 16px 8px; font-size: 15px; font-weight: 500;
    text-align: center;
  }
  .navbtn:active { opacity: 0.7; }
  .ondeck { margin-top: 22px; }
  .ondeck-label { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  .ondeck-row { display: flex; gap: 8px; }
  .ondeck-chip {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: var(--tile); border: 1px solid var(--tile-border); border-radius: 12px;
    padding: 10px 6px; font-size: 13px; color: var(--text);
  }
  .ondeck-chip .badge { background: var(--pickle); color: var(--badge-text); }
  .empty-state { padding: 40px 16px; text-align: center; color: var(--muted); }
  .empty-state .done-btn { margin-top: 14px; background: var(--pickle); border-color: var(--pickle); color: var(--badge-text); font-weight: 500; }

  /* ---- badges ---- */
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 500;
    flex-shrink: 0;
  }

  /* ---- grid (shared): individually rounded tiles with real gaps, not a
     hairline-divided table. ---- */
  .grid-hint { color: var(--muted); font-size: 12px; padding: 0 16px 10px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px; }
  .tile {
    position: relative; background: var(--tile); border: 1px solid var(--tile-border);
    border-radius: 14px;
    color: var(--text); font-size: 14px; font-weight: 500; padding: 8px 6px;
    /* FIXED height, both states (2026-07-07, game-1 follow-up): the playing
       tile's extra lines (stop icon + countdown) used to grow its row and
       reshuffle the whole grid mid-game. Idle tiles got taller, the playing
       tile's stack got tighter, and now nothing moves when playback starts
       or stops. Column layout replaced the old flex-wrap hack. */
    height: 78px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; text-align: center; touch-action: manipulation;
  }
  /* Countdown on a playing grid tile: same "lives on the stop control"
     pattern as the NOW UP card's caption (extended to the grid 2026-07-06
     per Jason's request after game 1). */
  .tile-countdown { width: 100%; font-size: 11px; opacity: 0.85; line-height: 1; }
  .tile:active { opacity: 0.85; }
  /* Playing state: the tile itself becomes the stop control -- same plum
     accent as the NOW UP card's playing state, for one consistent
     "plum = tap to stop" signal across both tabs. */
  .tile.playing { border-color: var(--plum-border); color: var(--plum-text); background: var(--plum-fill); }
  /* Stop icon sits on its own line between name and countdown -- mirrors
     the NOW UP card's stack (name -> stop icon -> countdown) so both stop
     controls read as one pattern (2026-07-06 round 4; was inline after
     the name). */
  /* A few px of air above/below the stop icon (2026-07-07, Jason): the
     name/icon/countdown stack read cramped inside the fixed-height tile. */
  .tile.playing .speaker { width: 100%; line-height: 1; margin: 3px 0 5px; /* asymmetric on purpose: the glyph's own headroom makes equal margins read unequal -- tuned on-device to 3 top / 5 bottom (Jason, 2026-07-07) */ }
  .tile.unavailable { color: var(--muted); opacity: 0.5; }
  .guest-wrap { display: flex; justify-content: center; padding: 14px 16px 0; }
  .tile.guest {
    border-style: dashed; color: var(--muted); width: 45%;
    height: auto; min-height: 44px; /* exempt from the fixed tile height */
    padding: 10px 6px;
  }

  /* ---- reorder mode ---- */
  .reorder-actions { padding: 0 16px 10px; }
  .order-tile { touch-action: none; }
  .order-tile .badge { background: var(--pickle); color: var(--badge-text); position: absolute; top: 6px; left: 6px; }
  /* While dragging, the original tile stays in the grid as a dimmed
     placeholder (it's what actually gets reordered); a fixed-position
     ghost copy follows the finger. */
  .order-tile.drag-placeholder { opacity: 0.35; border-style: dashed; }
  .drag-ghost {
    box-shadow: 0 6px 16px rgba(0,0,0,0.5); border-color: var(--pickle);
    opacity: 0.95; z-index: 10;
  }
  .bench-heading { color: var(--muted); font-size: 12px; padding: 16px 16px 8px; }
  .bench-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px; }
  .bench-tile { border-style: dashed; color: var(--muted); }
  .done-wrap { padding: 16px; }
  .done-full {
    width: 100%; background: var(--pickle); color: var(--badge-text); border: none;
    border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 500;
  }
  .done-full:active { opacity: 0.85; }

  /* Segmented-control style tab bar: one pill container, active side gets
     a solid olive "slider" fill, inactive side is plain text in the same
     pill -- not two separate bordered buttons. */
  .tabbar {
    display: flex; gap: 4px; flex-shrink: 0;
    margin: 8px 16px 12px; padding: 4px;
    background: var(--tile); border-radius: 999px;
  }
  .tabbtn {
    flex: 1; background: transparent; border: none; color: var(--muted);
    border-radius: 999px; padding: 10px 8px; font-size: 14px; font-weight: 500;
  }
  .tabbtn.active { background: var(--olive); color: var(--text); }

  .loading-screen {
    position: fixed; inset: 0; background: var(--bg); color: var(--muted);
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    flex-direction: column; gap: 10px;
  }
  .loading-screen .wordmark { font-size: 14px; }

  /* Hidden field-debug readout (5 quick taps on the wordmark). Never
     intercepts taps -- display only. Positioned absolute INSIDE the #app
     card (which is position:fixed, so it's the containing block), floating
     just above the tab bar on its own dark chip -- v1 of this used
     position:fixed/bottom:4px, which landed in the 12px gutter BELOW the
     card, under the home-indicator zone: functionally invisible
     (2026-07-07, caught by Jason on-device). */
  .debug-panel {
    position: absolute; bottom: 64px; left: 10px; right: 10px; z-index: 99;
    font: 11px/1.4 ui-monospace, Menlo, monospace; color: var(--text);
    background: rgba(0, 0, 0, 0.72); border: 1px solid var(--tile-border);
    border-radius: 8px; padding: 4px 8px;
    pointer-events: none; text-align: left;
  }
</style>
</head>
<body>
<div id="loading" class="loading-screen">
  <div class="wordmark">__TEAM_NAME__</div>
  <div>Loading walk-up songs…</div>
</div>
<div id="app" style="display:none;">
  <div id="screen"></div>
  <div class="tabbar">
    <button class="tabbtn" id="tabLineup">Next Up</button>
    <button class="tabbtn" id="tabGrid">All Songs</button>
  </div>
</div>

<script>
'use strict';
const DATA = __PAYLOAD_JSON__;
const STORAGE_PREFIX = 'kickball_v1_';

/* ============================================================
   Pure state-transition functions (unit tested in isolation --
   see test-lineup-logic.js in the project's dev history).
   ============================================================ */
function computeBenched(allIds, order) {
  const inOrder = new Set(order);
  return allIds.filter(id => !inOrder.has(id));
}
function benchPlayer(order, id) {
  return order.filter(x => x !== id);
}
function addToOrder(order, id) {
  if (order.includes(id)) return order.slice();
  return [...order, id];
}
function moveInOrder(order, id, toIndex) {
  const cur = order.filter(x => x !== id);
  const clamped = Math.max(0, Math.min(toIndex, cur.length));
  cur.splice(clamped, 0, id);
  return cur;
}
function resolvePointer(order, pointerId) {
  if (pointerId !== null && order.includes(pointerId)) return pointerId;
  return order.length > 0 ? order[0] : null;
}
function nextPointer(order, pointerId) {
  if (order.length === 0) return null;
  const i = order.indexOf(pointerId);
  if (i === -1) return order[0];
  return order[(i + 1) % order.length];
}
function prevPointer(order, pointerId) {
  if (order.length === 0) return null;
  const i = order.indexOf(pointerId);
  if (i === -1) return order[0];
  return order[(i - 1 + order.length) % order.length];
}
function onDeckIds(order, pointerId, count) {
  count = count || 3;
  if (order.length <= 1) return [];
  const i = order.indexOf(pointerId);
  const start = i === -1 ? 0 : i;
  const n = Math.min(count, order.length - 1);
  const out = [];
  for (let k = 1; k <= n; k++) out.push(order[(start + k) % order.length]);
  return out;
}
function positionLabel(order, pointerId) {
  if (order.length === 0) return null;
  const i = order.indexOf(pointerId);
  if (i === -1) return null;
  return { position: i + 1, total: order.length };
}

/* ============================================================
   Persistence
   ============================================================ */
function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    if (raw === null) return fallback;
    return JSON.parse(raw);
  } catch (e) { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value)); }
  catch (e) { /* storage full/unavailable -- non-fatal, in-memory state still works this session */ }
}

/* ============================================================
   App state
   ============================================================ */
const playersById = {};
DATA.players.forEach(p => { playersById[p.id] = p; });
const allIds = DATA.players.map(p => p.id);

let order = loadJSON('order', []).filter(id => playersById[id]); // drop any stale/unknown ids
let pointerId = resolvePointer(order, loadJSON('pointer', null));
let lastGameOrder = loadJSON('lastGameOrder', null);

const hasSavedOrder = order.length > 0;
// Reorder mode moved under the LINEUP tab (2026-07-07, Jason's game-1
// follow-up): All Songs is now a pure soundboard -- identical whether an
// order exists or not, no route into editing from it at all. Editing is
// entered only from the Next Up screen's order button, and highlights the
// Next Up tab while active. `editing` persists across a mid-edit peek at
// All Songs -- returning to Next Up resumes the editor; Done exits it.
let state = {
  activeTab: 'lineup',
  editing: !hasSavedOrder, // first-launch routing: no saved order -> Next Up opens in the order editor
};

function persistOrder() { saveJSON('order', order); }
function persistPointer() { saveJSON('pointer', pointerId); }

/* ============================================================
   Audio engine
   ============================================================ */
/* Audio context lifecycle (reworked 2026-07-07 after game 1). iOS quirk:
   when the screen locks, WebKit parks the context in a nonstandard
   'interrupted' state -- NOT 'suspended', which was the only state the
   old code checked -- and resume() from 'interrupted' is unreliable:
   long-standing reports of it no-oping forever on user input
   (WebAudio/web-audio-api#2585). This was game 1's "app is dead after
   the phone slept, reboot required": play taps fired into a stopped
   context (silence) and the countdown read a frozen ctx.currentTime.
   So the app never bets on resume(): a context that isn't running at
   play-tap time is torn down and replaced *synchronously inside the
   same tap* -- a context created during a user gesture starts running
   on iOS. Decoded AudioBuffers are context-independent, so the rebuilt
   context reuses them: recovery is the same one tap, no re-decode, no
   reboot. The old context is close()d so WebKit's cap on live contexts
   is never approached. (Buffer reuse across contexts: verify on-device
   during the 2h soak test -- flagged, not assumed.) */
let ctx = null;
let audioRebuilds = 0;        // field-debug readout
let lastAudioEvent = 'boot';  // field-debug readout
function createAudioContext() {
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  // Created outside a gesture (boot) this starts 'suspended'; created
  // inside one it starts 'running'. The synchronous resume() nudge is
  // free either way.
  if (ctx.state !== 'running') { try { ctx.resume(); } catch (e) {} }
  try { ctx.onstatechange = function () { updateDebugPanel(); }; } catch (e) {}
}
function rebuildAudioContext(reason) {
  const old = ctx;
  try { const p = old.close(); if (p && p.catch) p.catch(function () {}); } catch (e) {}
  createAudioContext();
  audioRebuilds++;
  noteAudioEvent('rebuild: ' + reason);
}
createAudioContext();
const buffers = {}; // playerId -> AudioBuffer (survive context rebuilds)
const unavailable = new Set(); // playerId -> decode failed
let currentSource = null;
let currentGain = null;
// Tracks a lineup-triggered clip (played from the NOW UP card) whose pointer
// advance hasn't happened yet -- the card intentionally keeps showing the
// same name until this clip actually finishes (or is stopped), so the
// currently-playing song and the currently-shown name never disagree.
// Overrides played from the Grid tab never touch this.
let pendingLineupSource = null;
let pendingLineupStartPointer = null;
// For the on-card countdown: when the current source started (in the audio
// clock's own time) and how long it runs, so remaining time is computed
// straight from the real audio clock rather than a separate JS timer that
// could drift out of sync with what's actually playing.
let currentStartTime = null;
let currentDuration = null;
// Drives the countdown while something plays; render()'s own bookkeeping
// (below) starts/stops it, so nothing else needs to remember to manage it.
// The tick updates ONLY the countdown's text node -- it must never call
// render(): a full innerHTML teardown 5x/sec means any tap whose
// pointerdown/pointerup straddles a tick lands on a detached node and the
// click silently vanishes (intermittent "dead taps", worst on tap-to-stop,
// which only ever happens while ticking). Each render pass installs a
// fresh update closure for whichever countdown is on screen (NOW UP card
// caption or a playing grid tile), or leaves it null if none is.
let tickInterval = null;
let liveCountdownUpdate = null;
// Double-tap protection: an excited operator's double-tap would otherwise
// read as play + instant tap-to-stop -- song plays for a beat, lineup
// advances past the kicker. Taps-to-stop inside this window are ignored;
// backgrounding and every other stop path are unaffected.
const STOP_TAP_GRACE_MS = 400;
let playStartedAtMs = 0;

function b64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

async function decodeAll() {
  await Promise.all(DATA.players.map(async p => {
    const clip = p.clips[0];
    if (!clip) { unavailable.add(p.id); return; }
    try {
      const arrBuf = b64ToArrayBuffer(clip.data);
      buffers[p.id] = await ctx.decodeAudioData(arrBuf);
    } catch (e) {
      console.error('Failed to decode clip for', p.id, e);
      unavailable.add(p.id);
    }
  }));
}

// If `source` was the lineup clip we're waiting on, advance the lineup
// pointer now (but only if the operator hasn't already manually moved the
// pointer elsewhere via skip/back/on-deck-jump while it was playing -- a
// manual move already resolved this turn, so a second advance would skip
// someone).
function finishLineupIfPending(source) {
  if (pendingLineupSource !== source) return;
  pendingLineupSource = null;
  if (pendingLineupStartPointer !== null && pointerId === pendingLineupStartPointer) {
    pointerId = nextPointer(order, pointerId);
    persistPointer();
  }
  pendingLineupStartPointer = null;
}

// True when the clip actively playing right now *is* the lineup clip for
// the given (currently-displayed) pointer -- i.e. the NOW UP card should
// render as "tap to stop" rather than "tap to play". False if nothing's
// playing, if what's playing is a Grid override, or if a manual skip/back/
// on-deck-jump has already moved the pointer away from whoever's clip is
// still actually playing (see finishLineupIfPending).
function isLineupCardPlaying(id) {
  return currentSource !== null && pendingLineupSource === currentSource && pendingLineupStartPointer === id;
}

// Seconds left in whatever is playing right now (lineup clip or grid
// override), or null if nothing is. Reads straight off the audio clock
// (ctx.currentTime) rather than a wall-clock timer, so it can't drift
// from what's actually audible.
function currentRemainingSeconds() {
  if (!currentSource || currentStartTime === null || currentDuration === null) return null;
  return Math.max(0, currentDuration - (ctx.currentTime - currentStartTime));
}

// Seconds left in the clip currently showing on the card, or null if the
// card isn't the thing playing (idle, or what's playing is a Grid
// override).
function cardRemainingSeconds(id) {
  if (!isLineupCardPlaying(id)) return null;
  return currentRemainingSeconds();
}

function formatCountdown(seconds) {
  const whole = Math.max(0, Math.ceil(seconds));
  const m = Math.floor(whole / 60);
  const s = whole % 60;
  return m + ':' + String(s).padStart(2, '0');
}

// `opts.advanceIfPending` (default true) controls whether this stop counts
// as "finishing the turn" for a pending lineup advance:
//  - Stop/fade button (explicit, nothing replacing the clip): yes, advance.
//  - playClip's own pre-emptive stop of whatever was already playing right
//    before it starts a new clip: no -- the new clip (even a same-person
//    retap) takes over pending-advance bookkeeping itself immediately
//    after, so the interrupted one shouldn't also try to advance.
function stopCurrent(fade, opts) {
  opts = opts || {};
  const advanceIfPending = opts.advanceIfPending !== false;
  if (!currentSource) return;
  const src = currentSource;
  const srcGain = currentGain;
  // Clear bookkeeping *before* actually stopping the node. Stopping a
  // source fires its 'ended' handler -- immediately in some environments,
  // always eventually in real browsers -- and that handler is written to
  // no-op once currentSource no longer points at it. This function is the
  // sole decider of whether *this* stop counts as finishing the turn.
  currentSource = null;
  currentGain = null;
  playingId = null;
  currentStartTime = null;
  currentDuration = null;
  if (fade && srcGain) {
    const now = ctx.currentTime;
    const fadeSec = (DATA.fadeOutMs || 1500) / 1000;
    srcGain.gain.cancelScheduledValues(now);
    srcGain.gain.setValueAtTime(srcGain.gain.value, now);
    srcGain.gain.linearRampToValueAtTime(0.0001, now + fadeSec);
    setTimeout(() => { try { src.stop(); } catch (e) {} }, DATA.fadeOutMs + 60);
  } else {
    try { src.stop(); } catch (e) {}
  }
  if (advanceIfPending) {
    finishLineupIfPending(src);
  } else if (pendingLineupSource === src) {
    pendingLineupSource = null;
    pendingLineupStartPointer = null;
  }
  render();
}

let playingId = null;

async function playClip(playerId, opts) {
  opts = opts || {};
  if (unavailable.has(playerId)) return;
  // Wedged-context recovery -- see the audio-lifecycle note at the top of
  // this section. Everything from here down to source.start() must stay
  // synchronous: an await would leave the user-gesture call stack and iOS
  // would refuse to start the replacement context. 'suspended' and
  // 'interrupted' both take this path; a healthy running context skips it.
  if (ctx.state !== 'running') {
    if (opts._watchdogRetry) {
      // Watchdog replays run outside a gesture, where a fresh context
      // can't be unlocked -- the watchdog already rebuilt; just nudge.
      // If this still fails, the next real tap heals in-gesture.
      try { ctx.resume(); } catch (e) {}
    } else {
      rebuildAudioContext(ctx.state + ' at tap');
    }
  }
  stopCurrent(false, { advanceIfPending: false });
  const buffer = buffers[playerId];
  if (!buffer) return;
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.value = 1;
  source.connect(gain).connect(ctx.destination);
  source.onended = () => {
    if (currentSource === source) {
      currentSource = null; currentGain = null; playingId = null;
      currentStartTime = null; currentDuration = null;
      finishLineupIfPending(source);
      render();
    }
  };
  source.start();
  currentSource = source;
  currentGain = gain;
  playingId = playerId;
  currentStartTime = ctx.currentTime;
  currentDuration = buffer.duration;
  playStartedAtMs = Date.now();
  if (opts.lineup) {
    pendingLineupSource = source;
    pendingLineupStartPointer = playerId;
  } else {
    pendingLineupSource = null;
    pendingLineupStartPointer = null;
  }
  armAudioWatchdog(source, playerId, opts);
  render();
}

// Belt-and-suspenders behind the in-gesture rebuild: if the context still
// isn't running shortly after a play started (a rebuild path that couldn't
// unlock, or a state change that raced the tap), rebuild once more and
// replay the same clip automatically. One retry per tap only -- a second
// failure waits for the next tap rather than looping. The check is
// ctx.state alone (not currentTime advancement): if WebKit reports
// 'running', audio is running.
const AUDIO_WATCHDOG_MS = 600;
function armAudioWatchdog(source, playerId, opts) {
  setTimeout(function () {
    if (currentSource !== source) return; // finished, stopped, or replaced
    if (ctx.state === 'running') return;  // healthy
    noteAudioEvent('watchdog saw ' + ctx.state);
    if (!opts._watchdogRetry) {
      rebuildAudioContext('watchdog');
      playClip(playerId, Object.assign({}, opts, { _watchdogRetry: true }));
    }
  }, AUDIO_WATCHDOG_MS);
}

// iOS forcibly interrupts a backgrounded/standalone web app's AudioContext
// -- confirmed platform behavior, not something a web app can override, so
// audio can never actually keep playing once the app leaves the
// foreground (home button/gesture, app switcher, screen lock). Left alone,
// the paused clip can also resume unexpectedly later and leave the lineup
// pointer stuck on a kicker who already went. So: treat leaving the
// foreground as an explicit stop -- same "this ends the turn" handling as
// tapping to stop -- rather than leaving a half-finished clip in limbo.
// visibilitychange covers backgrounding; pagehide is a defensive backstop
// for actual navigation/close (harmless no-op if already stopped).
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') stopCurrent(false);
});
window.addEventListener('pagehide', () => stopCurrent(false));

/* ============================================================
   Wake Lock (best-effort -- phone auto-lock is set to Never as
   the primary defense; this is belt-and-suspenders, see
   01-Architecture.md "Known risks")
   ============================================================ */
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (e) { /* non-fatal */ }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// Coming back to the foreground: try a free resume() so the first tap
// usually finds a running context already. Opportunistic only -- when it
// silently fails (the known 'interrupted' wedge), the tap-time rebuild in
// playClip is the real fix.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && ctx.state !== 'running') {
    try { const p = ctx.resume(); if (p && p.catch) p.catch(function () {}); } catch (e) {}
  }
});

/* ============================================================
   Field debug readout -- 5 quick taps on the wordmark toggles a
   one-line overlay of live audio-engine state. Costs nothing when
   hidden; exists so a wedged-audio report from the field can say
   *what state the context was in* instead of "it broke".
   ============================================================ */
// Injected by build.py; identical to the service worker's cache id, so the
// readout answers "which build is this phone actually running?" -- the only
// reliable way to confirm an update landed when a change has no visible UI.
const BUILD_ID = '__BUILD_ID__';
let debugPanel = null, debugTimer = null;
let debugTapCount = 0, debugTapLastMs = 0;
function noteAudioEvent(msg) {
  lastAudioEvent = msg + ' @ ' + new Date().toTimeString().slice(0, 8);
  updateDebugPanel();
}
function updateDebugPanel() {
  if (!debugPanel) return;
  debugPanel.textContent =
    'build: ' + BUILD_ID +
    ' · audio: ' + ctx.state +
    ' · rebuilds: ' + audioRebuilds +
    ' · clips: ' + Object.keys(buffers).length + '/' + DATA.players.length +
    ' · last: ' + lastAudioEvent;
}
function toggleDebugPanel() {
  if (debugPanel) {
    if (debugPanel.parentElement) debugPanel.parentElement.removeChild(debugPanel);
    debugPanel = null;
    if (debugTimer) { clearInterval(debugTimer); debugTimer = null; }
    return;
  }
  debugPanel = h('div', { class: 'debug-panel' });
  document.getElementById('app').appendChild(debugPanel);
  updateDebugPanel();
  debugTimer = setInterval(updateDebugPanel, 1000);
}
function wordmarkTapped() {
  const now = Date.now();
  if (now - debugTapLastMs > 1500) debugTapCount = 0;
  debugTapLastMs = now;
  debugTapCount++;
  if (debugTapCount >= 5) { debugTapCount = 0; toggleDebugPanel(); }
}
// Both tab headers render the wordmark through this so the 5-tap debug
// gesture works everywhere without any visible UI surface.
function renderWordmark() {
  return h('div', { class: 'wordmark', text: DATA.team, onclick: wordmarkTapped });
}

/* ============================================================
   Rendering
   ============================================================ */
const screenEl = document.getElementById('screen');

function h(tag, attrs, children) {
  const el = document.createElement(tag);
  attrs = attrs || {};
  for (const k in attrs) {
    if (k === 'class') el.className = attrs[k];
    else if (k === 'text') el.textContent = attrs[k];
    else if (k === 'disabled') {
      // Boolean HTML attribute: presence disables, regardless of value --
      // so it must only be set when truthy, never set (not even to
      // "null"/"false" strings) when falsy. setAttribute('disabled', null)
      // was the bug: it still disables the element, permanently.
      if (attrs[k]) el.setAttribute('disabled', '');
    }
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), attrs[k]);
    else el.setAttribute(k, attrs[k]);
  }
  (children || []).forEach(c => { if (c) el.appendChild(c); });
  return el;
}

function enterReorderMode() {
  state.activeTab = 'lineup';
  state.editing = true;
  render();
}

function renderOrderButton() {
  return h('button', { class: 'order-btn', text: '⇅ order', onclick: enterReorderMode });
}

// Updates just the countdown text in place. See the liveCountdownUpdate
// note above for why this must not be a full render().
function tickCountdown() {
  if (liveCountdownUpdate) liveCountdownUpdate();
}

function render() {
  liveCountdownUpdate = null;
  // Defensive sweep: a drag whose pointer stream dies mid-gesture (seen
  // on-device at game 1: WebKit can stop delivering pointer events after
  // the captured tile has been moved in the DOM repeatedly) can strand
  // its ghost and placeholder styling. Any render -- e.g. tapping Done,
  // or any other tap -- clears strays, so a broken drag can never leave
  // permanent debris on screen.
  const appEl = document.getElementById('app');
  appEl.querySelectorAll('.drag-ghost').forEach(g => {
    if (g.parentElement) g.parentElement.removeChild(g);
  });
  appEl.querySelectorAll('.drag-placeholder').forEach(t => t.classList.remove('drag-placeholder'));
  screenEl.innerHTML = '';
  if (state.activeTab === 'lineup') {
    screenEl.appendChild(state.editing ? renderGridReorder() : renderLineupTab());
  } else {
    screenEl.appendChild(renderGridPlay()); // All Songs: always the soundboard, no modes
  }

  document.getElementById('tabLineup').classList.toggle('active', state.activeTab === 'lineup');
  document.getElementById('tabGrid').classList.toggle('active', state.activeTab === 'grid');
  const inReorder = state.activeTab === 'lineup' && state.editing;
  document.getElementById('app').classList.toggle('reorder-frame', inReorder);

  // Keep the on-card countdown live: start the tick the moment something
  // starts playing, stop it the moment nothing is. Living here (rather
  // than in playClip/stopCurrent) means every path that starts or ends
  // playback automatically keeps this in sync just by calling render(),
  // which they all already do.
  if (currentSource && !tickInterval) {
    tickInterval = setInterval(tickCountdown, 200);
  } else if (!currentSource && tickInterval) {
    clearInterval(tickInterval);
    tickInterval = null;
  }
}

function renderLineupTab() {
  const wrap = h('div', {});
  const top = h('div', { class: 'topbar' }, [
    renderWordmark(),
  ]);

  if (order.length === 0) {
    top.appendChild(h('div', { class: 'topbar-right' }, [renderOrderButton()]));
    wrap.appendChild(top);
    wrap.appendChild(h('div', { class: 'empty-state' }, [
      h('div', { text: 'No lineup set yet.' }),
      h('button', { class: 'done-btn', text: 'Set lineup', onclick: enterReorderMode }),
    ]));
    return wrap;
  }

  const pos = positionLabel(order, pointerId);
  const right = h('div', { class: 'topbar-right' }, [renderOrderButton()]);
  top.appendChild(right);
  wrap.appendChild(top);

  const body = h('div', { class: 'lineup-body' });
  const name = playersById[pointerId] ? playersById[pointerId].name : '—';
  // Advancing to the next kicker's name happens once this clip actually
  // finishes or is stopped (see finishLineupIfPending) -- not immediately
  // on tap -- so the card never shows a name that doesn't match what's
  // playing. While it's playing, the card itself is the stop control:
  // there's no separate Stop/fade button anymore.
  const cardPlaying = isLineupCardPlaying(pointerId);
  const remaining = cardPlaying ? cardRemainingSeconds(pointerId) : null;
  // "fade out", not "stop": stopCurrent(true) really does ramp the clip
  // down over fadeOutMs, and operators unfamiliar with the app hesitate
  // to tap something they think will hard-cut the music (Jason, 2026-07-07).
  const caption = cardPlaying
    ? (remaining !== null ? `${formatCountdown(remaining)} — tap to fade out` : 'tap to fade out')
    : 'tap anywhere to play';
  const captionEl = h('div', { class: 'nowup-caption', text: caption });
  const card = h('button', { class: 'nowup-card' + (cardPlaying ? ' playing' : ''), onclick: () => {
    if (cardPlaying) {
      if (Date.now() - playStartedAtMs < STOP_TAP_GRACE_MS) return; // double-tap guard
      stopCurrent(true);
    }
    else playClip(pointerId, { lineup: true });
  }}, [
    h('div', { class: 'nowup-label', text: 'Now up' }),
    h('div', { class: 'nowup-name', text: name.toUpperCase() }),
    pos ? h('div', { class: 'nowup-counter', text: `${pos.position} of ${pos.total}` }) : null,
    cardPlaying ? h('div', { class: 'nowup-stop-icon' }) : h('div', { class: 'nowup-play-icon' }),
    captionEl,
  ]);
  if (cardPlaying && remaining !== null) {
    const pid = pointerId;
    liveCountdownUpdate = () => {
      const r = cardRemainingSeconds(pid);
      if (r !== null) captionEl.textContent = formatCountdown(r) + ' — tap to fade out';
    };
  }
  body.appendChild(card);

  const nav = h('div', { class: 'navbtns' }, [
    h('button', { class: 'navbtn', text: '⏮ back', onclick: () => {
      pointerId = prevPointer(order, pointerId); persistPointer(); render();
    }}),
    h('button', { class: 'navbtn', text: 'next ⏭', onclick: () => {
      pointerId = nextPointer(order, pointerId); persistPointer(); render();
    }}),
  ]);
  body.appendChild(nav);

  const deckIds = onDeckIds(order, pointerId, 3);
  if (deckIds.length > 0) {
    const ondeck = h('div', { class: 'ondeck' }, [
      h('div', { class: 'ondeck-label', text: 'On deck — tap to jump' }),
    ]);
    const row = h('div', { class: 'ondeck-row' });
    deckIds.forEach(id => {
      const posInOrder = order.indexOf(id) + 1;
      row.appendChild(h('button', { class: 'ondeck-chip', onclick: () => {
        pointerId = id; persistPointer(); render();
      }}, [
        h('span', { class: 'badge', text: String(posInOrder) }),
        h('span', { text: playersById[id].name }),
      ]));
    });
    ondeck.appendChild(row);
    body.appendChild(ondeck);
  }

  wrap.appendChild(body);
  return wrap;
}

function renderGridPlay() {
  const wrap = h('div', {});
  // No order button here (removed 2026-07-07): All Songs is a pure
  // soundboard. Editing the order is a Next Up concern only.
  const top = h('div', { class: 'topbar' }, [
    renderWordmark(),
  ]);
  wrap.appendChild(top);
  wrap.appendChild(h('div', { class: 'grid-hint', text: 'A → Z by row' }));

  const grid = h('div', { class: 'grid' });
  const sorted = [...DATA.players].sort((a, b) => a.name.localeCompare(b.name));
  sorted.forEach(p => {
    const isPlaying = playingId === p.id;
    const isUnavailable = unavailable.has(p.id);
    const cls = 'tile' + (isPlaying ? ' playing' : '') + (isUnavailable ? ' unavailable' : '');
    // Same tap-to-stop pattern as the NOW UP card: a playing tile is its
    // own stop control (works whether the clip is this Grid override or a
    // still-playing lineup clip for the same player -- stopCurrent handles
    // either case correctly).
    // A playing tile carries its own countdown (second line, kept live by
    // the same text-node-only tick as the NOW UP card's caption).
    let countdownEl = null;
    if (isPlaying) {
      const r = currentRemainingSeconds();
      countdownEl = h('span', { class: 'tile-countdown', text: r !== null ? formatCountdown(r) : '' });
      liveCountdownUpdate = () => {
        const rr = currentRemainingSeconds();
        if (rr !== null) countdownEl.textContent = formatCountdown(rr);
      };
    }
    grid.appendChild(h('button', { class: cls, onclick: () => {
      if (isPlaying) {

        stopCurrent(true);
      }
      else playClip(p.id);
    }}, [
      h('span', { text: p.name }),
      isPlaying ? h('span', { class: 'speaker', text: '⏹' }) : null,
      countdownEl,
    ]));
  });
  wrap.appendChild(grid);
  wrap.appendChild(h('div', { class: 'guest-wrap' }, [
    h('button', { class: 'tile guest', onclick: () => {} }, [
      h('span', { text: 'Guest' }),
    ]),
  ]));
  return wrap;
}

function renderGridReorder() {
  const wrap = h('div', {});
  const top = h('div', { class: 'topbar' }, [
    h('div', { class: 'reorder-banner-pill', text: 'Editing order' }),
    h('div', { class: 'topbar-right' }, [

          order = lastGameOrder.filter(id => playersById[id]);

          persistOrder(); persistPointer(); render();
        },
      }),

      h('button', {

  wrap.appendChild(h('div', { class: 'done-wrap' }, [

      // operator actually needs once the lineup is locked in.
      state.editing = false;

      render();
    }}),
  ]));

  const benchedIds = computeBenched(allIds, order).sort((a, b) => playersById[a].name.localeCompare(playersById[b].name));
  wrap.appendChild(h('div', { class: 'bench-heading', text: 'Not playing — tap to add' }));
  const benchGrid = h('div', { class: 'bench-grid' });
  benchedIds.forEach(id => {
    const p = playersById[id];
    benchGrid.appendChild(h('button', { class: 'tile bench-tile', onclick: () => {
      order = addToOrder(order, id);
      pointerId = resolvePointer(order, pointerId);
      persistOrder(); persistPointer(); render();
    }}, [h('span', { text: p.name })]));
  });
  wrap.appendChild(benchGrid);

  return wrap;
}

/* ---- drag-to-reorder (Pointer Events; tap-vs-drag disambiguated by
   movement distance -- see 01-Architecture.md "Interaction algebra":
   drag is never required, tap-out/tap-in alone can reach any order).

   Rebuilt 2026-07-06 after game-1 feedback ("nearly unusable"). Three
   compounding defects in the first version: (1) nothing followed the
   finger -- the tile only teleported when a reshuffle fired, so there was
   no sense of holding anything; (2) the before/after drop test compared
   Y midpoints, which is meaningless between tiles in the same row of a
   3-column grid, so horizontal moves were coin flips; (3) nothing
   suppressed text selection, so iOS treated drags as selection gestures
   (blue ranges + loupe -- see the global user-select:none in the CSS).

   Now: on drag start, a fixed-position ghost copy of the tile follows the
   finger (pointer-events:none, so elementFromPoint sees through it to the
   grid); the original tile stays in the grid as a dimmed placeholder and
   is what actually gets reordered. Hovering another tile moves the
   placeholder by reading-order logic -- dragging forward inserts after
   the hovered tile, dragging backward inserts before it -- and displaced
   tiles FLIP-animate into their new slots so the shuffle reads as motion,
   not a text swap. */
const DRAG_THRESHOLD_PX = 10;

// Measure every order tile, run the DOM mutation, then animate each moved
// tile from its old position to its new one (FLIP). The dragged/placeholder
// tile is excluded -- it should snap, not glide, since the ghost is what
// the eye is following.
function flipTiles(gridEl, exceptTile, mutate) {
  const tiles = Array.from(gridEl.querySelectorAll('.order-tile'));
  const before = new Map();
  tiles.forEach(t => before.set(t, t.getBoundingClientRect()));
  mutate();
  tiles.forEach(t => {
    if (t === exceptTile) return;
    const b = before.get(t), a = t.getBoundingClientRect();
    const dx = b.left - a.left, dy = b.top - a.top;
    if (!dx && !dy) return;
    t.style.transition = 'none';
    t.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
    if (typeof requestAnimationFrame === 'function') {
      requestAnimationFrame(() => requestAnimationFrame(() => {
        t.style.transition = 'transform 150ms ease';
        t.style.transform = '';
      }));
    } else {
      t.style.transition = ''; t.style.transform = '';
    }
  });
}

/* Once a drag is live, move/up/cancel handling shifts from the tile to
   DOCUMENT-level listeners (hardened 2026-07-06 after game-1 round 2:
   long drags left frozen ghosts on screen). Root cause: cleanup hung
   entirely off pointerup firing on the dragged tile, and Safari can stop
   delivering a captured pointer stream after the captured element has
   been moved in the DOM several times -- which is exactly what a long
   drag does. Document listeners survive any DOM churn on the tile; and
   even if the whole event stream dies, render()'s drag-debris sweep
   clears strays on the next tap anywhere. */
function wireDragTile(tile, id, gridEl) {
  let startX = 0, startY = 0, dragging = false, moved = false;
  let ghost = null;
  let lastSwap = null;
  let activePointer = null;

  function startGhost() {
    const rect = tile.getBoundingClientRect();
    ghost = tile.cloneNode(true);
    ghost.classList.add('drag-ghost');
    ghost.style.position = 'fixed';
    ghost.style.left = rect.left + 'px';
    ghost.style.top = rect.top + 'px';
    ghost.style.width = rect.width + 'px';
    ghost.style.height = rect.height + 'px';
    ghost.style.margin = '0';
    ghost.style.pointerEvents = 'none';
    document.getElementById('app').appendChild(ghost);
    tile.classList.add('drag-placeholder');
  }

  function endGhost() {
    if (ghost && ghost.parentElement) ghost.parentElement.removeChild(ghost);
    ghost = null;
    lastSwap = null;
    tile.classList.remove('drag-placeholder');
  }

  function handleMove(e) {
    if (e.preventDefault) e.preventDefault();
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (ghost) ghost.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
    // The ghost is pointer-events:none, so this sees the grid underneath.
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const hoverTile = target ? target.closest('.order-tile') : null;
    if (hoverTile && hoverTile !== tile && hoverTile.parentElement === gridEl) {
      // Only reorder when the hovered tile changes -- prevents flip-flop
      // jitter while the finger sits on a boundary.
      if (hoverTile !== lastSwap) {
        lastSwap = hoverTile;
        const tiles = Array.from(gridEl.querySelectorAll('.order-tile'));
        const from = tiles.indexOf(tile), to = tiles.indexOf(hoverTile);
        if (from !== -1 && to !== -1 && from !== to) {
          flipTiles(gridEl, tile, () => {
            gridEl.insertBefore(tile, from < to ? hoverTile.nextSibling : hoverTile);
          });
        }
      }
    } else if (!hoverTile || hoverTile === tile) {
      lastSwap = null;
    }
  }

  function detachDocHandlers() {
    document.removeEventListener('pointermove', onDocMove);
    document.removeEventListener('pointerup', onDocUp);
    document.removeEventListener('pointercancel', onDocCancel);
  }

  // Commit the drag. Idempotent (dragging flag) because in a real browser
  // the same pointerup can reach both a tile listener and these document
  // listeners via bubbling.
  function finishDrag() {
    if (!dragging) return;
    dragging = false;
    detachDocHandlers();
    endGhost();
    // If some other tap rebuilt the UI mid-drag (e.g. a second finger hit
    // Done), the old grid is detached -- committing its order would
    // resurrect stale state. Just re-render and drop this drag.
    if (tile.isConnected === false) { render(); return; }
    // Read the tiles' final DOM order back into `order`.
    const newOrder = Array.from(gridEl.querySelectorAll('.order-tile')).map(t => t._playerId);
    if (newOrder.length === order.length) {
      order = newOrder;
      pointerId = resolvePointer(order, pointerId);
      persistOrder(); persistPointer();
    }
    render();
  }

  function cancelDrag() {
    if (!dragging) return;
    dragging = false;
    detachDocHandlers();
    endGhost();
    render(); // re-sync DOM from state -- the interrupted drag is discarded
  }

  function onDocMove(e) { if (e.pointerId === activePointer) handleMove(e); }
  function onDocUp(e) { if (e.pointerId === activePointer) finishDrag(); }
  function onDocCancel(e) { if (e.pointerId === activePointer) cancelDrag(); }

  tile.addEventListener('pointerdown', (e) => {
    startX = e.clientX; startY = e.clientY; moved = false; dragging = false;
    activePointer = e.pointerId;
    try { tile.setPointerCapture(e.pointerId); } catch (err) {}
  });

  tile.addEventListener('pointermove', (e) => {
    if (dragging) { if (e.preventDefault) e.preventDefault(); return; } // document handlers own the drag
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (Math.hypot(dx, dy) > DRAG_THRESHOLD_PX) {
      dragging = true; moved = true;
      startGhost();
      document.addEventListener('pointermove', onDocMove);
      document.addEventListener('pointerup', onDocUp);
      document.addEventListener('pointercancel', onDocCancel);
      handleMove(e);
    }
  });

  tile.addEventListener('pointerup', (e) => {
    try { tile.releasePointerCapture(e.pointerId); } catch (err) {}
    if (dragging) return; // finishDrag runs via the document listener for this same event
    if (!moved) {
      // Tap (no meaningful movement): bench this player.
      order = benchPlayer(order, id);
      pointerId = resolvePointer(order, pointerId);
      persistOrder(); persistPointer(); render();
    }
  });

  tile.addEventListener('pointercancel', () => {
    if (!dragging) render(); // drag path cleans up via the document listener
  });

  tile._playerId = id;
}

/* ============================================================
   Tab bar wiring
   ============================================================ */
// Next Up shows the editor if an edit is in progress (state.editing),
// otherwise the play card. All Songs is unconditionally the soundboard
// (firm principle 5: the grid never blocks -- no modes, no special cases,
// identical with a full, partial, or empty order). A mid-edit peek at All
// Songs and back resumes the editor; only Done ends it.
document.getElementById('tabLineup').addEventListener('click', () => { state.activeTab = 'lineup'; render(); });
document.getElementById('tabGrid').addEventListener('click', () => {
  state.activeTab = 'grid';
  render();
});

/* ============================================================
   Boot
   ============================================================ */
decodeAll().then(() => {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  requestWakeLock();
  render();
}).catch(err => {
  console.error('Fatal error decoding clips', err);
  document.getElementById('loading').textContent = 'Something went wrong loading the songs. Try reloading.';
});

/* Register the service worker so the app keeps working with zero network
   at the park -- Add to Home Screen alone only bookmarks a URL; without
   this, a relaunch with no connectivity has nothing to re-fetch. Requires
   a secure context (https:// or localhost), which GitHub Pages provides.
   Non-fatal if unsupported -- the app still runs, just without the
   offline-relaunch guarantee. */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => {
      console.error('Service worker registration failed', err);
    });
  });
}
</script>
</body>
