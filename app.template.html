<script>
'use strict';
const DATA = __PAYLOAD_JSON__;
const STORAGE_PREFIX = 'kickball_v1_';

/* ============================================================
   Pure state-transition functions (unit tested in isolation --
   see test-lineup-logic.js in the project's dev history).
   ============================================================ */
function computeBenched(allIds, order) {
  const inOrder = new Set(order);
  return allIds.filter(id => !inOrder.has(id));
}
function benchPlayer(order, id) {
  return order.filter(x => x !== id);
}
function addToOrder(order, id) {
  if (order.includes(id)) return order.slice();
  return [...order, id];
}
function moveInOrder(order, id, toIndex) {
  const cur = order.filter(x => x !== id);
  const clamped = Math.max(0, Math.min(toIndex, cur.length));
  cur.splice(clamped, 0, id);
  return cur;
}
function resolvePointer(order, pointerId) {
  if (pointerId !== null && order.includes(pointerId)) return pointerId;
  return order.length > 0 ? order[0] : null;
}
function nextPointer(order, pointerId) {
  if (order.length === 0) return null;
  const i = order.indexOf(pointerId);
  if (i === -1) return order[0];
  return order[(i + 1) % order.length];
}
function prevPointer(order, pointerId) {
  if (order.length === 0) return null;
  const i = order.indexOf(pointerId);
  if (i === -1) return order[0];
  return order[(i - 1 + order.length) % order.length];
}
function onDeckIds(order, pointerId, count) {
  count = count || 3;
  if (order.length <= 1) return [];
  const i = order.indexOf(pointerId);
  const start = i === -1 ? 0 : i;
  const n = Math.min(count, order.length - 1);
  const out = [];
  for (let k = 1; k <= n; k++) out.push(order[(start + k) % order.length]);
  return out;
}
function positionLabel(order, pointerId) {
  if (order.length === 0) return null;
  const i = order.indexOf(pointerId);
  if (i === -1) return null;
  return { position: i + 1, total: order.length };
}

/* ============================================================
   Persistence
   ============================================================ */
function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    if (raw === null) return fallback;
    return JSON.parse(raw);
  } catch (e) { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value)); }
  catch (e) { /* storage full/unavailable -- non-fatal, in-memory state still works this session */ }
}

/* __SCORING_START__ */
/* ============================================================
   Scoring event log + replay engine
   (05-Scoring-Architecture.md "Event sourcing" / §Assumption engine;
   06-Scoring-Specs.md S1 item 2). Append-only; every user action is one
   event; ALL derived state -- score, outs, runners, stats -- is computed
   by deriveState() replaying the log from scratch. No derived quantity is
   ever stored. Stripped from the artifact entirely by build.py's
   strip_scoring_blocks() when scoring.enabled is false -- these markers
   are what it matches; keep every scoring-only addition inside them.
   ============================================================ */
const SCORING_STORAGE_KEY = 'scoringEvents_v1';
const HIT_BASES = { '1B': 1, '2B': 2, '3B': 3, 'HR': 4 };
const OUT_RESULTS = new Set(['FLY', 'GND', 'K']);

function loadScoringEvents() { return loadJSON(SCORING_STORAGE_KEY, []); }
function saveScoringEvents(events) { saveJSON(SCORING_STORAGE_KEY, events); }

// Local id generator -- unique within one device's own array, which is all
// appendScoringEvent/amend/undo need for S1 (offline, single device). Real
// cross-device uniqueness for sync comes from the (game_id, device_id, seq)
// tuple once S2 lands; not crypto.randomUUID, which isn't guaranteed on the
// team phone's old Safari.
let _scoringIdCounter = 0;
function scoringEventId() {
  _scoringIdCounter += 1;
  return 'e' + Date.now().toString(36) + '_' + _scoringIdCounter + '_' + Math.random().toString(36).slice(2, 8);
}

// Appends one event and persists synchronously -- same "lands in
// localStorage with the tap" guarantee as the rest of the app's saveJSON
// pattern (architecture doc "Sync layer": local-first, always).
function appendScoringEvent(events, type, payload) {
  const evt = { id: scoringEventId(), seq: events.length + 1, ts: new Date().toISOString(), type: type, payload: payload || {} };
  const next = events.concat([evt]);
  saveScoringEvents(next);
  return next;
}

function eventIdentity(e, idx) {
  return (e.id !== undefined && e.id !== null) ? e.id : ('_idx' + idx);
}

// Pure, no mutation: pushes every runner at base >= fromBase forward by
// `delta`, highest base first so a pushed runner is never overwritten by
// another mid-push. Runners pushed to base 4+ score. Shared by the replay
// engine (hits push existing runners; manual advances push blocked lead
// runners -- "a trailing runner may never pass a lead runner") and the
// UI's legal-move/cascade-subtitle preview below: one implementation, so
// "legal" always matches what actually happens on replay.
function runnerAtBase(runners, base) {
  return Object.keys(runners).find(id => runners[id] === base) || null;
}

function applyRunnerPush(runners, fromBase, delta) {
  const next = Object.assign({}, runners);
  const scored = [];
  const ids = Object.keys(next).filter(id => next[id] >= fromBase);
  ids.sort((a, b) => next[b] - next[a]);
  ids.forEach(id => {
    const nb = next[id] + delta;
    delete next[id];
    if (nb >= 4) scored.push(id); else next[id] = nb;
  });
  return { runners: next, scored: scored };
}

// Chain semantics for MANUAL forward sets (2026-07-08 session, audit find
// + Jason sign-off pass): the tapped runner moves to `to`; every runner
// they'd PASS (bases in (from, to]) is carried along ahead of them -- a
// trailing runner never passes a lead runner without carrying them -- but
// runners already BEYOND the target hold their base unless a carried
// runner actually lands on them, in which case they're bumped one base at
// a time (scoring past home). This replaces uniform applyRunnerPush for
// sets: uniform push moved EVERY runner ahead of the mover by the full
// delta, which wrongly scored an unblocked runner on 3rd when a trailing
// runner was corrected 1st->2nd (runners on the corners -- the most common
// board in the game). Same class of fix as the force-chain-only 1B rule.
// Hits (2B/3B) keep uniform push deliberately -- that's the assumption
// engine's documented default, corrected after the fact via sets.
function applyChainForwardSet(runners, playerId, to) {
  const before = Object.assign({}, runners);
  const next = Object.assign({}, runners);
  const delta = to - before[playerId];
  const scored = [];
  const movements = [];
  // Bumps the (possibly chained) stationary occupants of `base` up one,
  // highest first, scoring anyone bumped past 3rd.
  function bumpChainFrom(base) {
    const chain = [];
    let b = base;
    while (b <= 3) {
      const occ = runnerAtBase(next, b);
      if (!occ) break;
      chain.push([occ, b]);
      b += 1;
    }
    for (let i = chain.length - 1; i >= 0; i--) {
      const id = chain[i][0], cb = chain[i][1];
      delete next[id];
      if (cb + 1 >= 4) { scored.push(id); movements.push({ playerId: id, from: cb, to: null, scored: true }); }
      else { next[id] = cb + 1; movements.push({ playerId: id, from: cb, to: cb + 1, scored: false }); }
    }
  }
  // The moving group: the tapped runner plus anyone they'd pass, lead-most
  // first so gaps inside the group are preserved and members never collide
  // with each other.
  const group = Object.keys(next)
    .filter(id => next[id] >= before[playerId] && next[id] <= to)
    .sort((a, b) => next[b] - next[a]);
  group.forEach(id => { delete next[id]; });
  group.forEach(id => {
    const nb = before[id] + delta;
    if (nb >= 4) { scored.push(id); movements.push({ playerId: id, from: before[id], to: null, scored: true }); return; }
    bumpChainFrom(nb);
    next[id] = nb;
    movements.push({ playerId: id, from: before[id], to: nb, scored: false });
  });
  return { runners: next, scored: scored, movements: movements };
}

// S1.5 round 7 (Jason, live feedback): legal ABSOLUTE targets for a runner
// correction, replacing the relative-delta legalAdvanceBases/
// previewRunnerAdvance pair. This is what makes tap-a-base possible (a
// target is just a base number, not a delta-plus-preview) AND fixes the
// order-of-operations bug a relative delta had: a STORED "+1" replays
// relative to whatever the runner's base happens to be at replay time,
// which drifted if an earlier event (e.g. the PA that force-advanced them)
// got undone afterward. A stored "to: 3" always means 3rd, full stop.
//
// True when walking a runner from `fromBase` down to `toBase` would land
// on OR pass another runner -- both are physically impossible (a runner
// can no more retreat through a teammate than advance through one).
// Round 2 fix (Jason, on-device 2026-07-08): the original backward rule
// only checked the TARGET base, so a runner walked back from home could
// "skip past" a trailing runner to an open base behind them (Marcel,
// scored from 3rd, offered 1st with Penny standing on 2nd). Backward
// legality now stops at the first occupied base. Used by both target
// computation below AND the replay engine, so "legal" always matches what
// replay actually applies.
function backwardBlocked(runners, fromBase, toBase) {
  for (let b = toBase; b < fromBase; b++) {
    if (runnerAtBase(runners, b)) return true;
  }
  return false;
}

// Forward targets (base+1 .. home) use chain semantics
// (applyChainForwardSet above) -- passed runners are carried along;
// runners beyond the target hold unless actually collided into. Backward
// targets: the runner moves ALONE, only down to open bases SHORT of the
// nearest trailing runner (backwardBlocked above) -- correcting an
// over-advance never displaces or passes a teammate.
function legalSetTargets(runners, playerId) {
  const base = runners[playerId];
  if (base === undefined) return [];
  const out = [];
  for (let b = base + 1; b <= 4; b++) out.push(b);
  for (let b = base - 1; b >= 1; b--) {
    if (runnerAtBase(runners, b)) break; // occupied: this and everything behind it is unreachable
    out.push(b);
  }
  return out.sort((a, b) => a - b);
}

// Legal bases a SCORED runner can be walked back to (2026-07-08 session:
// the "auto-scored on the assumption engine's double, but really held at
// 3rd" correction -- reached by tapping home plate). Same backward rules,
// from home: open bases down to the nearest trailing runner only.
function legalReturnTargets(runners) {
  const out = [];
  for (let b = 3; b >= 1; b--) {
    if (runnerAtBase(runners, b)) break;
    out.push(b);
  }
  return out.sort((a, b) => a - b);
}

// The load-bearing function: replays the entire event log into one
// authoritative state object. Cheap enough to call fresh on every render
// while a game is live (a season's worth of events is a few thousand rows
// at most) -- that's what makes undo/amend/sync-merge structural rather
// than special-cased (architecture doc "Event sourcing").
function deriveState(events) {
  // Pass 1: collect tombstones and amendments, keyed by target identity,
  // before touching any real state -- undo/amend are meta-events that
  // change how OTHER events replay, not state transitions of their own.
  const tombstoned = new Set();
  const amendments = {};
  events.forEach(e => {
    if (e.type === 'undo') {
      const t = e.payload && e.payload.target_event_id;
      if (t !== undefined && t !== null) tombstoned.add(t);
    }
  });
  events.forEach((e, i) => {
    if (e.type === 'amend') {
      // A tombstoned amend never applies (2026-07-08 hardening) -- no UI
      // path produces an undo-of-an-amend today, but S2's multi-device
      // merge could replay one, and silently honoring a dead amendment
      // would be exactly the class of quiet corruption event sourcing
      // exists to prevent.
      if (tombstoned.has(eventIdentity(e, i))) return;
      const t = e.payload && e.payload.target_event_id;
      if (t === undefined || t === null) return;
      amendments[t] = Object.assign(amendments[t] || {}, e.payload);
      delete amendments[t].target_event_id;
    }
  });

  const st = {
    lineup: [], lineupPointer: 0,
    inning: 1, half: 'us', outs: 0,
    scoreUs: 0, scoreThem: 0,
    // thisHalfRunsThem / thisHalfRunsUs: runs scored in the CURRENT half
    // only (each resets when its own half begins) -- mercy-rule awareness
    // (06-Scoring-Specs.md S1.4 defense; offense indicator added per
    // Jason's live feedback 2026-07-07) is per-half, separate from the
    // running game totals.
    thisHalfRunsThem: 0,
    thisHalfRunsUs: 0,
    runners: {},
    paLog: [], runsLog: [],
    // Per-inning run tallies for the scorecard's line score (2026-07-08
    // round 5). Objects keyed by inning number, not arrays -- innings can
    // exceed `innings` in extras and adjust events don't touch these
    // (a score adjust has no inning attribution; known, accepted gap).
    runsByInning: { us: {}, them: {} },
    lastAction: null,
    gameStarted: false, gameEnded: false,
    opponent: '', innings: 7,
    finalUs: null, finalThem: null,
    rosterOverlay: [],
    scheduleGameId: null,
  };

  function creditRun(playerId, record, inferred) {
    st.scoreUs += 1;
    st.thisHalfRunsUs += 1; // creditRun only ever fires for our own runs
    // Entries are objects (2026-07-08 session; were bare playerId strings):
    // un-scoring (unscoreRun below) needs to know WHICH credit to reverse --
    // the paLog record it credited an RBI to, whether that RBI was
    // inferred, and the half it happened in (the same-half guard is what
    // keeps a stale `set` from clawing back a legitimate run scored
    // innings earlier).
    st.runsLog.push({ playerId: playerId, record: record || null, inferred: !!inferred, inning: st.inning, half: st.half });
    st.runsByInning.us[st.inning] = (st.runsByInning.us[st.inning] || 0) + 1;
    // Scorecard mark (round 5): the run also lights up the SCORER's own
    // most recent at-bat cell (solid diamond on the scorecard). Stash the
    // record ref on the runsLog entry so unscoreRun can flip it back.
    const en = st.runsLog[st.runsLog.length - 1];
    for (let i = st.paLog.length - 1; i >= 0; i--) {
      if (st.paLog[i].playerId === playerId) { st.paLog[i].kickerScored = true; en.scorerRecord = st.paLog[i]; break; }
    }
    if (record) {
      record.rbi += 1;
      if (inferred) record.inferredRbi += 1;
    }
  }
  // Reverses the most recent SAME-HALF run credit for a player -- the
  // engine half of "the assumption engine scored them, but the operator
  // observed otherwise" (2026-07-08 session; Jason's Megan/Ming scenario:
  // amending a 1B to a 2B re-pushed home a runner whose manual "set to
  // 3rd" observation was recorded before the amend -- the observation must
  // win over the assumption). Returns the reversed entry, or null when no
  // same-half credit exists, in which case the caller treats the event as
  // stale and no-ops -- same convention as every other stale-correction
  // path. `placedAtBase` (or null for out-at-home) rewrites the crediting
  // PA's own movement line so the recap chip reads the corrected reality
  // ("Ming 2nd→3rd"), not a stale "Ming scored".
  // The most recent run credit of the current half -- the ONLY run the
  // un-scoring paths may touch (round 3, Jason 2026-07-08: scorers can
  // only be walked back in the reverse order they crossed the plate, one
  // at a time -- pulling a mid-order scorer off the board while later
  // scorers stay home is physically impossible, and was producing
  // teleported runners in his grand-slam tests).
  function lastSameHalfRunEntry() {
    for (let i = st.runsLog.length - 1; i >= 0; i--) {
      const en = st.runsLog[i];
      if (en.inning === st.inning && en.half === st.half) return en;
    }
    return null;
  }
  function unscoreRun(playerId, placedAtBase) {
    for (let i = st.runsLog.length - 1; i >= 0; i--) {
      const en = st.runsLog[i];
      if (en.playerId !== playerId || en.inning !== st.inning || en.half !== st.half) continue;
      st.runsLog.splice(i, 1);
      st.scoreUs -= 1;
      st.thisHalfRunsUs -= 1;
      st.runsByInning.us[en.inning] = (st.runsByInning.us[en.inning] || 1) - 1;
      if (en.scorerRecord) en.scorerRecord.kickerScored = false;
      if (en.record) {
        en.record.rbi -= 1;
        if (en.inferred) en.record.inferredRbi -= 1;
        (en.record.movements || []).forEach(m => {
          if (m.playerId === playerId && m.scored) { m.scored = false; m.to = placedAtBase; }
        });
      }
      return en;
    }
    return null;
  }
  // Pushes runners at base >= fromBase by `delta`, credits anyone who
  // scores, and returns a movements[] list ({playerId, from, to, scored})
  // for the last-action recap text -- `to: null` means scored.
  function pushAndCredit(fromBase, delta, record, inferred) {
    const before = Object.assign({}, st.runners);
    const result = applyRunnerPush(st.runners, fromBase, delta);
    st.runners = result.runners;
    const moved = [];
    Object.keys(before).filter(id => before[id] >= fromBase).forEach(id => {
      if (st.runners[id] !== undefined) moved.push({ playerId: id, from: before[id], to: st.runners[id], scored: false });
      else moved.push({ playerId: id, from: before[id], to: null, scored: true });
    });
    result.scored.forEach(id => creditRun(id, record, inferred));
    moved.forEach(m => { if (!m.scored) setKickerBase(m.playerId, m.to); }); // scorecard edge fills (iteration 2)
    return moved;
  }
  // Force-chain for 1B only (Jason, 2026-07-07 live feedback): a runner is
  // forced to advance one base ONLY if the base behind them was occupied,
  // cascading from 1st -- so a runner on 3rd with 1st/2nd empty simply
  // holds on a single (e.g. a ball hit to the left side), rather than
  // being auto-pushed like the old uniform-delta model. 2B/3B/HR keep the
  // uniform push deliberately (an extra-base hit overwhelmingly clears the
  // bases in practice; scoped narrowly per Jason's explicit example, not
  // generalized to every hit type).
  function forcedBasesFor1B(runners) {
    const forced = new Set();
    if (runnerAtBase(runners, 1)) {
      forced.add(1);
      if (runnerAtBase(runners, 2)) {
        forced.add(2);
        if (runnerAtBase(runners, 3)) forced.add(3);
      }
    }
    return forced;
  }
  function advanceLineupPointer() {
    if (st.lineup.length === 0) return;
    st.lineupPointer = (st.lineupPointer + 1) % st.lineup.length;
  }
  // 3-out flip applies identically to either half (invariant-style shared
  // path): clear the diamond and outs; flip 'us'->'them' same inning, or
  // 'them'->'us' with the inning incrementing.
  function flipHalfIfThreeOuts() {
    if (st.outs < 3) return;
    // Scorecard mark (round 5): the third-out corner triangle lives on the
    // cell of whichever at-bat was current when OUR half ended.
    if (st.half === 'us') {
      const r = mostRecentPaRecord();
      if (r) r.endedHalf = true;
    }
    st.outs = 0;
    st.runners = {};
    if (st.half === 'us') {
      st.half = 'them';
      st.thisHalfRunsThem = 0; // fresh tally for the half that's about to start
    } else {
      st.half = 'us'; st.inning += 1;
      st.thisHalfRunsUs = 0; // fresh tally for the half that's about to start
    }
  }
  // Scorecard mark (round 5): a runner erased from the bases (or out at
  // home) gets the plum ✕ on their own most recent at-bat cell.
  function markKickerOut(playerId) {
    for (let i = st.paLog.length - 1; i >= 0; i--) {
      if (st.paLog[i].playerId === playerId) {
        st.paLog[i].kickerOut = true;
        // Both call sites increment st.outs immediately before calling
        // this, so it's already the right ordinal for the corner badge.
        st.paLog[i].outNumberInHalf = st.outs;
        return;
      }
    }
  }
  // Scorecard mark (iteration 2, Jason: "advancement to 2nd/3rd isn't
  // reflected until they score"): every runner movement -- force chains,
  // pushes from hits, manual sets forward OR backward, un-score
  // walk-backs -- writes the runner's CURRENT base onto their most recent
  // at-bat record. Chronological replay means last write wins, so the
  // cell's edge fills always show the corrected truth, not a historical
  // max.
  function setKickerBase(playerId, base) {
    for (let i = st.paLog.length - 1; i >= 0; i--) {
      if (st.paLog[i].playerId === playerId) { st.paLog[i].reachedBase = base; return; }
    }
  }
  // The "previous kicker" for the correction UI's redirect rule: the most
  // recent real PA (SKIP excluded -- it was never a plate appearance).
  function mostRecentPaRecord() {
    for (let i = st.paLog.length - 1; i >= 0; i--) {
      if (st.paLog[i].result !== 'SKIP') return st.paLog[i];
    }
    return null;
  }

  events.forEach((rawEvent, idx) => {
    const identity = eventIdentity(rawEvent, idx);
    if (tombstoned.has(identity)) return; // tombstoned: replay as if it never happened
    const e = amendments[identity]
      ? Object.assign({}, rawEvent, { payload: Object.assign({}, rawEvent.payload, amendments[identity]) })
      : rawEvent;
    const p = e.payload || {};

    if (e.type === 'game_start') {
      // A fresh game_start resets per-game fields (score, outs, runners,
      // paLog/runsLog) -- deriveState() run against a local device's full
      // array always reflects the CURRENT (most recent) game only.
      st.lineup = (p.lineup || []).slice();
      st.lineupPointer = 0;
      st.inning = 1; st.half = 'us'; st.outs = 0;
      st.scoreUs = 0; st.scoreThem = 0; st.thisHalfRunsThem = 0; st.thisHalfRunsUs = 0; st.runners = {};
      st.paLog = []; st.runsLog = [];
      st.gameStarted = true; st.gameEnded = false;
      st.opponent = p.opponent || ''; st.innings = p.innings || 7;
      st.finalUs = null; st.finalThem = null;
      // S1.6 / 07-Portal-Architecture.md: links this game to its manifest
      // schedule fixture; absent for the "unscheduled game" fallback.
      st.scheduleGameId = p.scheduleGameId || null;
    } else if (e.type === 'lineup_set') {
      // S1.6 addition (2026-07-12, Jason sign-off): the tap-to-draft
      // editor's Done commit for a MID-GAME lineup edit -- add/remove/
      // reorder existing or newly-added (player_add) players. One event
      // per commit, payload {lineup:[playerId,...]}, mirroring game_start's
      // own lineup field exactly -- keeps the append-only/one-event-per-
      // action pattern rather than one event per drag/tap. Not in
      // 05-Scoring-Architecture.md's original event table; documented here
      // and flagged for that doc's amendment. The current batter (if any)
      // is carried forward by identity, not index, so an edit that only
      // reorders/adds around them never visibly "moves the pointer" --
      // the UI itself refuses to let the current batter be removed, so
      // they're always still present in the new list.
      const currentBatter = st.lineup[st.lineupPointer];
      st.lineup = (p.lineup || []).slice();
      const idx = st.lineup.indexOf(currentBatter);
      st.lineupPointer = idx !== -1 ? idx : 0;
    } else if (e.type === 'pa') {
      const result = p.result, batter = p.playerId;
      if (result === 'SKIP') {
        // No PA happened -- pointer advances, excluded from every stat.
        st.lastAction = { kind: 'pa', playerId: batter, result: result, eventIdx: idx };
        advanceLineupPointer();
        return;
      }
      const record = {
        eventIdx: idx, id: identity, playerId: batter, result: result,
        inning: p.inning, half: p.half, rbi: 0, inferredRbi: 0, location: p.location || null,
        movements: [],
        // Scorecard cell state (round 5): all recomputed fresh each
        // replay, so corrections re-derive the scorecard for free.
        // reachedBase = the kicker's CURRENT base (updated by every later
        // force/push/set -- see setKickerBase, iteration 2).
        kickerScored: false, kickerOut: false, endedHalf: false,
        reachedBase: HIT_BASES[result] || 0,
        // Which out of the half-inning this was (1/2/3), for the
        // scorecard's small corner badge -- null until/unless this record
        // is the one that actually produced an out (stamped here for a
        // FLY/GND/K result, or by markKickerOut for a basepath/home out on
        // a PREVIOUS record). 2026-07-13, Jason.
        outNumberInHalf: null,
        // Board as it stood when this kicker stepped up (round 2,
        // 2026-07-08): the last-action chip renders the NET assessment of
        // this at-bat -- pre-PA board vs. the current board -- so manual
        // corrections made afterward fold into one honest recap instead
        // of replacing it.
        runnersBefore: Object.assign({}, st.runners),
      };
      st.paLog.push(record);
      if (result === '1B') {
        // Force-chain only (see forcedBasesFor1B) -- process forced bases
        // highest-first so a forced runner is never overwritten mid-cascade.
        const forced = forcedBasesFor1B(st.runners);
        [3, 2, 1].forEach(b => {
          if (!forced.has(b)) return;
          const pid = runnerAtBase(st.runners, b);
          if (!pid) return;
          const nb = b + 1;
          delete st.runners[pid];
          if (nb >= 4) { creditRun(pid, record, false); record.movements.push({ playerId: pid, from: b, to: null, scored: true }); }
          else { st.runners[pid] = nb; record.movements.push({ playerId: pid, from: b, to: nb, scored: false }); setKickerBase(pid, nb); }
        });
        st.runners[batter] = 1;
      } else if (HIT_BASES[result]) {
        // 2B/3B/HR: uniform push, unchanged (see forcedBasesFor1B's comment).
        const delta = HIT_BASES[result];
        record.movements = pushAndCredit(1, delta, record, false);
        if (delta < 4) st.runners[batter] = delta;
        else creditRun(batter, record, false); // HR: batter scores too
      } else if (OUT_RESULTS.has(result)) {
        st.outs += 1; // FLY/GND/K: runners hold, deliberately (see architecture doc)
        record.outNumberInHalf = st.outs;
      } // MISSED: runners hold, no out -- counts as PA, never AB (honest denominators)
      st.lastAction = { kind: 'pa', playerId: batter, result: result, eventIdx: idx, movements: record.movements, rbi: record.rbi };
      advanceLineupPointer();
      flipHalfIfThreeOuts();
    } else if (e.type === 'runner' || e.type === 'runner_out_hit_stands') {
      // runner_out_hit_stands is the architecture doc's name for the
      // rundown case; it's the same effect as `runner`/action:"out" (hit
      // stays in stats, out increments, runner leaves the bases), so both
      // event-type spellings converge here.
      const pid = p.playerId;
      const action = e.type === 'runner_out_hit_stands' ? 'out' : p.action;
      if (st.runners[pid] === undefined) {
        // Runner isn't on base at this point in the replay. Two real cases
        // (2026-07-08 session) before the stale/duplicate no-op:
        //
        // 1. `set` for a runner THIS replay scored earlier in the SAME
        //    half. A set is an absolute observation ("this runner ended up
        //    on base N") and must win over the assumption engine -- the
        //    canonical trigger is Jason's Megan/Ming scenario: 1B logged,
        //    runner manually set to 3rd, then the 1B amended to a 2B; the
        //    amended replay pushes the runner home BEFORE the set replays.
        //    Un-score the run and place them where the operator said.
        //    Guards: same-half credit must exist, target base 1-3 and
        //    unoccupied (backward-move rules) -- otherwise stale no-op.
        //
        // 2. `out` with payload.scored (only the scored-runner correction
        //    sheet appends this flag): "actually out at home" -- run comes
        //    off the board, out goes up. The flag gate keeps a duplicate
        //    plain runner-out from ever clawing back an earlier legit run.
        // Reverse-order guard (round 3): only the MOST RECENT same-half
        // scorer can be un-scored. Anything else is stale/illegal -- the
        // UI can't produce it, but a replay against amended history could.
        const lastRun = lastSameHalfRunEntry();
        const isLastScorer = !!(lastRun && lastRun.playerId === pid);
        if (action === 'set' && isLastScorer && typeof p.to === 'number' && p.to >= 1 && p.to <= 3 && !backwardBlocked(st.runners, 4, p.to)) {
          if (!unscoreRun(pid, p.to)) return; // no same-half run to reverse: stale
          st.runners[pid] = p.to;
          setKickerBase(pid, p.to); // scorecard edge fills track the corrected truth
          st.lastAction = { kind: 'runner_return', playerId: pid, eventIdx: idx, movements: [{ playerId: pid, from: null, to: p.to, scored: false }] };
        } else if (action === 'out' && p.scored && isLastScorer) {
          if (!unscoreRun(pid, null)) return; // no same-half run to reverse: stale
          st.outs += 1;
          markKickerOut(pid);
          st.lastAction = { kind: 'runner_out_at_home', playerId: pid, eventIdx: idx };
          flipHalfIfThreeOuts();
        }
        return; // anything else: stale/duplicate tap, no-op
      }
      if (action === 'out') {
        delete st.runners[pid];
        st.outs += 1;
        markKickerOut(pid);
        st.lastAction = { kind: 'runner_out', playerId: pid, eventIdx: idx };
        flipHalfIfThreeOuts();
      } else if (action === 'set') {
        // S1.5 round 7: absolute target base, replacing the old relative
        // "advance by N bases" action (05-Scoring-Architecture.md
        // amendment). Computed fresh against THIS replay's current base --
        // not stored as a delta -- so a "set to 3rd" always lands on 3rd
        // even if an earlier event (e.g. the force-advance that originally
        // put them on 2nd) has since been undone.
        const fromBase = st.runners[pid];
        const toBase = p.to;
        if (toBase > fromBase) {
          // Forward: chain semantics (applyChainForwardSet) -- passed
          // runners carried along, runners beyond the target hold unless
          // collided into. Manual corrections credit the most recent PA
          // and are flagged inferred (architecture doc "Honest
          // denominators").
          const result = applyChainForwardSet(st.runners, pid, toBase);
          st.runners = result.runners;
          const rec = mostRecentPaRecord();
          result.scored.forEach(id => creditRun(id, rec, true));
          result.movements.forEach(m => { if (!m.scored) setKickerBase(m.playerId, m.to); }); // scorecard edge fills
          st.lastAction = { kind: 'runner_advance', playerId: pid, eventIdx: idx, movements: result.movements };
        } else if (toBase < fromBase) {
          // Backward: this runner moves ALONE, and may neither land on
          // NOR pass a trailing runner (backwardBlocked -- round 2 fix,
          // 2026-07-08). If the path isn't clear by replay time (some
          // other event changed the board since this was tapped), treat
          // it as stale and no-op, same convention as the
          // undefined-runner guard above.
          if (backwardBlocked(st.runners, fromBase, toBase)) return;
          st.runners[pid] = toBase;
          setKickerBase(pid, toBase); // scorecard edge fills track the corrected truth
          st.lastAction = { kind: 'runner_advance', playerId: pid, eventIdx: idx, movements: [{ playerId: pid, from: fromBase, to: toBase, scored: false }] };
        }
        // toBase === fromBase: no-op: the UI never offers a runner's own
        // current base as a target (legalSetTargets excludes it).
      }
    } else if (e.type === 'opp_out') {
      st.outs += 1;
      st.lastAction = { kind: 'opp_out', eventIdx: idx };
      flipHalfIfThreeOuts();
    } else if (e.type === 'opp_run') {
      st.scoreThem += (p.delta || 0);
      st.thisHalfRunsThem += (p.delta || 0);
      const oppInning = p.inning || st.inning;
      st.runsByInning.them[oppInning] = (st.runsByInning.them[oppInning] || 0) + (p.delta || 0);
      st.lastAction = { kind: 'opp_run', eventIdx: idx };
    } else if (e.type === 'adjust') {
      // Score-bug direct correction -- the app never blocks on inconsistency.
      // Setting outs carries the same 3-out consequence as reaching it any
      // other way (e.g. the defense screen's mercy-rule "end half-inning
      // now" action adjusts outs to 3 rather than needing a separate code path).
      if (p.field === 'outs') { st.outs = p.value; flipHalfIfThreeOuts(); }
      else if (p.field === 'score_us') st.scoreUs = p.value;
      else if (p.field === 'score_them') st.scoreThem = p.value;
      else if (p.field === 'inning') st.inning = p.value;
      // 'half' (2026-07-12, S1.6): the adjust sheet's inning stepper walks
      // both inning AND half (▲3 -> ▼3 -> ▲4, mockups/portal-screens.html
      // screen 8) -- not in 05-Scoring-Architecture.md's original field
      // enum (outs/score_us/score_them/inning only); added as a 5th field
      // on the same event type, same "one adjust event per changed field"
      // draft-commit convention as everything else on this sheet. Flagged
      // for that doc's amendment.
      else if (p.field === 'half') st.half = p.value;
      st.lastAction = { kind: 'adjust', field: p.field, eventIdx: idx };
    } else if (e.type === 'player_add') {
      st.rosterOverlay.push({ id: p.playerId, name: p.name, status: p.status || 'sub', defaultClip: p.defaultClip });
    } else if (e.type === 'game_end') {
      st.gameEnded = true;
      st.finalUs = p.final_us; st.finalThem = p.final_them;
    }
    // 'amend'/'undo' are meta-events already consumed in the passes above
    // and produce no state transition of their own.
  });

  const _prevPa = mostRecentPaRecord();
  st.previousKickerPlayerId = _prevPa ? _prevPa.playerId : null;
  // Runners whose runs were credited in the half the replay ended in --
  // the population the scored-runner correction sheet (home-plate tap)
  // offers. Runs from finished halves are deliberately excluded: the
  // diamond cleared, the moment passed.
  st.scoredThisHalf = st.runsLog
    .filter(en => en.inning === st.inning && en.half === st.half)
    .map(en => en.playerId);
  return st;
}

// Season/per-game batting stats from a derived state's paLog + runsLog.
// Honest denominators (architecture doc): `ab` excludes MISSED, `pa`
// doesn't; SKIP is excluded from both because it was never pushed to
// paLog at all. Kept separate from deriveState() so S3's season rollups
// can call it per-game or across a whole replayed multi-game history.
function computeStats(st) {
  const stats = {};
  function ensure(id) {
    if (!stats[id]) stats[id] = { pa: 0, ab: 0, h: 0, r: 0, rbi: 0, inferredRbi: 0 };
    return stats[id];
  }
  st.paLog.forEach(rec => {
    const s = ensure(rec.playerId);
    s.pa += 1;
    if (rec.result !== 'MISSED') {
      s.ab += 1;
      if (HIT_BASES[rec.result]) s.h += 1;
    }
    s.rbi += rec.rbi;
    s.inferredRbi += rec.inferredRbi;
  });
  st.runsLog.forEach(en => ensure(en.playerId).r += 1);
  return stats;
}

/* ---- Season portal data layer (07-Portal-Architecture.md, 2026-07-13) ----
   Per that doc's "Data path note": stats derive from the event log, which
   lives per-device. Until S2 sync exists, this only reflects games actually
   SCORED ON THIS DEVICE, plus score-only manifest results (pre-app games
   like game 1) for the record line -- exactly the "ship the posture and
   schedule first, full value arrives with sync" tradeoff the doc accepts. */

// Splits the flat scoringEvents array into one sub-array per game -- a
// game_start opens a new segment, everything up to (not including) the
// NEXT game_start belongs to it (adjust/runner/undo/amend events for that
// game all land correctly this way, no separate bookkeeping needed).
function segmentGamesFromEvents(events) {
  const games = [];
  let current = null;
  events.forEach((e) => {
    if (e.type === 'game_start') { current = []; games.push(current); }
    if (current) current.push(e);
  });
  return games;
}

// One row per game with real data: device-scored games (from the local
// log, only once they have a game_end -- an in-progress game isn't season
// history yet) UNIONED with manifest schedule entries that carry a
// `result` (score-only, e.g. game 1, pre-dating this app) and aren't
// already covered by a logged game. Manifest results are assumed to count
// toward the season record (07's open question, presumed yes since a
// record excluding game 1 would be misleading, not because it's
// authoritative -- easy to revisit).
function seasonGameRecords() {
  const records = [];
  const byScheduleId = {};
  segmentGamesFromEvents(scoringEvents).forEach((evts) => {
    const startEvt = evts.find(e => e.type === 'game_start');
    if (!startEvt) return;
    if (!evts.some(e => e.type === 'game_end')) return; // still live -- not season history yet
    const st = deriveState(evts);
    const rec = {
      scheduleGameId: (startEvt.payload && startEvt.payload.scheduleGameId) || null,
      opponent: st.opponent, final: { us: st.scoreUs, them: st.scoreThem },
      source: 'log', events: evts,
    };
    records.push(rec);
    if (rec.scheduleGameId) byScheduleId[rec.scheduleGameId] = rec;
  });
  (DATA.schedule || []).forEach((g) => {
    if (byScheduleId[g.id] || !g.result) return;
    records.push({ scheduleGameId: g.id, opponent: g.opponent, final: g.result, source: 'manifest', events: null });
  });
  return records;
}

function seasonRecord() {
  let w = 0, l = 0, runDiff = 0;
  seasonGameRecords().forEach((r) => {
    if (r.final.us > r.final.them) w += 1; else if (r.final.us < r.final.them) l += 1;
    runDiff += (r.final.us - r.final.them);
  });
  return { w: w, l: l, runDiff: runDiff };
}

// Sums per-player stats across every device-scored game only -- a
// manifest-only result (game 1) has no per-player data to contribute.
function seasonPlayerStats() {
  const totals = {};
  seasonGameRecords().filter(r => r.source === 'log').forEach((r) => {
    const gs = computeStats(deriveState(r.events));
    Object.keys(gs).forEach((pid) => {
      const t = totals[pid] || (totals[pid] = { ab: 0, h: 0, r: 0, rbi: 0 });
      t.ab += gs[pid].ab; t.h += gs[pid].h; t.r += gs[pid].r; t.rbi += gs[pid].rbi;
    });
  });
  return totals;
}

DATA.players.forEach(p => { playersById[p.id] = p; });
const allIds = DATA.players.map(p => p.id);

/* Audio context lifecycle (reworked 2026-07-07 after game 1). iOS quirk:
   when the screen locks, WebKit parks the context in a nonstandard
   'interrupted' state -- NOT 'suspended', which was the only state the
   old code checked -- and resume() from 'interrupted' is unreliable:
   long-standing reports of it no-oping forever on user input
   (WebAudio/web-audio-api#2585). This was game 1's "app is dead after
   the phone slept, reboot required": play taps fired into a stopped
   context (silence) and the countdown read a frozen ctx.currentTime.
   So the app never bets on resume(): a context that isn't running at
   play-tap time is torn down and replaced *synchronously inside the
   same tap* -- a context created during a user gesture starts running
   on iOS. Decoded AudioBuffers are context-independent, so the rebuilt
   context reuses them: recovery is the same one tap, no re-decode, no
   reboot. The old context is close()d so WebKit's cap on live contexts
   is never approached. (Buffer reuse across contexts: verify on-device

let ctx = null;

let lastAudioEvent = 'boot';  // field-debug readout
function createAudioContext() {
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  // Created outside a gesture (boot) this starts 'suspended'; created
  // inside one it starts 'running'. The synchronous resume() nudge is
  // free either way.
  if (ctx.state !== 'running') { try { ctx.resume(); } catch (e) {} }
  try { ctx.onstatechange = function () { updateDebugPanel(); }; } catch (e) {}
}
function rebuildAudioContext(reason) {
  const old = ctx;
  try { const p = old.close(); if (p && p.catch) p.catch(function () {}); } catch (e) {}
  createAudioContext();
  audioRebuilds++;
  noteAudioEvent('rebuild: ' + reason);
}
createAudioContext();
const buffers = {}; // playerId -> AudioBuffer (survive context rebuilds)
// defaultClips decode into their own id-keyed map (S1.6): these are shared
// hype clips a player_add sub can pick as a walk-up song, not tied to any
// one playerId the way `buffers` is -- overlayBufferFor (below) is the
// indirection that maps an overlay sub's chosen defaultClip id to one of
// these. Declared unconditionally (defaultClips is manifest-general, not
// scoring-gated -- see build.py) so this stays outside the scoring markers.
const defaultClipBuffers = {}; // defaultClip id -> AudioBuffer
const unavailable = new Set(); // playerId -> decode failed

let currentGain = null;

// currently-playing song and the currently-shown name never disagree.
// Overrides played from the Grid tab never touch this.
let pendingLineupSource = null;
let pendingLineupStartPointer = null;
// For the on-card countdown: when the current source started (in the audio
// clock's own time) and how long it runs, so remaining time is computed
// straight from the real audio clock rather than a separate JS timer that
// could drift out of sync with what's actually playing.
let currentStartTime = null;
let currentDuration = null;

// (below) starts/stops it, so nothing else needs to remember to manage it.
// The tick updates ONLY the countdown's text node -- it must never call
// render(): a full innerHTML teardown 5x/sec means any tap whose
// pointerdown/pointerup straddles a tick lands on a detached node and the
// click silently vanishes (intermittent "dead taps", worst on tap-to-stop,
// which only ever happens while ticking). Each render pass installs a
// fresh update closure for whichever countdown is on screen (NOW UP card
// caption or a playing grid tile), or leaves it null if none is.
let tickInterval = null;
let liveCountdownUpdate = null;

// {batterId, fireAtMs, timeoutHandle} while a result tap's auto-play is
// armed and waiting, else null. Declared here (outside
// the scoring markers) so render()'s shared tick-interval gating below can
// reference it unconditionally -- it simply never becomes non-null when
// scoring is stripped, since the only code that sets it is scoring-only.
let scoringAutoPlayPending = null;
// Double-tap protection: an excited operator's double-tap would otherwise
// read as play + instant tap-to-stop -- song plays for a beat, lineup
// advances past the kicker. Taps-to-stop inside this window are ignored;
// backgrounding and every other stop path are unaffected.
const STOP_TAP_GRACE_MS = 400;
let playStartedAtMs = 0;

function b64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

async function decodeAll() {
  await Promise.all(DATA.players.map(async p => {
    const clip = p.clips[0];
    if (!clip) { unavailable.add(p.id); return; }
    try {
      const arrBuf = b64ToArrayBuffer(clip.data);
      buffers[p.id] = await ctx.decodeAudioData(arrBuf);
    } catch (e) {
      console.error('Failed to decode clip for', p.id, e);
      unavailable.add(p.id);
    }
  }));
  // defaultClips (S1.6 "+new" song picker) -- decoded the same way, keyed
  // by their own id rather than a playerId. Empty array is a harmless no-op
  // (Promise.all([]) resolves immediately), so this costs nothing on a
  // manifest that hasn't added any yet.
  await Promise.all((DATA.defaultClips || []).map(async c => {
    try {
      const arrBuf = b64ToArrayBuffer(c.data);
      defaultClipBuffers[c.id] = await ctx.decodeAudioData(arrBuf);
    } catch (e) {
      console.error('Failed to decode defaultClip', c.id, e);
    }
  }));
}

// Safe wrapper (same pattern as scoringEditorActive): resolves an overlay
// player's chosen defaultClip to a decoded buffer. playClip (below) is
// shared/unmarked code, so this must stay callable in a stripped build --
// it just always returns null there, since no player_add event can exist
// without the scoring event log to hold it.
function overlayBufferFor(playerId) {
  /* __SCORING_START__ */
  if (scoringState && scoringState.rosterOverlay) {
    const ov = scoringState.rosterOverlay.find(p => p.id === playerId);
    if (ov && ov.defaultClip && defaultClipBuffers[ov.defaultClip]) return defaultClipBuffers[ov.defaultClip];
  }
  /* __SCORING_END__ */
  return null;
}

// If `source` was the lineup clip we're waiting on, advance the lineup
// pointer now (but only if the operator hasn't already manually moved the
// pointer elsewhere via skip/back/on-deck-jump while it was playing -- a
// manual move already resolved this turn, so a second advance would skip
// someone).
function finishLineupIfPending(source) {
  if (pendingLineupSource !== source) return;
  pendingLineupSource = null;
  if (pendingLineupStartPointer !== null && pointerId === pendingLineupStartPointer) {
    pointerId = nextPointer(order, pointerId);
    persistPointer();
  }
  pendingLineupStartPointer = null;
}

// True when the clip actively playing right now *is* the lineup clip for
// the given (currently-displayed) pointer -- i.e. the NOW UP card should
// render as "tap to stop" rather than "tap to play". False if nothing's
// playing, if what's playing is a Grid override, or if a manual skip/back/
// on-deck-jump has already moved the pointer away from whoever's clip is
// still actually playing (see finishLineupIfPending).
function isLineupCardPlaying(id) {
  return currentSource !== null && pendingLineupSource === currentSource && pendingLineupStartPointer === id;
}

// Seconds left in whatever is playing right now (lineup clip or grid
// override), or null if nothing is. Reads straight off the audio clock
// (ctx.currentTime) rather than a wall-clock timer, so it can't drift
// from what's actually audible.
function currentRemainingSeconds() {
  if (!currentSource || currentStartTime === null || currentDuration === null) return null;
  return Math.max(0, currentDuration - (ctx.currentTime - currentStartTime));
}

// Seconds left in the clip currently showing on the card, or null if the
// card isn't the thing playing (idle, or what's playing is a Grid
// override).
function cardRemainingSeconds(id) {
  if (!isLineupCardPlaying(id)) return null;
  return currentRemainingSeconds();
}

function formatCountdown(seconds) {
  const whole = Math.max(0, Math.ceil(seconds));
  const m = Math.floor(whole / 60);
  const s = whole % 60;
  return m + ':' + String(s).padStart(2, '0');
}

// `opts.advanceIfPending` (default true) controls whether this stop counts
// as "finishing the turn" for a pending lineup advance:
//  - Stop/fade button (explicit, nothing replacing the clip): yes, advance.
//  - playClip's own pre-emptive stop of whatever was already playing right
//    before it starts a new clip: no -- the new clip (even a same-person
//    retap) takes over pending-advance bookkeeping itself immediately
//    after, so the interrupted one shouldn't also try to advance.
function stopCurrent(fade, opts) {
  opts = opts || {};
  const advanceIfPending = opts.advanceIfPending !== false;
  if (!currentSource) return;
  const src = currentSource;
  const srcGain = currentGain;
  // Clear bookkeeping *before* actually stopping the node. Stopping a
  // source fires its 'ended' handler -- immediately in some environments,
  // always eventually in real browsers -- and that handler is written to
  // no-op once currentSource no longer points at it. This function is the
  // sole decider of whether *this* stop counts as finishing the turn.
  currentSource = null;
  currentGain = null;
  playingId = null;
  currentStartTime = null;
  currentDuration = null;
  if (fade && srcGain) {
    const now = ctx.currentTime;
    const fadeSec = (DATA.fadeOutMs || 1500) / 1000;
    srcGain.gain.cancelScheduledValues(now);
    srcGain.gain.setValueAtTime(srcGain.gain.value, now);
    srcGain.gain.linearRampToValueAtTime(0.0001, now + fadeSec);
    setTimeout(() => { try { src.stop(); } catch (e) {} }, DATA.fadeOutMs + 60);
  } else {
    try { src.stop(); } catch (e) {}
  }
  if (advanceIfPending) {
    finishLineupIfPending(src);
  } else if (pendingLineupSource === src) {
    pendingLineupSource = null;
    pendingLineupStartPointer = null;
  }
  render();
}

let playingId = null;

async function playClip(playerId, opts) {
  opts = opts || {};
  if (unavailable.has(playerId)) return;
  // Wedged-context recovery -- see the audio-lifecycle note at the top of
  // this section. Everything from here down to source.start() must stay
  // synchronous: an await would leave the user-gesture call stack and iOS
  // would refuse to start the replacement context. 'suspended' and
  // 'interrupted' both take this path; a healthy running context skips it.

      // can't be unlocked -- the watchdog already rebuilt; just nudge.
      // If this still fails, the next real tap heals in-gesture.
      try { ctx.resume(); } catch (e) {}
    } else {
      rebuildAudioContext(ctx.state + ' at tap');

  }

  // Overlay players (mid-game player_add subs) have no entry in `buffers`
  // -- their audio is one of the shared defaultClips, mapped through their
  // chosen defaultClip id (S1.6; previously a known no-op gap, see
  // _ai/handoff.md round 6).

  if (!buffer) return;

  source.buffer = buffer;
  const gain = ctx.createGain();
  gain.gain.value = 1;
  source.connect(gain).connect(ctx.destination);

    if (currentSource === source) {
      currentSource = null; currentGain = null; playingId = null;
      currentStartTime = null; currentDuration = null;
      finishLineupIfPending(source);
      render();

  source.start();
  currentSource = source;
  currentGain = gain;
  playingId = playerId;
  currentStartTime = ctx.currentTime;
  currentDuration = buffer.duration;
  playStartedAtMs = Date.now();
  if (opts.lineup) {
    pendingLineupSource = source;
    pendingLineupStartPointer = playerId;
  } else {
    pendingLineupSource = null;
    pendingLineupStartPointer = null;
  }
  armAudioWatchdog(source, playerId, opts);
  render();
}

// Belt-and-suspenders behind the in-gesture rebuild: if the context still
// isn't running shortly after a play started (a rebuild path that couldn't
// unlock, or a state change that raced the tap), rebuild once more and
// replay the same clip automatically. One retry per tap only -- a second
// failure waits for the next tap rather than looping. The check is
// ctx.state alone (not currentTime advancement): if WebKit reports
// 'running', audio is running.
const AUDIO_WATCHDOG_MS = 600;
function armAudioWatchdog(source, playerId, opts) {
  setTimeout(function () {
    if (currentSource !== source) return; // finished, stopped, or replaced
    if (ctx.state === 'running') return;  // healthy
    noteAudioEvent('watchdog saw ' + ctx.state);
    if (!opts._watchdogRetry) {
      rebuildAudioContext('watchdog');
      playClip(playerId, Object.assign({}, opts, { _watchdogRetry: true }));
      return;
    }
    // Both the original attempt and the one gesture-less retry above
    // failed to reach 'running' -- almost always a fully slept/locked
    // device (2026-07-13, Jason: observed live, freezing at the initial
    // playback stage forever, no progress, no countdown). This is an iOS
    // policy, not something retryable from here: it categorically refuses
    // to resume an AudioContext outside a real tap, and neither this
    // watchdog nor scoring's timer-fired auto-play (scheduleScoringAutoPlay)
    // count as one. Previously this branch did nothing, leaving the NOW UP
    // card showing "playing" indefinitely. Fail visibly instead: reset to
    // idle (no lineup-advance -- nothing actually played) so the operator
    // sees "not playing" immediately and knows a fresh tap is what's
    // needed, rather than waiting on a countdown that will never resolve.
    // The next real tap heals the context via playClip's own in-gesture
    // rebuild path, same as any other wedged-context recovery in this file.
    noteAudioEvent('watchdog gave up (' + ctx.state + ') -- reset to idle, needs a manual tap');
    stopCurrent(false, { advanceIfPending: false });
  }, AUDIO_WATCHDOG_MS);
}

// iOS forcibly interrupts a backgrounded/standalone web app's AudioContext
// -- confirmed platform behavior, not something a web app can override, so
// audio can never actually keep playing once the app leaves the
// foreground (home button/gesture, app switcher, screen lock). Left alone,
// the paused clip can also resume unexpectedly later and leave the lineup
// pointer stuck on a kicker who already went. So: treat leaving the
// foreground as an explicit stop -- same "this ends the turn" handling as
// tapping to stop -- rather than leaving a half-finished clip in limbo.
// visibilitychange covers backgrounding; pagehide is a defensive backstop
// for actual navigation/close (harmless no-op if already stopped).
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') stopCurrent(false);
});
window.addEventListener('pagehide', () => stopCurrent(false));

/* ============================================================
   Wake Lock (best-effort -- phone auto-lock is set to Never as
   the primary defense; this is belt-and-suspenders, see
   01-Architecture.md "Known risks")
   ============================================================ */
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (e) { /* non-fatal */ }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// Coming back to the foreground: try a free resume() so the first tap
// usually finds a running context already. Opportunistic only -- when it
// silently fails (the known 'interrupted' wedge), the tap-time rebuild in
// playClip is the real fix.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && ctx.state !== 'running') {
    try { const p = ctx.resume(); if (p && p.catch) p.catch(function () {}); } catch (e) {}
  }
});

/* ============================================================
   Field debug readout -- 5 quick taps on the wordmark toggles a
   one-line overlay of live audio-engine state. Costs nothing when
   hidden; exists so a wedged-audio report from the field can say
   *what state the context was in* instead of "it broke".
   ============================================================ */
// Injected by build.py; identical to the service worker's cache id, so the
// readout answers "which build is this phone actually running?" -- the only
// reliable way to confirm an update landed when a change has no visible UI.
const BUILD_ID = '__BUILD_ID__';
let debugPanel = null, debugTimer = null, debugReadoutEl = null;
let debugTapCount = 0, debugTapLastMs = 0;
function noteAudioEvent(msg) {
  lastAudioEvent = msg + ' @ ' + new Date().toTimeString().slice(0, 8);
  updateDebugPanel();
}
function updateDebugPanel() {
  if (!debugPanel || !debugReadoutEl) return;
  debugReadoutEl.textContent =
    'build: ' + BUILD_ID +
    ' · audio: ' + ctx.state +
    ' · rebuilds: ' + audioRebuilds +
    ' · clips: ' + Object.keys(buffers).length + '/' + DATA.players.length +
    ' · last: ' + lastAudioEvent;
}
function toggleDebugPanel() {
  if (debugPanel) {
    if (debugPanel.parentElement) debugPanel.parentElement.removeChild(debugPanel);
    debugPanel = null;
    debugReadoutEl = null;
    if (debugTimer) { clearInterval(debugTimer); debugTimer = null; }
    return;
  }
  debugPanel = h('div', { class: 'debug-panel' });
  debugReadoutEl = h('div', { class: 'debug-readout' });
  debugPanel.appendChild(debugReadoutEl);
  // Plain data check, not a reference to any scoring-only state -- safe to
  // leave unmarked. There's nothing to clear until a game can exist at all.
  if (DATA.scoring && DATA.scoring.enabled) {
    debugPanel.appendChild(h('button', {
      class: 'debug-clear-btn', text: 'clear game data', onclick: debugClearGameData,
    }));
  }
  document.getElementById('app').appendChild(debugPanel);
  updateDebugPanel();
  debugTimer = setInterval(updateDebugPanel, 1000);
}
function wordmarkTapped() {
  const now = Date.now();
  if (now - debugTapLastMs > 1500) debugTapCount = 0;
  debugTapLastMs = now;
  debugTapCount++;
  if (debugTapCount >= 5) { debugTapCount = 0; toggleDebugPanel(); }
}
// Both tab headers render the wordmark through this so the 5-tap debug
// gesture works everywhere without any visible UI surface.
function renderWordmark() {
  return h('div', { class: 'wordmark', text: DATA.team, onclick: wordmarkTapped });
}

/* ============================================================
   Rendering
   ============================================================ */
const screenEl = document.getElementById('screen');

function h(tag, attrs, children) {
  const el = document.createElement(tag);
  attrs = attrs || {};
  for (const k in attrs) {
    if (k === 'class') el.className = attrs[k];
    else if (k === 'text') el.textContent = attrs[k];
    else if (k === 'disabled') {
      // Boolean HTML attribute: presence disables, regardless of value --
      // so it must only be set when truthy, never set (not even to
      // "null"/"false" strings) when falsy. setAttribute('disabled', null)
      // was the bug: it still disables the element, permanently.
      if (attrs[k]) el.setAttribute('disabled', '');
    }
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), attrs[k]);
    else el.setAttribute(k, attrs[k]);
  }
  (children || []).forEach(c => { if (c) el.appendChild(c); });
  return el;
}

function enterReorderMode() {
  state.activeTab = 'lineup';
  state.editing = true;
  render();
}

function renderOrderButton() {
  return h('button', { class: 'order-btn', text: '⇅ order', onclick: enterReorderMode });
}

// Updates just the countdown text in place. See the liveCountdownUpdate
// note above for why this must not be a full render().
function tickCountdown() {
  if (liveCountdownUpdate) liveCountdownUpdate();
}

/* __SCORING_START__ */
/* ============================================================
   Scoring: game-screen rendering (06-Scoring-Specs.md S1 items 3-4:
   offense + defense). Takes over the Next Up tab whenever a live game
   exists -- scoring.enabled AND a game_start with no game_end after it
   (see isScoringLive() below). Reuses playClip/stopCurrent unchanged: a
   scoring batter's clip plays exactly like a Grid override (keyed off
   playingId, no pendingLineupSource involvement) because advancement here
   is driven by PA events at result-tap time, never by clip-end -- so the
   classic deferred-advance machinery doesn't apply and isn't touched.
   ============================================================ */
const RESULT_TAP_GRACE_MS = 400; // mirrors STOP_TAP_GRACE_MS's rationale, scoped to the result pad
let lastResultTapMs = 0;
let scoringClipFiredForBatter = null; // playerId whose clip has played at least once this turn

// ---- S1.5: correction states ----
// UI-only overlay state, never persisted -- what's actually recorded is
// always just another appended event (06-Scoring-Specs.md S1 item 5).
// Shapes:
//   {mode:'runner', playerId}                                  -- mockup 3
//   {mode:'fixLast', targetId, forPlayerId, currentResult, viaRedirect} -- mockup 4
//   {mode:'undoLast', targetId, label}  -- not in the mockups: the chip's
//     "tap to fix or undo" promise covers every event kind (architecture
//     doc), but only a `pa` has a "result" to re-target a pad at, so
//     non-PA last actions (a runner correction, opp out/run, a score-bug
//     adjust) get a minimal undo-only confirm instead of the full fix-last
//     screen. Deliberate, documented extension, not a mockup gap.
// Cleared defensively in render() whenever the live offense screen isn't
// what's about to be shown, so a stale sheet can never survive a tab
// switch, a half-flip, or a fresh game.
let scoringCorrection = null;

function closeScoringCorrection() { scoringCorrection = null; render(); }

// Any correction that appends an event is an operator stepping in mid-flow
// -- cancel rather than risk a stale autoplay timer firing the wrong clip
// (e.g. a runner-out correction that happens to be the 3rd out, flipping
// the half while a next-batter countdown was still running). The operator
// can always tap NOW UP manually afterward; that's cheaper than a wrong fire.
function cancelPendingAutoplay() {
  if (scoringAutoPlayPending) { clearTimeout(scoringAutoPlayPending.timeoutHandle); scoringAutoPlayPending = null; }
}

// Backgrounding cancels a pending auto-play (2026-07-08 audit): iOS
// freezes the timer while hidden and fires it on return -- music starting
// unexpectedly, outside any gesture, possibly against a wedged context.
// Invariant 4 treats leaving the foreground as an explicit stop; the armed
// countdown is part of that. The operator taps NOW UP manually on return.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') cancelPendingAutoplay();
});

// Previous-kicker redirect (Jason's rule, 05-Scoring-Architecture.md
// §Assumption engine): tapping the runner whose base placement came from
// the most recent PA is a re-score of their at-bat, not an advance.
function openRunnerCorrection(playerId) {
  if (playerId === scoringState.previousKickerPlayerId) {
    openFixLastForMostRecentPa(true);
    return;
  }
  scoringCorrection = { mode: 'runner', playerId: playerId };
  render();
}

// `lastCorrection` ({targetId, label}) rides along when the chip was
// tapped while the newest event is a runner correction: the sheet shows a
// dashed "undo last fix" escape hatch for it (round 2, 2026-07-08). This
// is the ONLY route back from a mistaken OUT correction -- an out runner
// is neither on the diamond nor at home, so no correction-on-correction
// surface can reach them; without this line a fat-fingered OUT would be
// permanent.
function openFixLastForMostRecentPa(viaRedirect, lastCorrection) {
  const paLog = scoringState.paLog;
  const rec = paLog.length ? paLog[paLog.length - 1] : null;
  if (!rec) return;
  scoringCorrection = { mode: 'fixLast', targetId: rec.id, forPlayerId: rec.playerId, currentResult: rec.result, viaRedirect: !!viaRedirect, lastCorrection: lastCorrection || null };
  render();
}

// Chip tap (round 2, Jason 2026-07-08): the chip is the AT-BAT's surface
// -- it opens fix-last for the most recent PA whether the last event was
// that PA itself or a runner correction made after it (a mistaken
// correction is fixed by another correction on the diamond, not by
// undoing from here -- the absolute-set model makes correction-on-
// correction safe). Non-PA, non-runner events (adjust, opp) still get the
// minimal undo confirm, since there's no at-bat to re-target.
function openLastActionCorrection() {
  const la = scoringState.lastAction;
  if (!la) return;
  if (RUNNER_CORRECTION_KINDS[la.kind]) {
    const corrEvt = scoringEvents[la.eventIdx];
    openFixLastForMostRecentPa(false, corrEvt ? { targetId: corrEvt.id, label: buildLastActionRecap(la) } : null);
    return;
  }
  const evt = scoringEvents[la.eventIdx];
  if (!evt) return;
  if (la.kind === 'pa') {
    scoringCorrection = { mode: 'fixLast', targetId: evt.id, forPlayerId: la.playerId, currentResult: la.result, viaRedirect: false };
  } else {
    scoringCorrection = { mode: 'undoLast', targetId: evt.id, label: buildLastActionRecap(la) };
  }
  render();
}

function applyRunnerOut(playerId) {
  // No cancelPendingAutoplay() here (2026-07-13, Jason): a plain baserunner
  // out is routine mid-countdown and doesn't touch the lineup pointer or
  // half -- scheduleScoringAutoPlay's own fire-time check is what actually
  // guards against a wrong-fire (e.g. this out being the 3rd), not this
  // eager cancel. See that function's comment for the full rationale.
  scoringEvents = appendScoringEvent(scoringEvents, 'runner', { playerId: playerId, action: 'out' });
  scoringState = deriveState(scoringEvents);
  scoringCorrection = null;
  render();
}

// ---- Scored-runner correction (2026-07-08 session; round 3 semantics) ----
// The "auto-scored by the assumption engine, but reality disagreed" case
// Jason flagged: runner on 2nd, kicker doubles, engine scores them -- but
// they actually held at 3rd (or were out at home). They're not on the
// diamond anymore, so HOME PLATE is their tap target instead. Round 3
// (Jason, on-device): scorers can only be corrected in the REVERSE order
// they crossed the plate, one at a time -- so home always opens the MOST
// RECENT scorer of the half (no picker; walking one back exposes the
// next), and the pass-blocking rules then naturally confine each
// walk-back to bases ahead of anyone already re-placed. And when that
// most recent scorer is the last at-bat's own kicker (the HR case),
// fixing them IS re-scoring that at-bat -- route to fix-last, exactly
// like the previous-kicker redirect on the bases (round 3, from Jason's
// "Charlie walked back to 2nd but the chip still said Homered").
function openScoredCorrection() {
  const runsLog = scoringState.runsLog;
  let last = null;
  for (let i = runsLog.length - 1; i >= 0; i--) {
    const en = runsLog[i];
    if (en.inning === scoringState.inning && en.half === scoringState.half) { last = en; break; }
  }
  if (!last) return;
  const lastRec = scoringState.paLog.length ? scoringState.paLog[scoringState.paLog.length - 1] : null;
  if (lastRec && last.record === lastRec && last.playerId === lastRec.playerId) {
    openFixLastForMostRecentPa(true);
    return;
  }
  scoringCorrection = { mode: 'scoredRunner', playerId: last.playerId };
  render();
}
function applyScoredRunnerReturn(playerId, to) {
  // No eager cancelPendingAutoplay() -- see applyRunnerOut's comment.
  // Same `set` event as any other placement -- replay's un-score
  // enforcement (deriveState) reverses the same-half run and places them.
  scoringEvents = appendScoringEvent(scoringEvents, 'runner', { playerId: playerId, action: 'set', to: to });
  scoringState = deriveState(scoringEvents);
  scoringCorrection = null;
  render();
}
function applyScoredRunnerOut(playerId) {
  // No eager cancelPendingAutoplay() -- see applyRunnerOut's comment.
  // `scored: true` is the explicit gate that lets replay reverse the run
  // and record the out -- a plain runner-out for an off-base player stays
  // a stale no-op (see the deriveState guard).
  scoringEvents = appendScoringEvent(scoringEvents, 'runner', { playerId: playerId, action: 'out', scored: true });
  scoringState = deriveState(scoringEvents);
  scoringCorrection = null;
  render();
}

function applyRunnerSet(playerId, to) {
  // No eager cancelPendingAutoplay() -- see applyRunnerOut's comment.
  scoringEvents = appendScoringEvent(scoringEvents, 'runner', { playerId: playerId, action: 'set', to: to });
  scoringState = deriveState(scoringEvents);
  scoringCorrection = null;
  render();
}

function applyFixLastAmend(newResult) {
  const c = scoringCorrection;
  if (!c || c.mode !== 'fixLast') return;
  if (newResult === c.currentResult) { scoringCorrection = null; render(); return; } // no real change -- just close
  cancelPendingAutoplay();
  scoringEvents = appendScoringEvent(scoringEvents, 'amend', { target_event_id: c.targetId, result: newResult });
  scoringState = deriveState(scoringEvents);
  scoringCorrection = null;
  render();
}

// Full pre-tap state restoration: tombstoning the PA event means replay
// skips it entirely, including the lineup-pointer advance it caused -- the
// pointer lands back on the batter being fixed with no special-case code.
function applyFixLastUndo() {
  const c = scoringCorrection;
  if (!c || c.mode !== 'fixLast') return;
  cancelPendingAutoplay();
  scoringEvents = appendScoringEvent(scoringEvents, 'undo', { target_event_id: c.targetId });
  scoringState = deriveState(scoringEvents);
  scoringCorrection = null;
  scoringClipFiredForBatter = null; // pointer reverted -- fresh turn for whoever's up now
  render();
}

// The rundown case (architecture doc): the kicker legitimately reached,
// then was out on the bases -- hit stays in stats, out increments.
function applyFixLastHitStands() {
  const c = scoringCorrection;
  if (!c || c.mode !== 'fixLast') return;
  cancelPendingAutoplay();
  scoringEvents = appendScoringEvent(scoringEvents, 'runner_out_hit_stands', { playerId: c.forPlayerId });
  scoringState = deriveState(scoringEvents);
  scoringCorrection = null;
  render();
}

// Tombstones the runner correction the fix-last sheet was opened over
// (c.lastCorrection) -- NOT the PA itself.
function applyFixLastUndoCorrection() {
  const c = scoringCorrection;
  if (!c || c.mode !== 'fixLast' || !c.lastCorrection) return;
  cancelPendingAutoplay();
  scoringEvents = appendScoringEvent(scoringEvents, 'undo', { target_event_id: c.lastCorrection.targetId });
  scoringState = deriveState(scoringEvents);
  scoringCorrection = null;
  render();
}

function applyUndoLast() {
  const c = scoringCorrection;
  if (!c || c.mode !== 'undoLast') return;
  cancelPendingAutoplay();
  scoringEvents = appendScoringEvent(scoringEvents, 'undo', { target_event_id: c.targetId });
  scoringState = deriveState(scoringEvents);
  scoringCorrection = null;
  render();
}

function isScoringLive() {
  return !!(DATA.scoring && DATA.scoring.enabled && scoringState && scoringState.gameStarted && !scoringState.gameEnded);
}

// Team shorthand for the score bug / scorecard. Manifest `teamShort` wins
// ("PICKLES" -- Jason 2026-07-11, replacing the initials-derived "PPP"
// across the board); the initials derivation stays as the fallback so a
// manifest without the field still gets something sane.
function teamAbbrev() {
  if (DATA.teamShort) return DATA.teamShort;
  const cleaned = (DATA.team || '').replace(/[^A-Za-z ]/g, ' ');
  const words = cleaned.split(/\s+/).filter(Boolean);
  return words.map(w => w[0].toUpperCase()).join('') || '?';
}

function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// Redesigned bigger/bolder per Jason's live feedback (2026-07-07): score and
// outs are the numbers a scorer references at a glance, and the original
// mockup-matched 12px single row under-served that. Two-row layout: small
// inning/half context on top, big outs + score on the bottom -- a
// deliberate departure from mockups/scoring-screens.html's exact sizing,
// done live at Jason's direction (mockup stays normative for the rest).
function renderScoreBug() {
  const isUs = scoringState.half === 'us';
  const mainKids = [];
  // Verb ("PPP trails") stacked above the score, smaller + dark moss, so
  // the actual score total stays the visual focal point and reads white
  // (Jason, live feedback, round 5 -- round 4 had made the whole line
  // moss, which buried the score itself).
  mainKids.push(h('div', { class: 'score-stack' }, [
    // Tied is symmetric -- neither team "owns" it, so it just reads
    // "TIED" on its own rather than "PPP tied" (Jason, live feedback,
    // 2026-07-07).
    h('div', { class: 'score-verb', text: scoringState.scoreUs === scoringState.scoreThem ? 'tied' : (teamAbbrev() + ' ' + scoreBugVerb()) }),
    h('div', { class: 'score-total-big', text: scoringState.scoreUs + ' – ' + scoringState.scoreThem }),
  ]));
  // Round 6 (Jason, live feedback, 2026-07-07): outs are back in the score
  // bug, but ONLY on the offense screen -- defense keeps its outs dots on
  // the +OUT button and does not repeat them here. Sits BELOW the score
  // stack now (was beside it in round 5), both centered.
  if (isUs) {
    const filled = Math.max(0, Math.min(3, scoringState.outs));
    mainKids.push(h('div', { class: 'outs-block' }, [
      h('div', { class: 'outs-big' }, [
        h('span', { class: 'outs-dot', text: '●'.repeat(filled) }),
        h('span', { class: 'outs-dot empty', text: '●'.repeat(3 - filled) }),
      ]),
      h('div', { class: 'outs-label-big', text: 'outs' }),
    ]));
  }
  // S1.6: ONE tap anywhere on the score bug opens the adjust sheet (mockup
  // screen 8 note -- per-figure tap targets inside the dense bug would be
  // fiddly at the park). Offense only, and only when nothing else is
  // already open -- see openAdjustSheet's own guards. The box-score chip
  // is its own nested tap target, so its handler stops propagation rather
  // than also triggering the adjust sheet underneath it.
  const bugAttrs = { class: 'score-bug' };
  if (isUs && !scoringCorrection && !scoringBoxScoreOpen) bugAttrs.onclick = openAdjustSheet;
  return h('div', bugAttrs, [
    h('div', { class: 'score-bug-top' }, [
      h('span', { text: (isUs ? '▲ ' : '▼ ') + ordinal(scoringState.inning) + ' – ' }),
      h('span', { class: 'dim-label', text: isUs ? 'kicking' : 'fielding' }),
    ]),
    h('button', { class: 'boxscore-chip' + (scoringBoxScoreOpen ? ' active' : ''), text: '▦ box score', onclick: (e) => { if (e && e.stopPropagation) e.stopPropagation(); toggleBoxScore(); } }),
    h('div', { class: 'score-bug-main' }, mainKids),
  ]);
}

// "leads"/"trails"/"tied" -- the verb half of the score-bug's team line
// (Jason, live feedback, 2026-07-07); the totals now render separately,
// underneath, in scoreTotalBig.
function scoreBugVerb() {
  const us = scoringState.scoreUs, them = scoringState.scoreThem;
  return us > them ? 'leads' : us < them ? 'trails' : 'tied';
}

// Diamond bases + occupant initials. `opts`:
//  - tappable: occupied bases become buttons that open the runner
//    correction sheet (S1.5, openRunnerCorrection) -- false while a sheet
//    is already open (mockup 4's dimmed diamond is informational only) or
//    scoring isn't live.
//  - selectedId: the tapped runner (runner-correction mode) -- gets the
//    white ring; every other occupied base dims to 40%, UNLESS it's also
//    a legal target (see below), which takes visual priority.
//  - legalTargets / onTapTarget: round 7 (Jason, live feedback) -- tap a
//    base directly to move the selected runner there (legalSetTargets),
//    replacing the old text list of +N buttons. Every base number in
//    legalTargets (1/2/3, plus 4 for home) renders as a dashed-pickle
//    tappable target regardless of whether it's currently empty (backward
//    targets) or occupied by another runner (forward targets use push
//    semantics -- see applyRunnerSet -- so landing on an occupied base is
//    exactly the "K scored" cascade case, just discovered after the tap
//    now instead of previewed before it).
function renderDiamond(opts) {
  opts = opts || {};
  const r = scoringState.runners;
  const legalTargets = opts.legalTargets || [];
  const wrap = h('div', { class: 'diamond-wrap' });
  [
    ['pos-2nd', 2],
    ['pos-1st', 1],
    ['pos-3rd', 3],
  ].forEach(([posClass, baseNum]) => {
    const occupantId = runnerAtBase(r, baseNum);
    const isSelected = !!(opts.selectedId && occupantId === opts.selectedId);
    const isLegalTarget = legalTargets.indexOf(baseNum) !== -1;
    const isDimmed = !!(opts.selectedId && occupantId && occupantId !== opts.selectedId && !isLegalTarget);
    const cls = 'diamond-base ' + posClass
      + (occupantId ? ' occupied' : '')
      + (isSelected ? ' selected' : '')
      + (isDimmed ? ' dimmed' : '')
      + (isLegalTarget ? ' legal-target' : '');
    let onTap = null;
    if (opts.tappable && occupantId) onTap = () => openRunnerCorrection(occupantId);
    else if (isLegalTarget && opts.onTapTarget) onTap = () => opts.onTapTarget(baseNum);
    const attrs = { class: cls };
    if (onTap) attrs.onclick = onTap;
    wrap.appendChild(h(onTap ? 'button' : 'div', attrs));
    if (occupantId) {
      wrap.appendChild(h('div', { class: 'diamond-label ' + posClass + (isDimmed ? ' dimmed' : ''), text: runnerCode(occupantId) }));
    }
  });
  // Home plate: a forward-set target when 4 is legal; otherwise, on the
  // live screen, the tap target for correcting an already-scored runner
  // (2026-07-08 -- see openScoredCorrection). opts.homeSelected white-rings
  // it while the scored-runner sheet is open (the runner being corrected
  // conceptually stands at home).
  const homeIsTarget = legalTargets.indexOf(4) !== -1;
  const homeScoredTappable = !!(opts.tappable && scoringState.scoredThisHalf && scoringState.scoredThisHalf.length > 0);
  let homeOnTap = null;
  if (homeIsTarget && opts.onTapTarget) homeOnTap = () => opts.onTapTarget(4);
  else if (homeScoredTappable) homeOnTap = openScoredCorrection;
  const homeAttrs = {
    class: 'diamond-base pos-home' + (homeIsTarget ? ' legal-target' : '')
      + (homeScoredTappable ? ' has-scored' : '') + (opts.homeSelected ? ' selected' : ''),
  };
  if (homeOnTap) homeAttrs.onclick = homeOnTap;
  wrap.appendChild(h(homeOnTap ? 'button' : 'div', homeAttrs));
  return wrap;
}

// Name resolution for scoring surfaces (S1.6 prep, 2026-07-08): manifest
// players first, then the roster overlay (players added mid-game via
// `player_add` events -- subs who aren't in the built artifact). Falls
// back to the raw id only for genuinely unknown players.
function playerNameOf(id) {
  if (!id) return '';
  if (playersById[id]) return playersById[id].name;
  if (scoringState && scoringState.rosterOverlay) {
    const ov = scoringState.rosterOverlay.find(p => p.id === id);
    if (ov) return ov.name;
  }
  return id;
}

// Unique 2-letter runner codes for the diamond labels (2026-07-08, Jason:
// three same-initial players on base at once -- Marcel/Mark/Ming are all
// "M" -- was unreadable at a glance). First letter + the earliest later
// letter of the name that yields a code nobody else has taken, in roster
// order: MARCEL->MA, MARK->MR, MEGAN->ME, MIKE->MI, MING->MN. Fully
// deterministic from the roster, so no manifest field and no build.py
// change; a duplicate-name roster degrades to duplicate codes rather than
// failing (roster hygiene is Jason's call, not the app's).
const runnerCodeById = {};
const _runnerCodesTaken = {};
function assignRunnerCode(id, name) {
  const letters = (name || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  const first = letters[0] || '?';
  let code = null;
  for (let i = 1; i < letters.length; i++) {
    if (!_runnerCodesTaken[first + letters[i]]) { code = first + letters[i]; break; }
  }
  if (!code) code = (letters.slice(0, 2) || '??');
  _runnerCodesTaken[code] = true;
  runnerCodeById[id] = code;
  return code;
}
DATA.players.forEach(p => assignRunnerCode(p.id, p.name));
// Overlay players (mid-game `player_add` subs) get codes lazily, on first
// sighting, from the same collision-aware pool -- so a sub named Mia
// still can't collide with Ming/Mike's codes (S1.6 prep, 2026-07-08).
function runnerCode(id) {
  if (runnerCodeById[id]) return runnerCodeById[id];
  const name = playerNameOf(id);
