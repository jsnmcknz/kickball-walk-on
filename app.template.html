  const upcoming = nextScheduledGame();
  if (upcoming) {
    const idx = (DATA.schedule || []).findIndex(g => g.id === upcoming.id);
    body.appendChild(h('div', { class: 'portal-nextgame-card' }, [
      h('div', { class: 'portal-nextgame-label', text: 'Next game · ' + formatFixtureDateShort(upcoming) }),
      h('div', { class: 'portal-nextgame-name', text: (upcoming.opponent || 'TBD').toUpperCase() }),
      h('div', { class: 'portal-nextgame-cap', text: 'Game ' + (idx + 1) + ' of ' + (DATA.schedule || []).length }),
      h('div', { class: 'portal-nextgame-cap', text: formatFixtureTimeVenue(upcoming) }),
    ]));
  }

  const rec = seasonRecord();
  body.appendChild(h('div', { class: 'portal-record-chip' }, [
    h('span', { class: 'rec', text: 'Our Record · ' + rec.w + '–' + rec.l }),
    h('span', { class: 'rd', text: 'run diff ' + (rec.runDiff > 0 ? '+' : '') + rec.runDiff }),
  ]));

  const stats = seasonPlayerStats();
  body.appendChild(h('div', { class: 'portal-section-label', text: 'Leaders' }));
  const leadersRow = h('div', { class: 'portal-leaders-grid' });
  [['h', 'HITS'], ['r', 'RUNS'], ['rbi', 'RBI']].forEach((pair) => {
    const key = pair[0], label = pair[1];
    let bestPid = null, bestVal = -1;
    Object.keys(stats).forEach((pid) => { if (stats[pid][key] > bestVal) { bestVal = stats[pid][key]; bestPid = pid; } });
    leadersRow.appendChild(h('div', { class: 'portal-leader-chip' }, [
      h('div', { class: 'portal-leader-stat', text: label }),
      h('div', { class: 'portal-leader-value', text: String(bestPid ? bestVal : 0) }),
      h('div', { class: 'portal-leader-name', text: bestPid ? playerNameOf(bestPid) : '—' }),
    ]));
  });
  body.appendChild(leadersRow);

  const header = h('div', { class: 'portal-sort-header' }, [h('span', { class: 'fill', text: 'Full team' })]);
  ['h', 'r', 'rbi'].forEach((key) => {
    header.appendChild(h('span', {
      class: 'portal-sort-col' + (portalStatsSortKey === key ? ' active' : ''),
      text: key.toUpperCase() + (portalStatsSortKey === key ? (portalStatsSortDir < 0 ? ' ▾' : ' ▴') : ''),
      onclick: () => toggleSort(key,
        () => portalStatsSortKey, (v) => { portalStatsSortKey = v; },
        () => portalStatsSortDir, (v) => { portalStatsSortDir = v; }),
    }));
  });
  header.appendChild(h('span', { class: 'portal-play-spacer' }));
  body.appendChild(header);

  const rosterIds = DATA.players.map(p => p.id);
  sortPlayerStatRows(rosterIds, stats, portalStatsSortKey, portalStatsSortDir).forEach((pid) => {
    const s = stats[pid] || { ab: 0, h: 0, r: 0, rbi: 0 };
    const isPlaying = playingId === pid;
    body.appendChild(h('div', { class: 'portal-player-row' }, [
      h('span', { class: 'portal-player-name', text: playerNameOf(pid) }),
      h('span', { class: 'portal-player-stat' + (s.h ? '' : ' zero'), text: String(s.h) }),
      h('span', { class: 'portal-player-stat' + (s.r ? '' : ' zero'), text: String(s.r) }),
      h('span', { class: 'portal-player-stat' + (s.rbi ? '' : ' zero'), text: String(s.rbi) }),
      h('button', {
        class: 'portal-play-btn' + (isPlaying ? ' playing' : ''), text: isPlaying ? '⏹' : '▶',
        onclick: () => {
          if (isPlaying) {
            if (Date.now() - playStartedAtMs < STOP_TAP_GRACE_MS) return; // double-tap guard, same as everywhere else
            stopCurrent(true);
          } else {
            playClip(pid);
          }
        },
      }),
    ]));
  });
  return wrap;
}

// Screen 2 -- schedule + results. Played games (device-scored OR a
// manifest-only score like game 1) tap through to screen 6, except a
// manifest-only result (dagger-marked, no play-by-play to show).
function renderPortalSchedule() {
  const wrap = h('div', {});
  wrap.appendChild(renderPortalHeader('stats', () => { portalScreen = 'stats'; render(); }));
  const body = h('div', { class: 'portal-body' });
  wrap.appendChild(body);
  const rec = seasonRecord();
  body.appendChild(h('div', { class: 'portal-section-label', text: 'Season · ' + (DATA.teamShort || teamAbbrev()) + ' ' + rec.w + '–' + rec.l }));

  const next = nextScheduledGame();
  const byId = {};
  seasonGameRecords().forEach((r) => { if (r.scheduleGameId) byId[r.scheduleGameId] = r; });

  (DATA.schedule || []).forEach((g) => {
    const played = byId[g.id];
    const isNext = !!(next && next.id === g.id);
    const isFuture = !played && !isNext;
    const attrs = { class: 'portal-schedule-row' + (isNext ? ' next' : '') + (isFuture ? ' future' : '') };
    if (played) attrs.onclick = () => { portalScreen = 'gameDetail'; portalGameDetailId = g.id; render(); };
    const row = h('div', attrs, [
      h('span', { class: 'portal-schedule-date', text: formatFixtureDateShort(g) }),
      h('span', { class: 'portal-schedule-opp', text: g.opponent || 'TBD' }),
    ]);
    if (played) {
      const won = played.final.us > played.final.them;
      row.appendChild(h('span', { class: 'portal-schedule-result ' + (won ? 'win' : 'loss'), text: (won ? 'W ' : 'L ') + played.final.us + '–' + played.final.them }));
      row.appendChild(h('span', { class: played.source === 'manifest' ? 'portal-schedule-dagger' : 'portal-schedule-chev', text: played.source === 'manifest' ? '†' : '▶' }));
    } else if (g.opponent) {
      row.appendChild(h('span', { class: 'portal-schedule-time', text: formatFixtureTimeVenue(g) }));
    } else {
      row.appendChild(h('span', { class: 'portal-schedule-tbd', text: '—' }));
    }
    body.appendChild(row);
  });
  body.appendChild(h('div', { class: 'portal-schedule-footnote', text: '† final score only' }));
  return wrap;
}

// Screen 6 -- per-game deep dive. Line score from runsByInning, tap-to-
// sort game lines, "view scorecard" reuses the SAME canvas renderer as
// the live box score (drawScorecard/drawScorecardTotals), pointed at this
// past game's events via a synchronous save/restore swap of
// scoringState/scoringEvents (render() never yields mid-pass, so this is
// safe) rather than threading a state param through every scorecard
// function this session.
function renderPortalGameDetail() {
  const wrap = h('div', {});
  wrap.appendChild(renderPortalHeader('‹ schedule', () => { portalScreen = 'schedule'; portalGameDetailId = null; render(); }));
  const body = h('div', { class: 'portal-body' });
  wrap.appendChild(body);
  const rec = seasonGameRecords().find(r => r.scheduleGameId === portalGameDetailId);
  if (!rec) {
    body.appendChild(h('div', { class: 'portal-schedule-footnote', text: 'No data for this game yet.' }));
    return wrap;
  }
  const fixture = scheduleFixtureById(portalGameDetailId);
  const won = rec.final.us > rec.final.them;
  body.appendChild(h('div', { class: 'portal-gd-header' }, [
    h('span', { class: 'portal-gd-title', text: formatFixtureDateShort(fixture || {}) + ' · vs ' + (rec.opponent || 'TBD') }),
    h('span', { class: 'portal-gd-result ' + (won ? 'win' : 'loss'), text: (won ? 'W ' : 'L ') + rec.final.us + '–' + rec.final.them }),
  ]));
  if (rec.source === 'manifest') {
    body.appendChild(h('div', { class: 'portal-schedule-footnote', text: 'Final score only -- no play-by-play data for this game.' }));
    return wrap;
  }

  const st = deriveState(rec.events);
  const maxInning = st.inning;
  const headRow = h('tr', {}, [h('td', {})]);
  for (let i = 1; i <= maxInning; i++) headRow.appendChild(h('th', { text: String(i) }));
  headRow.appendChild(h('th', { text: 'R' }));
  const table = h('table', { class: 'portal-linescore' }, [headRow]);
  [['us', DATA.teamShort || teamAbbrev()], ['them', (rec.opponent || 'THEM').slice(0, 3).toUpperCase()]].forEach((pair) => {
    const side = pair[0], label = pair[1];
    const tr = h('tr', {}, [h('td', { class: 'team-label', text: label })]);
    for (let i = 1; i <= maxInning; i++) tr.appendChild(h('td', { text: String((st.runsByInning[side] && st.runsByInning[side][i]) || 0) }));
    tr.appendChild(h('td', { class: 'runs-total', text: String(side === 'us' ? rec.final.us : rec.final.them) }));
    table.appendChild(tr);
  });
  body.appendChild(table);

  body.appendChild(h('button', {
    class: 'portal-view-scorecard-btn', text: '▦ view scorecard',
    onclick: () => { portalScorecardOpen = true; render(); },
  }));

  const gs = computeStats(st);
  const header = h('div', { class: 'portal-sort-header' }, [h('span', { class: 'fill', text: 'Game lines' })]);
  ['ab', 'h', 'r', 'rbi'].forEach((key) => {
    header.appendChild(h('span', {
      class: 'portal-sort-col' + (portalGameLinesSortKey === key ? ' active' : ''),
      text: key.toUpperCase() + (portalGameLinesSortKey === key ? (portalGameLinesSortDir < 0 ? ' ▾' : ' ▴') : ''),
      onclick: () => toggleSort(key,
        () => portalGameLinesSortKey, (v) => { portalGameLinesSortKey = v; },
        () => portalGameLinesSortDir, (v) => { portalGameLinesSortDir = v; }),
    }));
  });
  body.appendChild(header);
  sortPlayerStatRows(st.lineup.slice(), gs, portalGameLinesSortKey, portalGameLinesSortDir).forEach((pid) => {
    const s = gs[pid] || { ab: 0, h: 0, r: 0, rbi: 0 };
    body.appendChild(h('div', { class: 'portal-player-row' }, [
      h('span', { class: 'portal-player-name', text: playerNameOf(pid) }),
      h('span', { class: 'portal-player-stat' + (s.ab ? '' : ' zero'), text: String(s.ab) }),
      h('span', { class: 'portal-player-stat' + (s.h ? '' : ' zero'), text: String(s.h) }),
      h('span', { class: 'portal-player-stat' + (s.r ? '' : ' zero'), text: String(s.r) }),
      h('span', { class: 'portal-player-stat' + (s.rbi ? '' : ' zero'), text: String(s.rbi) }),
    ]));
  });
  return wrap;
}

function renderPortalGameScorecard() {
  const rec = seasonGameRecords().find(r => r.scheduleGameId === portalGameDetailId);
  if (!rec || rec.source !== 'log') { portalScorecardOpen = false; return renderPortalGameDetail(); }
  const savedState = scoringState, savedEvents = scoringEvents;
  scoringState = deriveState(rec.events);
  scoringEvents = rec.events;
  let wrap;
  try {
    const L = scorecardLayout();
    const canvas = h('canvas', { class: 'scorecard-canvas', width: L.w * 2, height: L.h * 2, style: 'width:' + L.w + 'px;height:' + L.h + 'px' });
    drawScorecard(canvas);
    const totalsCanvas = h('canvas', { class: 'scorecard-totals-canvas', width: L.totalsW * 2, height: L.h * 2, style: 'width:' + L.totalsW + 'px;height:' + L.h + 'px' });
    drawScorecardTotals(totalsCanvas);
    wrap = h('div', {}, [
      renderPortalHeader('✕ close', () => { portalScorecardOpen = false; render(); }),
      h('div', { class: 'boxscore-panel' }, [
        h('div', { class: 'boxscore-grid-wrap' }, [
          h('div', { class: 'boxscore-scroll' }, [canvas]),
          h('div', { class: 'boxscore-totals-sticky' }, [totalsCanvas]),
        ]),
      ]),
    ]);
  } finally {
    scoringState = savedState;
    scoringEvents = savedEvents;
  }
  return wrap;
}

// Screen 3 -- the one context-aware overlay that sits ON TOP of the
// portal rather than replacing it (07: "Appears over the portal"). Accept
// clears portal state and hands off to the EXISTING Start Game flow
// (openStartGameFlow already gates on the PIN); decline just dismisses
// for this session -- 07 leaves the exact re-offer/banner behavior open,
// this is a deliberately simple default, not a final answer.
function renderGameWindowPrompt() {
  const fixture = scheduleGameInWindowNow();
  const wrap = h('div', { class: 'portal-prompt-wrap' });
  wrap.appendChild(h('div', { class: 'portal-header portal-prompt-dim' }, [renderWordmark()]));
  wrap.appendChild(h('div', { class: 'portal-prompt-card' }, [
    h('div', { class: 'portal-prompt-label', text: 'Game tonight' }),
    h('div', { class: 'portal-prompt-vs', text: 'vs ' + (fixture ? fixture.opponent : 'TBD') }),

function renderPortalShell() {
  if (gameWindowPromptOpen) return renderGameWindowPrompt();
  if (portalScreen === 'gameDetail' && portalScorecardOpen) return renderPortalGameScorecard();
  if (portalScreen === 'schedule') return renderPortalSchedule();
  if (portalScreen === 'gameDetail') return renderPortalGameDetail();
  return renderPortalStats();
}
/* __SCORING_END__ */

// Safe accessor for render()'s shared/unmarked tail below (tab-bar
// visibility, reorder-frame toggle) -- same pattern as scoringEditorActive().
function isPortalActive() {
  /* __SCORING_START__ */
  if (portalActive) return true;
  /* __SCORING_END__ */
  return false;
}

function render() {
  liveCountdownUpdate = null;
  // Defensive sweep: a drag whose pointer stream dies mid-gesture (seen
  // on-device at game 1: WebKit can stop delivering pointer events after
  // the captured tile has been moved in the DOM repeatedly) can strand
  // its ghost and placeholder styling. Any render -- e.g. tapping Done,
  // or any other tap -- clears strays, so a broken drag can never leave
  // permanent debris on screen.
  const appEl = document.getElementById('app');
  appEl.querySelectorAll('.drag-ghost').forEach(g => {
    if (g.parentElement) g.parentElement.removeChild(g);
  });
  appEl.querySelectorAll('.drag-placeholder').forEach(t => t.classList.remove('drag-placeholder'));
  /* __SCORING_START__ */
  // Defensive refresh: keeps scoringState consistent with scoringEvents
  // even if something mutated the array without re-deriving itself (the
  // in-app handlers already do this, but render() shouldn't depend on
  // every future caller remembering to).
  if (DATA.scoring && DATA.scoring.enabled) scoringState = deriveState(scoringEvents);
  // S1.5: a correction sheet only ever makes sense on the live offense
  // screen. Clearing it here (rather than in every handler that could
  // navigate away or flip the half) means a stale sheet can never survive
  // a tab switch, a half-flip mid-correction, or a fresh game -- one
  // choke point instead of N places to remember.
  const onLiveOffenseScreen = isScoringLive() && state.activeTab === 'lineup' && !state.editing && scoringState.half === 'us';
  if (!onLiveOffenseScreen || scoringBoxScoreOpen) scoringCorrection = null;
  // The box score survives half flips (it shows both halves) but not
  // leaving the live game screen -- same choke-point pattern as
  // scoringCorrection above.
  if (!(isScoringLive() && state.activeTab === 'lineup' && !state.editing)) { scoringBoxScoreOpen = false; endGameConfirmOpen = false; }
  if (isScoringLive()) checkMercyMusicPause();
  // Portal: a live game always wins (rule 1 of 07's boot rule), same
  // choke-point pattern as the resets above -- if a game starts while the
  // portal is showing (e.g. accepting the game-window prompt), portal
  // state clears itself rather than needing every entry point to remember to.
  if (isScoringLive() && portalActive) { portalActive = false; gameWindowPromptOpen = false; }
  /* __SCORING_END__ */
  screenEl.innerHTML = '';
  if (isPortalActive()) {
    /* __SCORING_START__ */
    screenEl.appendChild(renderPortalShell());
    /* __SCORING_END__ */
  } else if (state.activeTab === 'lineup') {
    /* __SCORING_START__ */
    // S1.6: the PIN sheet and the tap-to-draft editor both take over the
    // whole Lineup tab, ahead of the classic state.editing dispatch below
    // -- neither depends on (or touches) the classic order/pointerId
    // system, so this is purely additive; a non-scoring build never sets
    // either flag and falls straight through to the original chain.
    if (pinSheet) {
      const pinWrap = h('div', {});
      pinWrap.appendChild(h('div', { class: 'topbar' }, [renderWordmark()]));
      pinWrap.appendChild(renderPinSheet());
      screenEl.appendChild(pinWrap);
    } else if (scoringLineupEditor) {
      screenEl.appendChild(renderScoringLineupEditor());
    } else
    /* __SCORING_END__ */
    if (state.editing) {
      screenEl.appendChild(renderGridReorder());
    /* __SCORING_START__ */
    } else if (isScoringLive()) {
      screenEl.appendChild(renderScoringGameScreen()); // scoring takes over Next Up while a game is live
    /* __SCORING_END__ */
    } else {
      screenEl.appendChild(renderLineupTab());
    }
  } else {
    screenEl.appendChild(renderGridPlay()); // All Songs: always the soundboard, no modes
  }

  document.getElementById('tabLineup').classList.toggle('active', state.activeTab === 'lineup');
  document.getElementById('tabGrid').classList.toggle('active', state.activeTab === 'grid');
  // Tab bar hidden in the portal (its own surface, no tabs) AND on the team
  // phone pre-game (2026-07-14: the Soundboard tab was a live escape hatch
  // around the PIN gate / Start Game editor -- tapping it bypassed both and
  // landed on the classic grid, exactly the "unusable at the #anchored URL"
  // guarantee Jason asked for). Reappears once a game goes live: the grid
  // stays reachable as the firm-principle-5 manual-override fallback during
  // real play, same as every other device.
  document.getElementById('tabbar').classList.toggle('hidden', isPortalActive() || (isTeamPhone() && !isScoringLive()));
  const inReorder = !isPortalActive() && state.activeTab === 'lineup' && (state.editing || scoringEditorActive());
  document.getElementById('app').classList.toggle('reorder-frame', inReorder);

  // Keep the on-card countdown live: start the tick the moment something
  // starts playing, stop it the moment nothing is. Living here (rather
  // than in playClip/stopCurrent) means every path that starts or ends
  // playback automatically keeps this in sync just by calling render(),
  // which they all already do.
  if ((currentSource || scoringAutoPlayPending) && !tickInterval) {
    tickInterval = setInterval(tickCountdown, 200);
  } else if (!currentSource && !scoringAutoPlayPending && tickInterval) {
    clearInterval(tickInterval);
    tickInterval = null;
  }
}

function renderLineupTab() {
  const wrap = h('div', {});
  const top = h('div', { class: 'topbar' }, [
    renderWordmark(),
  ]);

  if (order.length === 0) {
    top.appendChild(h('div', { class: 'topbar-right' }, [renderOrderButton(), renderStartGameButtonIfNeeded()]));
    wrap.appendChild(top);
    wrap.appendChild(h('div', { class: 'empty-state' }, [
      h('div', { text: 'No lineup set yet.' }),
      h('button', { class: 'done-btn', text: 'Set lineup', onclick: enterReorderMode }),
    ]));
    return wrap;
  }

  const pos = positionLabel(order, pointerId);
  const right = h('div', { class: 'topbar-right' }, [renderOrderButton(), renderStartGameButtonIfNeeded()]);
  top.appendChild(right);
  wrap.appendChild(top);

  const body = h('div', { class: 'lineup-body' });
  const name = playersById[pointerId] ? playersById[pointerId].name : '—';
  // Advancing to the next kicker's name happens once this clip actually
  // finishes or is stopped (see finishLineupIfPending) -- not immediately
  // on tap -- so the card never shows a name that doesn't match what's
  // playing. While it's playing, the card itself is the stop control:
  // there's no separate Stop/fade button anymore.
  const cardPlaying = isLineupCardPlaying(pointerId);
  const remaining = cardPlaying ? cardRemainingSeconds(pointerId) : null;
  // "fade out", not "stop": stopCurrent(true) really does ramp the clip
  // down over fadeOutMs, and operators unfamiliar with the app hesitate
  // to tap something they think will hard-cut the music (Jason, 2026-07-07).
  const caption = cardPlaying
    ? (remaining !== null ? `${formatCountdown(remaining)} — tap to fade out` : 'tap to fade out')
    : 'tap anywhere to play';
  const captionEl = h('div', { class: 'nowup-caption', text: caption });
  const card = h('button', { class: 'nowup-card' + (cardPlaying ? ' playing' : ''), onclick: () => {
    if (cardPlaying) {
      if (Date.now() - playStartedAtMs < STOP_TAP_GRACE_MS) return; // double-tap guard
      stopCurrent(true);
    }
    else playClip(pointerId, { lineup: true });
  }}, [
    h('div', { class: 'nowup-label', text: 'Now up' }),
    h('div', { class: 'nowup-name', text: name.toUpperCase() }),
    pos ? h('div', { class: 'nowup-counter', text: `${pos.position} of ${pos.total}` }) : null,
    cardPlaying ? h('div', { class: 'nowup-stop-icon' }) : h('div', { class: 'nowup-play-icon' }),
    captionEl,
  ]);
  if (cardPlaying && remaining !== null) {
    const pid = pointerId;
    liveCountdownUpdate = () => {
      const r = cardRemainingSeconds(pid);
      if (r !== null) captionEl.textContent = formatCountdown(r) + ' — tap to fade out';
    };
  }
  body.appendChild(card);

  const nav = h('div', { class: 'navbtns' }, [
    h('button', { class: 'navbtn', text: '⏮ back', onclick: () => {
      pointerId = prevPointer(order, pointerId); persistPointer(); render();
    }}),
    h('button', { class: 'navbtn', text: 'next ⏭', onclick: () => {
      pointerId = nextPointer(order, pointerId); persistPointer(); render();
    }}),
  ]);
  body.appendChild(nav);

  const deckIds = onDeckIds(order, pointerId, 3);
  if (deckIds.length > 0) {
    const ondeck = h('div', { class: 'ondeck' }, [
      h('div', { class: 'ondeck-label', text: 'On deck — tap to jump' }),
    ]);
    const row = h('div', { class: 'ondeck-row' });
    deckIds.forEach(id => {
      const posInOrder = order.indexOf(id) + 1;
      row.appendChild(h('button', { class: 'ondeck-chip', onclick: () => {
        pointerId = id; persistPointer(); render();
      }}, [
        h('span', { class: 'badge', text: String(posInOrder) }),
        h('span', { text: playersById[id].name }),
      ]));
    });
    ondeck.appendChild(row);
    body.appendChild(ondeck);
  }

  wrap.appendChild(body);
  return wrap;
}

function renderGridPlay() {
  const wrap = h('div', {});
  // No order button here (removed 2026-07-07): All Songs is a pure
  // soundboard. Editing the order is a Next Up concern only.
  const top = h('div', { class: 'topbar' }, [
    renderWordmark(),
  ]);
  wrap.appendChild(top);
  wrap.appendChild(h('div', { class: 'grid-hint', text: 'A → Z by row' }));

  const grid = h('div', { class: 'grid' });
  const sorted = [...DATA.players].sort((a, b) => a.name.localeCompare(b.name));
  sorted.forEach(p => {
    const isPlaying = playingId === p.id;
    const isUnavailable = unavailable.has(p.id);
    const cls = 'tile' + (isPlaying ? ' playing' : '') + (isUnavailable ? ' unavailable' : '');
    // Same tap-to-stop pattern as the NOW UP card: a playing tile is its
    // own stop control (works whether the clip is this Grid override or a
    // still-playing lineup clip for the same player -- stopCurrent handles
    // either case correctly).
    // A playing tile carries its own countdown (second line, kept live by
    // the same text-node-only tick as the NOW UP card's caption).
    let countdownEl = null;
    if (isPlaying) {
      const r = currentRemainingSeconds();
      countdownEl = h('span', { class: 'tile-countdown', text: r !== null ? formatCountdown(r) : '' });
      liveCountdownUpdate = () => {
        const rr = currentRemainingSeconds();
        if (rr !== null) countdownEl.textContent = formatCountdown(rr);
      };
    }
    grid.appendChild(h('button', { class: cls, onclick: () => {
      if (isPlaying) {
        if (Date.now() - playStartedAtMs < STOP_TAP_GRACE_MS) return; // double-tap guard
        stopCurrent(true);
      }
      else playClip(p.id);
    }}, [
      h('span', { text: p.name }),
      isPlaying ? h('span', { class: 'speaker', text: '⏹' }) : null,
      countdownEl,
    ]));
  });
  wrap.appendChild(grid);
  wrap.appendChild(h('div', { class: 'guest-wrap' }, [
    h('button', { class: 'tile guest', onclick: () => {} }, [
      h('span', { text: 'Guest' }),
    ]),
  ]));
  return wrap;
}

function renderGridReorder() {
  const wrap = h('div', {});
  const top = h('div', { class: 'topbar' }, [
    h('div', { class: 'reorder-banner-pill', text: 'Editing order' }),
    h('div', { class: 'topbar-right' }, [
      h('button', {
        class: 'recall-btn',
        text: "🕐 last game",
        disabled: !lastGameOrder || lastGameOrder.length === 0,
        onclick: () => {
          if (!lastGameOrder || lastGameOrder.length === 0) return;
          order = lastGameOrder.filter(id => playersById[id]);
          pointerId = resolvePointer(order, pointerId);
          persistOrder(); persistPointer(); render();
        },
      }),
      // Start-fresh: bench everyone in one tap (added 2026-07-06 round 3).
      // Reorder-mode only, so it costs the core walk-up flow nothing; if
      // it's ever tapped by mistake, "last game" recall is the undo path
      // for any lineup that was finalized with Done.
      h('button', {
        class: 'recall-btn',
        text: '✕ clear',
        disabled: order.length === 0,
        onclick: () => {
          order = [];
          pointerId = null;
          persistOrder(); persistPointer(); render();
        },
      }),
    ]),
  ]);
  wrap.appendChild(top);
  wrap.appendChild(h('div', { class: 'grid-hint', text: 'Kicking order by row · drag to move · tap to bench' }));

  const grid = h('div', { class: 'grid' });
  order.forEach((id, idx) => {
    const p = playersById[id];
    const tile = h('button', { class: 'tile order-tile' }, [
      h('span', { class: 'badge', text: String(idx + 1) }),
      h('span', { text: p.name }),
    ]);
    wireDragTile(tile, id, grid);
    grid.appendChild(tile);
  });
  wrap.appendChild(grid);

  // Done sits ABOVE the "Not playing" bench (2026-07-07, Jason): with a
  // full lineup the bench pushed Done below the fold, and the most common
  // exit action shouldn't need a scroll to reach.
  wrap.appendChild(h('div', { class: 'done-wrap' }, [
    h('button', { class: 'done-full', text: '✓ Done', onclick: () => {
      lastGameOrder = order.slice();
      saveJSON('lastGameOrder', lastGameOrder);
      // Land on the Lineup/play-card screen -- that's the screen an
      // operator actually needs once the lineup is locked in.
      state.editing = false;
      state.activeTab = 'lineup';
      render();
    }}),
  ]));

  const benchedIds = computeBenched(allIds, order).sort((a, b) => playersById[a].name.localeCompare(playersById[b].name));
  wrap.appendChild(h('div', { class: 'bench-heading', text: 'Not playing — tap to add' }));
  const benchGrid = h('div', { class: 'bench-grid' });
  benchedIds.forEach(id => {
    const p = playersById[id];
    benchGrid.appendChild(h('button', { class: 'tile bench-tile', onclick: () => {
      order = addToOrder(order, id);
      pointerId = resolvePointer(order, pointerId);
      persistOrder(); persistPointer(); render();
    }}, [h('span', { text: p.name })]));
  });
  wrap.appendChild(benchGrid);

  return wrap;
}

/* ---- drag-to-reorder (Pointer Events; tap-vs-drag disambiguated by
   movement distance -- see 01-Architecture.md "Interaction algebra":
   drag is never required, tap-out/tap-in alone can reach any order).

   Rebuilt 2026-07-06 after game-1 feedback ("nearly unusable"). Three
   compounding defects in the first version: (1) nothing followed the
   finger -- the tile only teleported when a reshuffle fired, so there was
   no sense of holding anything; (2) the before/after drop test compared
   Y midpoints, which is meaningless between tiles in the same row of a
   3-column grid, so horizontal moves were coin flips; (3) nothing
   suppressed text selection, so iOS treated drags as selection gestures
   (blue ranges + loupe -- see the global user-select:none in the CSS).

   Now: on drag start, a fixed-position ghost copy of the tile follows the
   finger (pointer-events:none, so elementFromPoint sees through it to the
   grid); the original tile stays in the grid as a dimmed placeholder and
   is what actually gets reordered. Hovering another tile moves the
   placeholder by reading-order logic -- dragging forward inserts after
   the hovered tile, dragging backward inserts before it -- and displaced
   tiles FLIP-animate into their new slots so the shuffle reads as motion,
   not a text swap. */
const DRAG_THRESHOLD_PX = 10;

// Measure every order tile, run the DOM mutation, then animate each moved
// tile from its old position to its new one (FLIP). The dragged/placeholder
// tile is excluded -- it should snap, not glide, since the ghost is what
// the eye is following.
function flipTiles(gridEl, exceptTile, mutate) {
  const tiles = Array.from(gridEl.querySelectorAll('.order-tile'));
  const before = new Map();
  tiles.forEach(t => before.set(t, t.getBoundingClientRect()));
  mutate();
  tiles.forEach(t => {
    if (t === exceptTile) return;
    const b = before.get(t), a = t.getBoundingClientRect();
    const dx = b.left - a.left, dy = b.top - a.top;
    if (!dx && !dy) return;
    t.style.transition = 'none';
    t.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
    if (typeof requestAnimationFrame === 'function') {
      requestAnimationFrame(() => requestAnimationFrame(() => {
        t.style.transition = 'transform 150ms ease';
        t.style.transform = '';
      }));
    } else {
      t.style.transition = ''; t.style.transform = '';
    }
  });
}

/* Once a drag is live, move/up/cancel handling shifts from the tile to
   DOCUMENT-level listeners (hardened 2026-07-06 after game-1 round 2:
   long drags left frozen ghosts on screen). Root cause: cleanup hung
   entirely off pointerup firing on the dragged tile, and Safari can stop
   delivering a captured pointer stream after the captured element has
   been moved in the DOM several times -- which is exactly what a long
   drag does. Document listeners survive any DOM churn on the tile; and
   even if the whole event stream dies, render()'s drag-debris sweep
   clears strays on the next tap anywhere. */
function wireDragTile(tile, id, gridEl) {
  let startX = 0, startY = 0, dragging = false, moved = false;
  let ghost = null;
  let lastSwap = null;
  let activePointer = null;

  function startGhost() {
    const rect = tile.getBoundingClientRect();
    ghost = tile.cloneNode(true);
    ghost.classList.add('drag-ghost');
    ghost.style.position = 'fixed';
    ghost.style.left = rect.left + 'px';
    ghost.style.top = rect.top + 'px';
    ghost.style.width = rect.width + 'px';
    ghost.style.height = rect.height + 'px';
    ghost.style.margin = '0';
    ghost.style.pointerEvents = 'none';
    document.getElementById('app').appendChild(ghost);
    tile.classList.add('drag-placeholder');
  }

  function endGhost() {
    if (ghost && ghost.parentElement) ghost.parentElement.removeChild(ghost);
    ghost = null;
    lastSwap = null;
    tile.classList.remove('drag-placeholder');
  }

  function handleMove(e) {
    if (e.preventDefault) e.preventDefault();
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (ghost) ghost.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
    // The ghost is pointer-events:none, so this sees the grid underneath.
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const hoverTile = target ? target.closest('.order-tile') : null;
    if (hoverTile && hoverTile !== tile && hoverTile.parentElement === gridEl) {
      // Only reorder when the hovered tile changes -- prevents flip-flop
      // jitter while the finger sits on a boundary.
      if (hoverTile !== lastSwap) {
        lastSwap = hoverTile;
        const tiles = Array.from(gridEl.querySelectorAll('.order-tile'));
        const from = tiles.indexOf(tile), to = tiles.indexOf(hoverTile);
        if (from !== -1 && to !== -1 && from !== to) {
          flipTiles(gridEl, tile, () => {
            gridEl.insertBefore(tile, from < to ? hoverTile.nextSibling : hoverTile);
          });
        }
      }
    } else if (!hoverTile || hoverTile === tile) {
      lastSwap = null;
    }
  }

  function detachDocHandlers() {
    document.removeEventListener('pointermove', onDocMove);
    document.removeEventListener('pointerup', onDocUp);
    document.removeEventListener('pointercancel', onDocCancel);
  }

  // Commit the drag. Idempotent (dragging flag) because in a real browser
  // the same pointerup can reach both a tile listener and these document
  // listeners via bubbling.
  function finishDrag() {
    if (!dragging) return;
    dragging = false;
    detachDocHandlers();
    endGhost();
    // If some other tap rebuilt the UI mid-drag (e.g. a second finger hit
    // Done), the old grid is detached -- committing its order would
    // resurrect stale state. Just re-render and drop this drag.
    if (tile.isConnected === false) { render(); return; }
    // Read the tiles' final DOM order back into `order`.
    const newOrder = Array.from(gridEl.querySelectorAll('.order-tile')).map(t => t._playerId);
    if (newOrder.length === order.length) {
      order = newOrder;
      pointerId = resolvePointer(order, pointerId);
      persistOrder(); persistPointer();
    }
    render();
  }

  function cancelDrag() {
    if (!dragging) return;
    dragging = false;
    detachDocHandlers();
    endGhost();
    render(); // re-sync DOM from state -- the interrupted drag is discarded
  }

  function onDocMove(e) { if (e.pointerId === activePointer) handleMove(e); }
  function onDocUp(e) { if (e.pointerId === activePointer) finishDrag(); }
  function onDocCancel(e) { if (e.pointerId === activePointer) cancelDrag(); }

  tile.addEventListener('pointerdown', (e) => {
    startX = e.clientX; startY = e.clientY; moved = false; dragging = false;
    activePointer = e.pointerId;
    try { tile.setPointerCapture(e.pointerId); } catch (err) {}
  });

  tile.addEventListener('pointermove', (e) => {
    if (dragging) { if (e.preventDefault) e.preventDefault(); return; } // document handlers own the drag
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (Math.hypot(dx, dy) > DRAG_THRESHOLD_PX) {
      dragging = true; moved = true;
      startGhost();
      document.addEventListener('pointermove', onDocMove);
      document.addEventListener('pointerup', onDocUp);
      document.addEventListener('pointercancel', onDocCancel);
      handleMove(e);
    }
  });

  tile.addEventListener('pointerup', (e) => {
    try { tile.releasePointerCapture(e.pointerId); } catch (err) {}
    if (dragging) return; // finishDrag runs via the document listener for this same event
    if (!moved) {
      // Tap (no meaningful movement): bench this player.
      order = benchPlayer(order, id);
      pointerId = resolvePointer(order, pointerId);
      persistOrder(); persistPointer(); render();
    }
  });

  tile.addEventListener('pointercancel', () => {
    if (!dragging) render(); // drag path cleans up via the document listener
  });

  tile._playerId = id;
}

/* ============================================================
   Tab bar wiring
   ============================================================ */
// Next Up shows the editor if an edit is in progress (state.editing),
// otherwise the play card. All Songs is unconditionally the soundboard
// (firm principle 5: the grid never blocks -- no modes, no special cases,
// identical with a full, partial, or empty order). A mid-edit peek at All
// Songs and back resumes the editor; only Done ends it.
document.getElementById('tabLineup').addEventListener('click', () => { state.activeTab = 'lineup'; render(); });
document.getElementById('tabGrid').addEventListener('click', () => {
  state.activeTab = 'grid';
  render();
});

/* ============================================================
   Boot
   ============================================================ */
decodeAll().then(() => {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  requestWakeLock();
  decidePortalBoot();
  render();
}).catch(err => {
  console.error('Fatal error decoding clips', err);
  document.getElementById('loading').textContent = 'Something went wrong loading the songs. Try reloading.';
});

/* Register the service worker so the app keeps working with zero network
   at the park -- Add to Home Screen alone only bookmarks a URL; without
   this, a relaunch with no connectivity has nothing to re-fetch. Requires
   a secure context (https:// or localhost), which GitHub Pages provides.
   Non-fatal if unsupported -- the app still runs, just without the
   offline-relaunch guarantee. */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => {
      console.error('Service worker registration failed', err);
    });
  });
}
</script>
</body>
</html>
