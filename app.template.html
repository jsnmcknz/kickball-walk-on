  if (name && name !== id) return assignRunnerCode(id, name);
  return (String(id).slice(0, 2).toUpperCase() || '?');
}
function baseLabel(n) {
  if (n === null || n === undefined) return 'home';
  return n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : String(n);
}

// Plain-English result names for the recap line -- the result PAD keeps
// the shorthand codes (1B/2B/3B/... are faster to tap and standard
// scorekeeping shorthand), but the recap a scorer glances at afterward
// reads better in full words (Jason, live feedback, 2026-07-07).
const RESULT_PLAIN_TEXT = {
  '1B': 'Singled', '2B': 'Doubled', '3B': 'Tripled', 'HR': 'Homered',
  'FLY': 'Flied Out', 'GND': 'Grounded Out', 'K': 'Struck Out',
  'MISSED': 'Unknown Result', 'SKIP': "Didn't Kick",
};

// Structured recap of the last event -- {name, rest, details[], rbiText}
// rather than one inline string. `name` is the headline's subject
// (moss-colored, per Jason's live feedback -- ONLY the headline name, not
// the detail list's names); `rest` is everything after it ("– Doubled").
// RBI count no longer lives in the headline (Jason, live feedback,
// 2026-07-07: it was wrapping onto its own line next to the at-bat
// summary) -- it's now the last line of the movement `details` list,
// via the separate `rbiText` field, rendered in white to stand out from
// the muted movement lines.
function buildLastActionRecap(lastAction) {
  if (!lastAction) return null;
  const name = playerNameOf(lastAction.playerId);
  if (lastAction.kind === 'pa') {
    const plain = RESULT_PLAIN_TEXT[lastAction.result] || lastAction.result;
    const rbi = lastAction.rbi || 0;
    const rest = ' – ' + plain;
    const rbiText = rbi > 0 ? (rbi + ' RBI' + (rbi > 1 ? 's' : '')) : null;
    const moves = lastAction.movements || [];
    const details = [];
    moves.filter(m => m.scored && m.playerId !== lastAction.playerId).forEach(m => details.push(playerNameOf(m.playerId) + ' scored'));
    moves.filter(m => !m.scored && m.playerId !== lastAction.playerId).forEach(m => details.push(playerNameOf(m.playerId) + ' ' + baseLabel(m.from) + '→' + baseLabel(m.to)));
    return { name: name, rest: rest, details: details, rbiText: rbiText };
  }
  if (lastAction.kind === 'runner_out') return { name: name, rest: ' – out on the bases', details: [] };
  if (lastAction.kind === 'runner_out_at_home') return { name: name, rest: ' – out at home, run removed', details: [] };
  if (lastAction.kind === 'runner_return') {
    const mine = (lastAction.movements || []).find(m => m.playerId === lastAction.playerId);
    return { name: name, rest: ' – back to ' + baseLabel(mine ? mine.to : null) + ', run removed', details: [] };
  }
  if (lastAction.kind === 'runner_advance') {
    const moves = lastAction.movements || [];
    const mine = moves.find(m => m.playerId === lastAction.playerId);
    const rest = mine && mine.scored ? ' – scored' : mine ? (' – to ' + baseLabel(mine.to)) : ' – advanced';
    const details = moves.filter(m => m.scored && m.playerId !== lastAction.playerId).map(m => playerNameOf(m.playerId) + ' scored');
    return { name: name, rest: rest, details: details };
  }
  if (lastAction.kind === 'opp_out') return { name: null, rest: 'Opponent – out', details: [] };
  if (lastAction.kind === 'opp_run') return { name: null, rest: 'Opponent – run', details: [] };
  if (lastAction.kind === 'adjust') return { name: null, rest: 'Adjusted ' + lastAction.field, details: [] };
  return null;
}

// Last-at-bat assessment chip (round 2, Jason's on-device feedback
// 2026-07-08 -- replacing round 1's "PA + ✎ correction lines" merge): the
// chip shows the NEWLY CALCULATED assessment of the most recent at-bat,
// with any manual corrections already folded in as if they'd been scored
// that way live -- "Megan – Doubled / Ming 2nd→3rd", not a ledger of
// edits. Built by diffing the record's pre-PA board snapshot
// (runnersBefore) against the CURRENT board: moved runners get a line,
// runs credited to this PA (incl. inferred correction credits -- matched
// by record identity in runsLog) read "scored", a runner who vanished
// without scoring reads "out on the bases", and holds stay silent. RBI is
// the record's live count, so un-scoring drops the line automatically.
const RUNNER_CORRECTION_KINDS = { runner_advance: 1, runner_out: 1, runner_return: 1, runner_out_at_home: 1 };
function buildLastPaAssessment() {
  const paLog = scoringState.paLog;
  const rec = paLog.length ? paLog[paLog.length - 1] : null;
  if (!rec) return null;
  const before = rec.runnersBefore || {};
  const batter = rec.playerId;
  const scoredByThisPa = {};
  const details = [];
  // Line order (Jason, 2026-07-08 round 4): runs first, in the order they
  // scored (runsLog order); then basepath movements in ascending from-base
  // order (1st→2nd before 2nd→3rd); then outs on the bases last.
  scoringState.runsLog.forEach(en => {
    if (en.record !== rec) return;
    scoredByThisPa[en.playerId] = true;
    // The kicker's own run only gets a line when it isn't the headline
    // ("Homered" already says it; a corrected came-around does not).
    if (en.playerId === batter && rec.result === 'HR') return;
    details.push(playerNameOf(en.playerId) + ' scored');
  });
  Object.keys(before)
    .filter(pid => !scoredByThisPa[pid] && scoringState.runners[pid] !== undefined && scoringState.runners[pid] !== before[pid])
    .sort((a, b) => before[a] - before[b])
    .forEach(pid => details.push(playerNameOf(pid) + ' ' + baseLabel(before[pid]) + '→' + baseLabel(scoringState.runners[pid])));
  Object.keys(before)
    .filter(pid => !scoredByThisPa[pid] && scoringState.runners[pid] === undefined)
    .sort((a, b) => before[a] - before[b])
    .forEach(pid => details.push(playerNameOf(pid) + ' out on the bases'));
  // The kicker reached-then-erased case (hit stands, out on the bases).
  if (HIT_BASES[rec.result] && rec.result !== 'HR' && !scoredByThisPa[batter] && scoringState.runners[batter] === undefined) {
    details.push(playerNameOf(batter) + ' out on the bases');
  }
  const rbi = rec.rbi || 0;
  return {
    name: playerNameOf(batter),
    rest: ' – ' + (RESULT_PLAIN_TEXT[rec.result] || rec.result),
    details: details,
    rbiText: rbi > 0 ? (rbi + ' RBI' + (rbi > 1 ? 's' : '')) : null,
  };
}

function buildChipRecap() {
  const la = scoringState.lastAction;
  if (!la) return null;
  // SKIP never joins paLog -- show it standalone so an accidental SKIP is
  // still visible and fixable from the chip.
  if (la.kind === 'pa' && la.result === 'SKIP') return buildLastActionRecap(la);
  if (la.kind === 'pa' || RUNNER_CORRECTION_KINDS[la.kind]) {
    return buildLastPaAssessment() || buildLastActionRecap(la);
  }
  return buildLastActionRecap(la); // adjust / opp events keep the plain recap + undo-only sheet
}

// Beside the diamond (Jason, live feedback: moved back from a full-width
// row -- keep it paired with the on-base graphic it explains). Tappable
// (S1.5): opens the correction surface for the most recent event of any
// kind (openLastActionCorrection).
function renderLastActionChip() {
  const recap = buildChipRecap();
  if (!recap) return null;
  const headlineKids = [h('span', { text: '✎ ' })];
  if (recap.name) headlineKids.push(h('span', { class: 'la-name', text: recap.name }));
  headlineKids.push(h('span', { text: recap.rest }));
  const kids = [h('div', { class: 'la-headline' }, headlineKids)];
  recap.details.forEach(line => kids.push(h('div', { class: 'la-detail', text: line })));
  if (recap.rbiText) kids.push(h('div', { class: 'la-detail la-detail-rbi', text: recap.rbiText }));
  kids.push(h('div', { class: 'sub', text: 'tap to fix or undo' }));
  return h('button', { class: 'last-action-chip', onclick: openLastActionCorrection }, kids);
}

// The diamond's side column now holds just the last-action chip -- the
// on-base hint moved to sit under the diamond itself (Jason, live feedback).
function renderDiamondInfoColumn() {
  const info = h('div', { class: 'diamond-info' });
  const chip = renderLastActionChip();
  if (chip) info.appendChild(chip);
  return info;
}

// position:absolute (.diamond-col-caption) -- out of flex flow entirely,
// so it never affects the diamond's own centering (round 4, Jason, live
// feedback). Only called where there's real caption text; the correction
// sheets simply omit it now that it can't perturb anything by being absent.
function renderDiamondCaptionSlot(text) {
  return h('div', { class: 'diamond-col-caption', text: text });
}

function renderOnBaseHint() {
  const onBaseCount = Object.keys(scoringState.runners).length;
  const anyScored = !!(scoringState.scoredThisHalf && scoringState.scoredThisHalf.length > 0);
  // Kept to ONE line by construction (round 2, Jason on-device 2026-07-08:
  // the two-line version climbed up into the relocated home plate -- the
  // caption is bottom-anchored in the reference box and only has a single
  // line of clearance under the plate).
  // 2026-07-11 (Jason: visual optimization over excess instructions): the
  // "N on ·" count and the combined "or home" phrasing are gone -- with
  // runners on, the caption is always the short single line below; the
  // scored-runner affordance stays discoverable through the plate's moss
  // fill, and gets the caption to itself only when the bases are empty.
  let hintText;
  if (onBaseCount > 0) hintText = 'tap a runner to fix';
  else if (anyScored) hintText = 'tap home to fix a run';
  else hintText = 'bases empty';
  return renderDiamondCaptionSlot(hintText);
}

// ---- S1.5: correction-sheet rendering ----
// Round 7 (Jason, live feedback): replaced the old text list of +N
// buttons -- OUT (plum, "this ends" semantic) plus a short "tap a base"
// hint; the diamond itself is now the input (legalSetTargets/
// applyRunnerSet). This is also what let the panel shrink to a fixed
// height matching the last-action chip (round 3's centering fix) instead
// of scaling with however many bases happened to be legal.
function renderRunnerCorrectionSheet(playerId) {
  const runners = scoringState.runners;
  const targets = legalSetTargets(runners, playerId);
  const rows = [
    h('button', { class: 'correction-out', text: 'OUT', onclick: () => applyRunnerOut(playerId) }),
    h('div', { class: 'correction-tap-hint', text: 'tap a base to move ' + playerNameOf(playerId) }),
    h('button', { class: 'correction-cancel', text: '✕ cancel', onclick: closeScoringCorrection }),
  ];
  const panel = h('div', { class: 'correction-panel' }, [
    h('div', { class: 'correction-heading', text: playerNameOf(playerId).toUpperCase() + ' — on ' + baseLabel(runners[playerId]) }),
  ].concat(rows));
  // S1.5 round 1 (Jason, live feedback): dropped the transform:scale
  // "enlarge" -- it doesn't reserve layout space (transform never affects
  // box-model sizing/flow), so the diamond visually jumped/shifted against
  // the taller correction panel next to it instead of just looking bigger.
  // Same physical size as the normal diamond for now; the white-ring
  // (selected) / dim (uninvolved) / dashed-pickle (legal target) treatment
  // carries the emphasis.
  const diamondCol = h('div', { class: 'diamond-col' }, [renderDiamond({
    selectedId: playerId, tappable: false, legalTargets: targets,
    onTapTarget: (base) => applyRunnerSet(playerId, base),
  })]);
  return h('div', { class: 'diamond-row' }, [diamondCol, panel]);
}

// Scored-runner sheet (2026-07-08): same layout skeleton as the runner
// sheet -- OUT-first panel beside the diamond, tap-a-base as the input --
// but the "runner" is at home, so the white ring sits on home plate and
// the legal targets are the open bases they can be walked back to.
function renderScoredRunnerSheet(playerId) {
  const targets = legalReturnTargets(scoringState.runners);
  const rows = [
    h('button', { class: 'correction-out', text: 'OUT at home', onclick: () => applyScoredRunnerOut(playerId) }),
    h('div', { class: 'correction-tap-hint', text: 'or tap the base ' + playerNameOf(playerId) + ' really reached' }),
    h('button', { class: 'correction-cancel', text: '✕ cancel', onclick: closeScoringCorrection }),
  ];
  const panel = h('div', { class: 'correction-panel' }, [
    h('div', { class: 'correction-heading', text: playerNameOf(playerId).toUpperCase() + ' — scored' }),
  ].concat(rows));
  const diamondCol = h('div', { class: 'diamond-col' }, [renderDiamond({
    tappable: false, homeSelected: true, legalTargets: targets,
    onTapTarget: (base) => applyScoredRunnerReturn(playerId, base),
  })]);
  return h('div', { class: 'diamond-row' }, [diamondCol, panel]);
}

// Fix-last's own result pad, minus MISSED/SKIP (mockup 4 doesn't offer
// them as corrections -- amending "no result" isn't a case that comes up),
// current logged result pickle-highlighted. Filtered fresh each call
// (rather than a top-level const) since RESULT_BUTTONS is declared further
// down the file and script-load-order would otherwise matter.
function renderFixLastResultPad(currentResult, onSelect) {
  const pad = h('div', { class: 'result-pad' });
  RESULT_BUTTONS.filter(b => b.result !== 'MISSED' && b.result !== 'SKIP').forEach(btn => {
    const isCurrent = btn.result === currentResult;
    const bases = HIT_BASES[btn.result] || 0; // motif extends to every pad render (2026-07-11)
    pad.appendChild(h('button', { class: 'result-tile span' + btn.span + (isCurrent ? ' current' : '') + (bases ? ' hit' : ''), onclick: () => onSelect(btn.result) }, [
      bases ? h('span', { class: 'tile-dia dia-' + bases }) : null,
      h('span', { class: 'tile-lb', text: btn.label }),
      btn.sub ? h('div', { class: 'sub', text: btn.sub }) : null,
    ]));
  });
  return pad;
}

// Mockup 4: no duplicate NOW UP card or live result pad underneath -- this
// IS the whole offense body while it's open (see renderOffenseBody).
function renderFixLastSheet() {
  const c = scoringCorrection;
  const name = playerNameOf(c.forPlayerId);
  const plain = (RESULT_PLAIN_TEXT[c.currentResult] || c.currentResult).toLowerCase();
  const wrap = h('div', {});
  const diamondCol = h('div', { class: 'diamond-col scoring-dimmed' }, [renderDiamond({ tappable: false })]);
  // The FIXING chip fills the same slot .last-action-chip occupies on the
  // normal screen -- reads as "the chip is now in edit mode" (Jason, live
  // feedback) rather than a separate note-plus-banner pair.
  const fixingChip = h('div', { class: 'diamond-info fixlast-chip' }, [
    h('div', { class: 'fixlast-heading', text: 'FIXING: ' + name.toUpperCase() }),
    h('div', { class: 'fixlast-sub', text: 'logged as ' + plain + ' — tap the correct result' }),
  ]);
  wrap.appendChild(h('div', { class: 'diamond-row' }, [diamondCol, fixingChip]));
  const pad = renderFixLastResultPad(c.currentResult, applyFixLastAmend);
  pad.appendChild(h('button', { class: 'fixlast-undo', text: '↩ undo — ' + name + ' still at bat', onclick: applyFixLastUndo }));
  pad.appendChild(h('button', { class: 'fixlast-cancel', text: '✕ cancel', onclick: closeScoringCorrection }));
  // Rundown exception (architecture doc): only reachable via the
  // previous-kicker redirect, and only while that batter is still actually
  // on base -- e.g. a HR already sent them home, so "out on the bases"
  // wouldn't make sense there.
  if (c.viaRedirect && scoringState.runners[c.forPlayerId] !== undefined) {
    pad.appendChild(h('button', { class: 'fixlast-hitstands', text: 'out on the bases — hit stands', onclick: applyFixLastHitStands }));
  }
  // Escape hatch for the newest runner correction (see
  // openFixLastForMostRecentPa) -- same dashed idiom as hit-stands.
  if (c.lastCorrection) {
    const lbl = c.lastCorrection.label;
    const txt = '↩ undo last fix' + (lbl ? (' — ' + (lbl.name || '') + lbl.rest) : '');
    pad.appendChild(h('button', { class: 'fixlast-hitstands', text: txt, onclick: applyFixLastUndoCorrection }));
  }
  wrap.appendChild(pad);
  // Round 6 (Jason, live feedback): dropped the static "Megan's turn
  // resumes after the fix" closing line -- it's only true on the UNDO
  // path (which already says so on its own button: "Megan still at bat").
  // Amending to a different result does NOT revert the pointer -- whoever
  // is now up stays up -- so a blanket claim naming the batter being fixed
  // was actively wrong for the far more common amend case.
  return wrap;
}

// Minimal undo-only confirm for any non-`pa` last action (not in the
// mockups -- see the scoringCorrection shape comment above for why).
function renderUndoLastSheet() {
  const c = scoringCorrection;
  const wrap = h('div', {});
  const diamondCol = h('div', { class: 'diamond-col scoring-dimmed' }, [renderDiamond({ tappable: false })]);
  // Bug fix (S1.5 round 3): this used to append renderOnBaseHint() here
  // directly, which returns a bare .diamond-hint div with no 60%-column
  // sizing class at all -- it was never given the row's right-column
  // width the way every other use of this row is. .diamond-note both
  // fixes that and gives it the shared 132px reference height.
  const onBaseCount = Object.keys(scoringState.runners).length;
  const noteText = onBaseCount > 0 ? (onBaseCount + ' on base') : 'bases empty';
  wrap.appendChild(h('div', { class: 'diamond-row' }, [diamondCol, h('div', { class: 'diamond-note', text: noteText })]));
  const recap = c.label;
  const headline = recap ? ((recap.name || '') + recap.rest) : 'last action';
  wrap.appendChild(h('div', { class: 'undolast-banner' }, [
    h('div', { class: 'undolast-heading', text: headline }),
    h('div', { class: 'undolast-actions' }, [
      h('button', { class: 'undolast-btn', text: '↩ undo', onclick: applyUndoLast }),
      h('button', { class: 'undolast-btn cancel', text: '✕ cancel', onclick: closeScoringCorrection }),
    ]),
  ]));
  return wrap;
}

function renderCorrectionSheet() {
  const c = scoringCorrection;
  if (!c) return null;
  if (c.mode === 'runner') return renderRunnerCorrectionSheet(c.playerId);
  if (c.mode === 'scoredRunner') return renderScoredRunnerSheet(c.playerId);
  if (c.mode === 'fixLast') return renderFixLastSheet();
  if (c.mode === 'undoLast') return renderUndoLastSheet();
  if (c.mode === 'adjust') return renderAdjustSheet();
  return null;
}

// The compact NOW UP card: same play/stop primitives as the classic card
// and the Grid tiles (playClip/stopCurrent/currentRemainingSeconds), just
// keyed off the scoring lineup's current batter instead of pointerId, and
// with no pending-lineup-advance bookkeeping -- see the section banner.
function renderScoringNowUpCard() {
  const batter = scoringState.lineup[scoringState.lineupPointer];
  if (!batter) {
    return h('div', { class: 'diamond-hint', text: 'No lineup set for this game.' });
  }
  const name = playerNameOf(batter) || '—'; // overlay-aware (S1.6 prep)
  const isPlaying = playingId === batter;
  const pending = (scoringAutoPlayPending && scoringAutoPlayPending.batterId === batter) ? scoringAutoPlayPending : null;
  const pos = positionLabel(scoringState.lineup, batter);
  const alreadyFired = scoringClipFiredForBatter === batter;
  let caption;
  if (isPlaying) {
    const remaining = currentRemainingSeconds();
    caption = (remaining !== null ? formatCountdown(remaining) + ' — ' : '') + 'tap to fade out';
  } else if (pending) {
    const remainingS = Math.max(0, Math.ceil((pending.fireAtMs - Date.now()) / 1000));
    caption = 'plays in ' + remainingS + 's — tap to play now';
  } else {
    caption = alreadyFired ? 'tap to replay' : 'tap anywhere to play';
  }
  const captionEl = h('div', { class: 'nowup-caption', text: caption });
  // Own line underneath the playback metadata, not prefixed onto it
  // (Jason, live feedback, 2026-07-07).
  const positionEl = pos ? h('div', { class: 'nowup-position', text: pos.position + ' of ' + pos.total }) : null;
  // Icon slot is always present, at a fixed height, holding EITHER the play
  // triangle or the stop square -- never both, never neither -- so the
  // card's total height never jumps between idle/playing (Jason, live
  // feedback, 2026-07-07: the old inline "▶" glyph vs. block stop-icon
  // caused visible vertical movement between states).
  const icon = h('div', { class: 'nowup-icon-slot' }, [
    isPlaying ? h('div', { class: 'nowup-stop-icon' }) : h('div', { class: 'nowup-play-icon' }),
  ]);
  const card = h('button', {
    class: 'nowup-card game-nowup-card compact' + (isPlaying ? ' playing' : ''),
    onclick: () => {
      if (isPlaying) {
        if (Date.now() - playStartedAtMs < STOP_TAP_GRACE_MS) return; // double-tap guard, same as everywhere else
        stopCurrent(true);
      } else {
        if (pending) { clearTimeout(pending.timeoutHandle); scoringAutoPlayPending = null; } // manual override cancels the wait
        playClip(batter); // synchronous ctx check/rebuild already lives inside playClip
        scoringClipFiredForBatter = batter;
      }
    },
  }, [
    h('div', { class: 'nowup-label', text: 'Now up' }),
    h('div', { class: 'nowup-name', text: name.toUpperCase() }),
    icon,
    captionEl,
    positionEl,
  ]);
  if (isPlaying) {
    liveCountdownUpdate = () => {
      const rr = currentRemainingSeconds();
      if (rr !== null) captionEl.textContent = formatCountdown(rr) + ' — tap to fade out';
    };
  } else if (pending) {
    liveCountdownUpdate = () => {
      const remS = Math.max(0, Math.ceil((pending.fireAtMs - Date.now()) / 1000));
      captionEl.textContent = 'plays in ' + remS + 's — tap to play now';
    };
  }
  return card;
}

const RESULT_BUTTONS = [
  { result: '1B', label: '1B', span: 3 },
  { result: '2B', label: '2B', span: 3 },
  { result: '3B', label: '3B', span: 3 },
  { result: 'HR', label: 'HR', span: 3 },
  { result: 'FLY', label: 'FLY', sub: 'out', span: 4 },
  { result: 'GND', label: 'GROUND', sub: 'out', span: 4 }, // label only (2026-07-11, Jason) -- event code stays GND everywhere
  { result: 'K', label: 'K', sub: 'strikeout', span: 4 },
  { result: 'MISSED', label: 'MISSED', sub: 'kicked, unknown result', span: 6, dashed: true },
  { result: 'SKIP', label: 'SKIP ⏭', sub: "didn't kick", span: 6, dashed: true },
];

function renderResultPad() {
  const pad = h('div', { class: 'result-pad' });
  RESULT_BUTTONS.forEach(btn => {
    const bases = HIT_BASES[btn.result] || 0; // baseline indicator (2026-07-11)
    const cls = 'result-tile span' + btn.span + (btn.dashed ? ' dashed' : '') + (bases ? ' hit' : '');
    pad.appendChild(h('button', { class: cls, onclick: () => logScoringResult(btn.result) }, [
      bases ? h('span', { class: 'tile-dia dia-' + bases }) : null,
      h('span', { class: 'tile-lb', text: btn.label }),
      btn.sub ? h('div', { class: 'sub', text: btn.sub }) : null,
    ]));
  });
  return pad;
}

// Result tap: append the pa event, re-derive, then arm the next kicker's
// clip after autoPlayDelayMs. The ctx readiness check/rebuild MUST happen
// synchronously here, in the gesture -- the actual playClip() call fires
// later from a setTimeout, which is not a gesture, and a not-yet-unlocked
// AudioContext can only be unlocked from inside one (invariant 1 family).
function logScoringResult(result) {
  const now = Date.now();
  if (now - lastResultTapMs < RESULT_TAP_GRACE_MS) return; // guard against a fat-fingered double log
  lastResultTapMs = now;
  const batter = scoringState.lineup[scoringState.lineupPointer];
  if (!batter) return;
  if (ctx.state !== 'running') rebuildAudioContext(ctx.state + ' at scoring result tap');
  scoringEvents = appendScoringEvent(scoringEvents, 'pa', {
    playerId: batter, result: result, inning: scoringState.inning, half: scoringState.half,
  });
  scoringState = deriveState(scoringEvents);
  scoringClipFiredForBatter = null; // fresh turn for whoever's up now
  scheduleScoringAutoPlay();
  render();
}

// Arms the next kicker's clip after autoPlayDelayMs -- visibly: the NOW UP
// card shows a live "plays in Ns" countdown (Jason, live feedback,
// 2026-07-07) and a tap on the card at any point during the wait cancels
// the timer and plays immediately instead (manual override, same tap
// target as "tap to replay").
function scheduleScoringAutoPlay() {
  if (scoringAutoPlayPending) { clearTimeout(scoringAutoPlayPending.timeoutHandle); scoringAutoPlayPending = null; }
  if (scoringState.half !== 'us') return; // this PA was the 3rd out -- nobody's kicking
  const nextBatter = scoringState.lineup[scoringState.lineupPointer];
  if (!nextBatter) return;
  const delayMs = DATA.autoPlayDelayMs || 2000; // fallback matches build.py's injected default; build.py always supplies the key
  const handle = setTimeout(() => {
    scoringAutoPlayPending = null;
    // Re-validate against LIVE state rather than "did any event happen at
    // all" (2026-07-13, Jason: routine baserunner corrections mid-countdown
    // were killing the next batter's music every time, requiring a manual
    // restart -- but baserunner edits are routine and shouldn't touch
    // playback). A correction that doesn't move the lineup pointer or flip
    // the half -- the common case, a runner set/out/scored correction --
    // now lets this fire exactly as scheduled. One that DOES change who's
    // up next (a 3rd-out flip mid-countdown, a fix-last amend/undo that
    // rewinds the pointer) is still caught here, because nextBatter no
    // longer matches -- same wrong-fire guarantee as before, just scoped to
    // what actually invalidates the clip instead of treating every event
    // as suspect.
    if (scoringState.half !== 'us' || scoringState.lineup[scoringState.lineupPointer] !== nextBatter) return;
    playClip(nextBatter);
    scoringClipFiredForBatter = nextBatter;
    render();
  }, delayMs);
  scoringAutoPlayPending = { batterId: nextBatter, fireAtMs: Date.now() + delayMs, timeoutHandle: handle };
}

// +OUT: the entire defensive half is outs + runs, never opponent PAs
// (architecture doc). Unlike a mid-inning PA-to-PA transition, the 3rd out
// does NOT auto-play the next half's leadoff batter -- teams need real
// time to physically swap sides (Jason, live feedback, 2026-07-07); the
// NOW UP card just returns to its plain idle state, requiring a manual tap
// once the kicking team is actually back up.
function logOppOut() {
  scoringEvents = appendScoringEvent(scoringEvents, 'opp_out', { inning: scoringState.inning });
  scoringState = deriveState(scoringEvents);
  scoringClipFiredForBatter = null;
  render();
}

function adjustOppRuns(delta) {
  if (delta < 0 && scoringState.thisHalfRunsThem <= 0) return; // stepper floor, same precedent as the disabled clear button
  scoringEvents = appendScoringEvent(scoringEvents, 'opp_run', { inning: scoringState.inning, delta: delta });
  scoringState = deriveState(scoringEvents);
  render();
}

function renderOffenseBody() {
  const wrap = h('div', {});
  const c = scoringCorrection;
  // Fix-last / undo-last (S1.5) replace the ENTIRE offense body -- their
  // own diamond + banner + (for fix-last) the re-targeted result pad, no
  // duplicate NOW UP card or live result pad underneath (mockup 4 has
  // neither). The runner sheet, by contrast, keeps the rest of the screen
  // visible-but-dimmed beneath it (mockup 3).
  if (c && (c.mode === 'fixLast' || c.mode === 'undoLast' || c.mode === 'adjust')) {
    wrap.appendChild(renderCorrectionSheet());
    return wrap;
  }
  if (c && (c.mode === 'runner' || c.mode === 'scoredRunner')) {
    wrap.appendChild(renderCorrectionSheet());
  } else {
    // Diamond + on-base hint underneath (left side), last-action chip
    // beside it (Jason, live feedback, 2026-07-07). Tappable whenever
    // scoring is live -- S1.5's runner-tap correction sheet.
    const diamondCol = h('div', { class: 'diamond-col' }, [renderDiamond({ tappable: isScoringLive() }), renderOnBaseHint()]);
    wrap.appendChild(h('div', { class: 'diamond-row' }, [diamondCol, renderDiamondInfoColumn()]));
  }
  // Everything below the diamond row goes visible-but-inert while the
  // runner sheet is open (mockup 3's dim treatment) via a single
  // pointer-events:none wrapper, rather than threading a "disabled" flag
  // through every child renderer.
  const lower = h('div', { class: c ? 'scoring-dimmed' : '' });
  lower.appendChild(renderScoringNowUpCard());
  // Mercy banner, offense side (Jason, live feedback, round 6 -- reverses
  // the earlier offense-excluded decision below). Sits under the NOW UP
  // card, same as defense's placement relative to its own outs widget.
  // Suppressed while a correction sheet is open -- one modal-ish surface
  // at a time.
  if (!c) {
    const offenseMercyBanner = renderMercyBanner();
    if (offenseMercyBanner) lower.appendChild(offenseMercyBanner);
  }
  lower.appendChild(renderResultPad());
  const batter = scoringState.lineup[scoringState.lineupPointer];
  const deckIds = onDeckIds(scoringState.lineup, batter, 3);
  if (deckIds.length > 0) {
    const names = deckIds.map(id => playerNameOf(id)).join(' · '); // overlay-aware (S1.6 prep)
    lower.appendChild(h('div', { class: 'scoring-ondeck' }, [
      h('span', { class: 'scoring-ondeck-label', text: 'ON DECK' }),
      h('span', { class: 'scoring-ondeck-names', text: names.toUpperCase() }),
    ]));
  }
  wrap.appendChild(lower);
  wrap.appendChild(h('div', { class: 'runs-this-inning', text: scoringState.thisHalfRunsUs + ' run' + (scoringState.thisHalfRunsUs === 1 ? '' : 's') + ' this inning' }));
  return wrap;
}

// 8-run mercy limit per inning (except the final inning) -- Jason, live
// feedback: this is a CHOICE prompt, not an automatic cutoff (kickball
// leagues vary on whether to enforce it every time). "End half-inning"
// reuses the adjust-outs-to-3 path, which now carries the same flip
// consequence as reaching 3 outs any other way. "Keep playing" just
// dismisses the banner for the rest of this half (tracked by inning+half
// so it reappears next time it's relevant).
//
// Round 6 (Jason, live feedback, 2026-07-07): applies to EITHER half now,
// not just defense -- originally offense was excluded on the theory that
// ending your own half wasn't a decision the batting team's operator
// needed to drive, but Jason reversed that call live. `runsThisHalf`
// picks the side-appropriate run count; everything else (dismissal
// tracking, the End/Keep actions) is already half-agnostic.
const MERCY_RUN_LIMIT = 8;
let mercyDismissedForHalf = null; // `${inning}-${half}` key

function renderMercyBanner() {
  const isUs = scoringState.half === 'us';
  const isFinalInning = scoringState.inning >= scoringState.innings;
  const runsThisHalf = isUs ? scoringState.thisHalfRunsUs : scoringState.thisHalfRunsThem;
  const halfKey = scoringState.inning + '-' + scoringState.half;
  if (isFinalInning || runsThisHalf < MERCY_RUN_LIMIT || mercyDismissedForHalf === halfKey) return null;
  return h('div', { class: 'mercy-banner' }, [
    h('div', { class: 'mercy-text', text: MERCY_RUN_LIMIT + '-run mercy limit reached this inning' }),
    h('div', { class: 'mercy-actions' }, [
      h('button', { class: 'mercy-btn', text: 'End half-inning', onclick: () => {
        scoringEvents = appendScoringEvent(scoringEvents, 'adjust', { field: 'outs', value: 3 });
        scoringState = deriveState(scoringEvents);
        mercyDismissedForHalf = null;
        musicPausedForMercyHalf = null;
        scoringClipFiredForBatter = null; // manual tap required once teams have swapped -- same as a real 3rd out
        render();
      } }),
      h('button', { class: 'mercy-btn dashed', text: 'Keep playing', onclick: () => {
        mercyDismissedForHalf = halfKey;
        // Resume music that the mercy pause interrupted (offense only --
        // see checkMercyMusicPause), same as any other "operator confirms,
        // play resumes" moment.
        if (isUs && musicPausedForMercyHalf === halfKey) {
          musicPausedForMercyHalf = null;
          scoringClipFiredForBatter = null;
          scheduleScoringAutoPlay();
        }
        render();
      } }),
    ]),
  ]);
}

// Mercy-triggered music pause (Jason, live feedback, round 6): once the
// mercy banner is showing on OUR half, any in-flight walk-up music (a
// clip currently playing, or a pending auto-play countdown) pauses the
// same way a real half-break already does -- "Keep playing" resumes it
// (see renderMercyBanner's Keep-playing handler). Guarded by halfKey so
// this only fires once per half, not on every re-render while the banner
// stays visible (render() runs on every tick while a countdown is live).
let musicPausedForMercyHalf = null;
function checkMercyMusicPause() {
  const isUs = scoringState.half === 'us';
  const isFinalInning = scoringState.inning >= scoringState.innings;
  const runsThisHalf = isUs ? scoringState.thisHalfRunsUs : scoringState.thisHalfRunsThem;
  const halfKey = scoringState.inning + '-' + scoringState.half;
  const showing = isUs && !isFinalInning && runsThisHalf >= MERCY_RUN_LIMIT && mercyDismissedForHalf !== halfKey;
  if (showing && musicPausedForMercyHalf !== halfKey) {
    musicPausedForMercyHalf = halfKey;
    if (scoringAutoPlayPending) { clearTimeout(scoringAutoPlayPending.timeoutHandle); scoringAutoPlayPending = null; }
    if (currentSource) stopCurrent(true);
  }
}

function renderDefenseBody() {
  const wrap = h('div', {});
  const oppName = scoringState.opponent || 'They';
  wrap.appendChild(h('div', { class: 'defense-chip' }, [
    h('div', { class: 'defense-label', text: (oppName + ' are kicking').toUpperCase() }),
    h('div', { class: 'defense-sub', text: 'walk-up music resumes next half' }),
  ]));
  const filledOuts = Math.max(0, Math.min(3, scoringState.outs));
  wrap.appendChild(h('button', { class: 'out-button', onclick: logOppOut }, [
    h('div', { class: 'out-label', text: '+ OUT' }),
    h('div', { class: 'out-dots' }, [
      h('span', { class: 'outs-dot', text: '●'.repeat(filledOuts) }),
      h('span', { class: 'outs-dot empty', text: '●'.repeat(3 - filledOuts) }),
    ]),
    h('div', { class: 'out-sub', text: 'third out flips the half' }),
  ]));
  // Round 6 (Jason, live feedback): moved below the outs indicator and
  // above the runs box (was above the outs indicator before).
  const mercyBanner = renderMercyBanner();
  if (mercyBanner) wrap.appendChild(mercyBanner);
  wrap.appendChild(h('div', { class: 'runs-stepper' }, [
    h('button', { text: '−', disabled: scoringState.thisHalfRunsThem <= 0, onclick: () => adjustOppRuns(-1) }),
    h('div', { class: 'runs-stepper-count' }, [
      h('div', { class: 'hdr', text: 'RUNS' }),
      h('div', { class: 'num', text: String(scoringState.thisHalfRunsThem) }),
      h('div', { class: 'lbl', text: 'their runs, this inning' }),
    ]),
    h('button', { text: '+', onclick: () => adjustOppRuns(1) }),
  ]));
  const lineup = scoringState.lineup;
  const ptr = scoringState.lineupPointer;
  const nextThreeIds = lineup.length ? [0, 1, 2].map(k => lineup[(ptr + k) % lineup.length]) : [];
  const nextThreeNames = nextThreeIds.map(id => playerNameOf(id) || '—'); // overlay-aware (S1.6 prep)
  const leadoffKids = [h('div', { class: 'leadoff-label', text: 'NEXT UP' }), h('div', { class: 'leadoff-name', text: (nextThreeNames[0] || '—').toUpperCase() })];
  if (nextThreeNames.length > 1) {
    leadoffKids.push(h('div', { class: 'leadoff-preview-rest', text: nextThreeNames.slice(1).join(' · ').toUpperCase() }));
  }
  wrap.appendChild(h('div', { class: 'leadoff-preview-big' }, leadoffKids));
  return wrap;
}

/* ---- Live snake scorecard (first pass, 2026-07-08 round 5) ----
   The box-score chip opens this as a takeover panel over the game body
   (score bug stays, same pattern as the correction sheets). It's a pure
   replay renderer: one <canvas> drawn fresh from scoringState on every
   render, so corrections/undo/amend re-derive the card for free. This
   SAME renderer is S3's share artifact later (canvas.toBlob) -- one
   renderer, two consumers (design agreed with Jason, 2026-07-08; mockup
   screen 6 is the visual north star; this pass is a functional draft for
   iteration, not yet pixel-matched to the mockup).
   Iteration 2 (Jason's first-look feedback, same day): true staircase
   columns for bat-arounds (scorecardColumns -- one column per
   (inning, pass), later innings pushed right); edge fills track the
   kicker's live base via record.reachedBase (forces, pushes, manual sets,
   walk-backs); third-out triangle in the LOWER-right corner; canvas
   width fills the panel (dynamic cell width, floor 26px, then the
   horizontal scroll takes over).
   Remaining draft simplifications:
   - no legend, no MISSED-dagger on totals;
   - colors hardcoded to the app palette (canvas can't read CSS vars). */
let scoringBoxScoreOpen = false;

const SCORECARD_C = {
  bg: '#101215', tile: '#1d2126', border: '#33383e', rule: '#2c3036',
  text: '#e8eae6', muted: '#8f948f', pickle: '#82A167', badge: '#2C2E20',
  plum: '#CBA9DD',
};

function toggleBoxScore() {
  scoringBoxScoreOpen = !scoringBoxScoreOpen;
  if (scoringBoxScoreOpen) scoringCorrection = null; // one takeover surface at a time
  render();
}

// Staircase columns (iteration 2, Jason: "move into a new column and push
// later innings over" on a bat-around): a column is an (inning, pass)
// pair -- the Nth time the order wraps within one inning opens a fresh
// column for it, exactly like a hand-kept card. Chronological paLog
// iteration keeps columns in true game order; innings not yet played get
// one empty column each.
function scorecardColumns() {
  const cols = [];
  const colIdxByKey = {};
  const passCount = {};
  const cellMap = {}; // playerId + '|' + colIdx -> record
  scoringState.paLog.forEach(rec => {
    const pk = rec.playerId + '|' + rec.inning;
    const pass = passCount[pk] || 0;
    passCount[pk] = pass + 1;
    const key = rec.inning + '|' + pass;
    if (!(key in colIdxByKey)) { colIdxByKey[key] = cols.length; cols.push({ inning: rec.inning, pass: pass }); }
    cellMap[rec.playerId + '|' + colIdxByKey[key]] = rec;
  });
  // Only pad out through the CURRENT inning, not manifest.scoring's
  // inningsPerGame (2026-07-13, Jason): the game runs on a 50-minute timer,
  // not a fixed inning count, so a fresh game showing 6 empty future
  // innings was never meaningful -- it just varies game to game and isn't
  // knowable in advance. The current in-progress inning still gets a
  // (possibly empty) column so it's visible before its first at-bat.
  const maxInning = scoringState.inning;
  for (let i = 1; i <= maxInning; i++) {
    if (!cols.some(c => c.inning === i)) cols.push({ inning: i, pass: 0 });
  }
  return { cols: cols, cellMap: cellMap };
}

// Geometry shared by the layout and the draw call. Sized to FILL the
// panel (iteration 2 -- the fixed-width draft left dead space on the
// right): cell width is derived from the real on-screen width, clamped;
// a bat-around's extra columns shrink cells toward the floor first, then
// the horizontal scroll takes over.
// Row height bumped 34 -> 46, and cell width fixed at 42 instead of
// shrinking to fit the viewport (Jason, 2026-07-12 preview review: "bigger
// vertically, fine to scroll horizontally for later innings"). Everything
// the draw call sizes off a row -- diamond radius, glyph offsets, font
// sizes -- is derived from ROW_SCALE below rather than re-tuned by hand, so
// the two stay coupled the same way --scoring-ref-h/caption-anchor do
// elsewhere in this file. cellW no longer reads `avail`/nCols at all: a
// short game (few columns) just draws narrower than the panel with empty
// margin to spare; a long one (bat-arounds) grows past the viewport and
// the panel's existing .boxscore-scroll (overflow-x:auto) takes over --
// exactly the tradeoff asked for, replacing the old shrink-to-fit floor/
// ceiling clamp.
const ROW_H_BASE = 34, ROW_H = 46;
const ROW_SCALE = ROW_H / ROW_H_BASE;
const CELL_W = 42;
// Split into two canvases (2026-07-13, Jason: "AB/H/R/RBI fixed to the
// right, innings scrolling beneath it"): a canvas can't be part-sticky --
// it's one bitmap -- so the grid (name + per-inning cells) and the totals
// column are now two separate <canvas> elements that share this same row
// geometry (headH/lineH/rowH/pad) so their rows line up pixel-for-pixel
// side by side. renderBoxScoreBody positions the totals canvas with CSS
// (position:absolute, right:0) over a position:relative wrapper so it
// visually stays put while .boxscore-scroll's grid canvas scrolls under it.
function scorecardLayout() {
  const colInfo = scorecardColumns();
  const lineup = scoringState.lineup;
  const pad = 8, nameW = 68, totW = 84, rowH = ROW_H, headH = 16, lineH = 44;
  const nCols = Math.max(colInfo.cols.length, 1);
  const cellW = CELL_W;
  return {
    cols: colInfo.cols, cellMap: colInfo.cellMap,
    innings: scoringState.inning, // only innings actually played -- see scorecardColumns
    lineup: lineup, pad: pad, nameW: nameW, totW: totW,
    cellW: cellW, rowH: rowH, headH: headH, lineH: lineH,
    w: pad * 2 + nameW + cellW * nCols, // grid canvas: name + inning cells only, no totals
    totalsW: pad + totW, // totals canvas: its own small sticky panel
    h: pad * 2 + lineH + headH + rowH * lineup.length,
  };
}

// Maps a base index (1=1st, 2=2nd, 3=3rd) to the same 4 points
// drawMiniDiamond uses, so a basepath-out X can be centered on the actual
// base a runner was erased at (2026-07-13, Jason: previously every
// kickerOut X landed dead-center on the diamond regardless of which base
// it happened at). 0 or an unset base falls back to home -- the
// out-at-home correction path doesn't set reachedBase to anything
// base-shaped, so home is the honest fallback rather than the diamond
// center.
function diamondBasePoint(cx, cy, r, base) {
  if (base === 1) return [cx + r, cy];
  if (base === 2) return [cx, cy - r];
  if (base === 3) return [cx - r, cy];
  return [cx, cy + r];
}

// 4-edge mini diamond centered on (cx, cy): edge i is drawn in `col`
// when its base was reached. 0 = lower-right (1st), 1 = upper-right
// (2nd), 2 = upper-left (3rd), 3 = lower-left (home).
function drawMiniDiamond(g, cx, cy, r, reached, scored) {
  const pts = [
    [cx, cy + r], [cx + r, cy], [cx, cy - r], [cx - r, cy], [cx, cy + r],
  ]; // bottom -> right -> top -> left -> bottom
  if (scored) {
    g.beginPath();
    g.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < 4; i++) g.lineTo(pts[i][0], pts[i][1]);
    g.closePath();
    g.fillStyle = SCORECARD_C.pickle;
    g.fill();
    return;
  }
  for (let i = 0; i < 4; i++) {
    g.beginPath();
    g.moveTo(pts[i][0], pts[i][1]);
    g.lineTo(pts[i + 1][0], pts[i + 1][1]);
    g.strokeStyle = (i < reached) ? SCORECARD_C.pickle : SCORECARD_C.border;
    g.lineWidth = (i < reached) ? 2 : 1;
    g.stroke();
  }
}

function drawScorecard(canvas) {
  if (!canvas.getContext) return; // DOM-stub harness: layout only, no drawing
  const L = scorecardLayout();
  const g = canvas.getContext('2d');
  const dpr = 2;
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
  g.clearRect(0, 0, L.w, L.h);
  const font = "-apple-system, 'Segoe UI', system-ui, sans-serif";
  const st = scoringState;
  // Scales every per-row pixel constant below (diamond radius, glyph
  // offsets, cell-content font sizes) by ROW_SCALE, so the bigger rows
  // (2026-07-12) get proportionally bigger contents instead of the same
  // small marks floating in more empty space.
  const px = (n) => Math.round(n * ROW_SCALE);

  // ---- line score ("the box score above the scorecard" -- 2026-07-13,
  // Jason: bumped a couple px across the board for legibility) ----
  const lsCell = Math.min(24, (L.w - L.pad * 2 - 60 - 24) / L.innings);
  const lsX = L.pad + 60, lsY = L.pad;
  g.textAlign = 'left'; g.textBaseline = 'middle';
  g.font = '600 12px ' + font;
  g.fillStyle = SCORECARD_C.pickle;
  g.fillText(teamAbbrev(), L.pad, lsY + 18);
  g.fillStyle = SCORECARD_C.muted;
  g.fillText((st.opponent || 'THEM').slice(0, 6).toUpperCase(), L.pad, lsY + 32);
  g.textAlign = 'center';
  for (let i = 1; i <= L.innings; i++) {
    const x = lsX + (i - 0.5) * lsCell;
    g.fillStyle = SCORECARD_C.muted;
    g.font = '600 9px ' + font;
    g.fillText(String(i), x, lsY + 5);
    const usPlayed = i < st.inning || (i === st.inning);
    const themPlayed = i < st.inning || (i === st.inning && st.half === 'them');
    g.font = '600 12px ' + font;
    g.fillStyle = SCORECARD_C.text;
    g.fillText(usPlayed ? String(st.runsByInning.us[i] || 0) : '·', x, lsY + 18);
    g.fillStyle = SCORECARD_C.muted;
    g.fillText(themPlayed ? String(st.runsByInning.them[i] || 0) : '·', x, lsY + 32);
  }
  const rX = lsX + L.innings * lsCell + 12;
  g.font = '700 12px ' + font;
  g.fillStyle = SCORECARD_C.muted;
  g.fillText('R', rX, lsY + 5);
  g.fillStyle = SCORECARD_C.text;
  g.fillText(String(st.scoreUs), rX, lsY + 18);
  g.fillStyle = SCORECARD_C.muted;
  g.fillText(String(st.scoreThem), rX, lsY + 32);
  g.strokeStyle = SCORECARD_C.rule;
  g.lineWidth = 1;
  g.beginPath(); g.moveTo(L.pad, lsY + L.lineH - 4); g.lineTo(L.w - L.pad, lsY + L.lineH - 4); g.stroke();

  // ---- column headers (staircase: one per (inning, pass)) ----
  const nCols = L.cols.length;
  const gridX = L.pad + L.nameW, gridY = L.pad + L.lineH + L.headH;
  g.font = '500 ' + px(8) + 'px ' + font;
  for (let c = 0; c < nCols; c++) {
    // Continuation columns of a bat-around repeat the inning number,
    // dimmer, so the pair reads as one inning spanning two columns.
    g.fillStyle = L.cols[c].pass > 0 ? SCORECARD_C.border : SCORECARD_C.muted;
    g.fillText(String(L.cols[c].inning), gridX + (c + 0.5) * L.cellW, gridY - px(6));
  }

  // ---- player rows ----
  L.lineup.forEach((pid, row) => {
    const y = gridY + row * L.rowH;
    const cy = y + L.rowH / 2;
    g.textAlign = 'left';
    g.font = '500 ' + px(9) + 'px ' + font;
    g.fillStyle = (pid === st.lineup[st.lineupPointer] && st.half === 'us') ? SCORECARD_C.pickle : SCORECARD_C.text;
    g.fillText(playerNameOf(pid).slice(0, 8), L.pad, cy);
    g.textAlign = 'center';
    for (let c = 0; c < nCols; c++) {
      const rec = L.cellMap[pid + '|' + c];
      const cx = gridX + (c + 0.5) * L.cellW;
      g.strokeStyle = SCORECARD_C.rule;
      g.lineWidth = 0.5;
      g.strokeRect(gridX + c * L.cellW, y, L.cellW, L.rowH);
      if (!rec) continue;
      if (rec.result === 'MISSED') {
        g.font = '600 ' + px(12) + 'px ' + font;
        g.fillStyle = SCORECARD_C.muted;
        g.fillText('?', cx, cy);
      } else if (HIT_BASES[rec.result]) {
        // Edge fills follow the kicker's CURRENT base (reachedBase --
        // forces, pushes and corrections included), solid when they scored.
        drawMiniDiamond(g, cx, cy - px(4), px(7), rec.kickerScored ? 4 : (rec.reachedBase || HIT_BASES[rec.result]), rec.kickerScored);
        g.font = '500 ' + px(7) + 'px ' + font;
        g.fillStyle = SCORECARD_C.pickle;
        g.fillText(rec.result, cx, y + L.rowH - px(6));
        if (rec.kickerOut) {
          // Erased on the bases -- hit edges stand, plum ✕ on top, centered
          // on the ACTUAL base (2026-07-13, Jason), not the diamond middle.
          const dcx = cx, dcy = cy - px(4), r = px(7);
          const bp = diamondBasePoint(dcx, dcy, r, rec.reachedBase);
          g.font = '600 ' + px(11) + 'px ' + font;
          g.fillStyle = SCORECARD_C.plum;
          g.fillText('✕', bp[0], bp[1]);
        }
      } else { // FLY / GND / K
        // 2026-07-13, Jason (round 2): the X stays plum -- matches the
        // treatment of a basepath out, an out is an out -- but the result
        // LABEL (FLY/GND/K) is back to muted grey like every other cell
        // label. Plum on the label too made the whole card read as too
        // plum.
        drawMiniDiamond(g, cx, cy - px(4), px(7), 0, false);
        g.font = '600 ' + px(11) + 'px ' + font;
        g.fillStyle = SCORECARD_C.plum;
        g.fillText('✕', cx, cy - px(4));
        g.font = '500 ' + px(7) + 'px ' + font;
        g.fillStyle = SCORECARD_C.muted;
        g.fillText(rec.result, cx, y + L.rowH - px(6));
      }
      if (rec.outNumberInHalf) {
        // Which out of the half-inning this was (2026-07-13, Jason),
        // small badge in the cell's upper-left corner -- covers a
        // FLY/GND/K result AND a basepath/home out on a hit (markKickerOut
        // stamps the same field either way), so every out reads the same.
        g.textAlign = 'left';
        g.font = '700 ' + px(7) + 'px ' + font;
        g.fillStyle = SCORECARD_C.plum;
        g.fillText(String(rec.outNumberInHalf), gridX + c * L.cellW + px(3), y + px(8));
        g.textAlign = 'center';
      }
      if (rec.endedHalf) { // third-out marker, LOWER-right corner (iteration 2)
        const x1 = gridX + (c + 1) * L.cellW, y1 = y + L.rowH;
        g.beginPath();
        g.moveTo(x1 - px(7), y1); g.lineTo(x1, y1); g.lineTo(x1, y1 - px(7));
        g.closePath();
        g.fillStyle = SCORECARD_C.plum; // 2026-07-11 (Jason): plum, not pickle -- reads as a boundary event like the basepath x, not a positive mark
        g.fill();
      }
    }
  });
}

// Sticky-right totals panel (2026-07-13, Jason: "AB/H/R/RBI fixed to the
// right, innings scrolling beneath it"). Shares scorecardLayout's row
// geometry (pad/lineH/headH/rowH) with drawScorecard so the two canvases'
// rows line up pixel-for-pixel when renderBoxScoreBody sits them side by
// side -- this one just never scrolls.
function drawScorecardTotals(canvas) {
  if (!canvas.getContext) return; // DOM-stub harness: layout only, no drawing
  const L = scorecardLayout();
  const g = canvas.getContext('2d');
  const dpr = 2;
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
  g.clearRect(0, 0, L.totalsW, L.h);
  const font = "-apple-system, 'Segoe UI', system-ui, sans-serif";
  const px = (n) => Math.round(n * ROW_SCALE);
  const gridY = L.pad + L.lineH + L.headH;

  // Solid fill so the grid canvas visually disappears underneath this one
  // when scrolled, rather than showing through at the seam.
  g.fillStyle = SCORECARD_C.bg;
  g.fillRect(0, 0, L.totalsW, L.h);
  g.strokeStyle = SCORECARD_C.rule;
  g.lineWidth = 1;
  g.beginPath(); g.moveTo(0.5, 0); g.lineTo(0.5, L.h); g.stroke();

  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.font = '600 ' + px(8) + 'px ' + font;
  g.fillStyle = SCORECARD_C.muted;
  g.fillText('AB·H·R·RBI', L.totalsW / 2, gridY - px(6));

  const stats = computeStats(scoringState);
  L.lineup.forEach((pid, row) => {
    const y = gridY + row * L.rowH;
    const cy = y + L.rowH / 2;
    const s = stats[pid] || { ab: 0, h: 0, r: 0, rbi: 0 };
    g.font = '600 ' + px(10) + 'px ' + font;
    g.fillStyle = SCORECARD_C.text;
    g.fillText(s.ab + '·' + s.h + '·' + s.r + '·' + s.rbi, L.totalsW / 2, cy);
  });
}

function renderBoxScoreBody() {
  const L = scorecardLayout();
  const canvas = h('canvas', {
    class: 'scorecard-canvas',
    width: L.w * 2, height: L.h * 2,
    // Inline sizing is required here: the backing store is 2x the CSS
    // size for retina sharpness, and the CSS size depends on runtime
    // layout math -- the one legitimate inline-style exception in this
    // file.
    style: 'width:' + L.w + 'px;height:' + L.h + 'px',
  });
  drawScorecard(canvas);
  const totalsCanvas = h('canvas', {
    class: 'scorecard-totals-canvas',
    width: L.totalsW * 2, height: L.h * 2,
    style: 'width:' + L.totalsW + 'px;height:' + L.h + 'px',
  });
  drawScorecardTotals(totalsCanvas);
  const wrap = h('div', { class: 'boxscore-panel' }, [
    h('div', { class: 'boxscore-grid-wrap' }, [
      h('div', { class: 'boxscore-scroll' }, [canvas]),

    // natural moment to decide the game's over.
    h('button', {

function renderScoringGameScreen() {
  const wrap = h('div', {});

    renderWordmark(),

/* ============================================================
   S1.6: tap-to-draft lineup editor, Start/End game, PIN gate,
   adjust steppers (06-Scoring-Specs.md S1 item 6). Appearance ground
   truth: mockups/portal-screens.html screens 4/5/7/8.

// ---- schedule + fixture helpers (07-Portal-Architecture.md) ----
function scheduleFixtureById(id) {
  return (DATA.schedule || []).find(g => g.id === id) || null;
}
// Combines a schedule entry's date + time into a real Date for window/
// ordering math. Returns null when time is absent (TBD) -- those fixtures
// are reachable only via "change game", never auto-picked as tonight's
// default (docs/season-schedule.md convention: absent keys mean TBD).
function fixtureStartDate(g) {
  if (!g || !g.date) return null;
  const dt = new Date(g.date + 'T' + (g.time || '00:00') + ':00');
  return isNaN(dt.getTime()) ? null : dt;
}
const GAME_WINDOW_MS = 60 * 60 * 1000; // 60 min either side of start (07-Portal-Architecture.md)
// The fixture Start Game pre-picks: the one currently inside its game
// window if any, else the soonest upcoming fixture. A manifest `result`
// (game 1's pre-app final) is never a start candidate. Returns null when
// nothing qualifies -- Start Game then opens on the "unscheduled game"
// fallback, which is allowed to be ugly.
function pickDefaultScheduleGameId() {
  const now = Date.now();
  let inWindow = null, nextUpcoming = null, nextUpcomingMs = Infinity;
  (DATA.schedule || []).forEach(g => {
    if (g.result) return;
    const start = fixtureStartDate(g);
    if (!start) return;
    const ms = start.getTime();
    if (now >= ms - GAME_WINDOW_MS && now <= ms + GAME_WINDOW_MS) inWindow = g;
    if (ms > now && ms < nextUpcomingMs) { nextUpcoming = g; nextUpcomingMs = ms; }
  });
  const chosen = inWindow || nextUpcoming;
  return chosen ? chosen.id : null;
}
// Strict "is a fixture's window open RIGHT NOW" check for the portal's
// game-window prompt (screen 3) -- deliberately narrower than
// pickDefaultScheduleGameId's fallback-to-soonest-upcoming, since the
// prompt must never appear for a game that's merely coming up someday.
function scheduleGameInWindowNow() {
  const now = Date.now();
  let found = null;
  (DATA.schedule || []).forEach(g => {
    if (g.result) return;
    const start = fixtureStartDate(g);
    if (!start) return;
    const ms = start.getTime();
    if (now >= ms - GAME_WINDOW_MS && now <= ms + GAME_WINDOW_MS) found = g;
  });
  return found;
}
// First word of the opponent's name, upper-cased, for the adjust sheet's
// compact team label (mockup screen 8: "OTTER" from "Otter Nonsense").
function oppLabel() {
  const name = scoringState.opponent || 'THEM';
  return name.split(/\s+/)[0].toUpperCase();
}

// ---- runtime state (all UI-only, never persisted directly -- what's

// convention as scoringCorrection above). ----

let pinSheet = null;            // {digits:'', shake:false, onSuccess:fn}

// the schedule/lineup-editor/PIN-gate machinery above already existed to

// (a safe wrapper, declared outside these markers, near render()) and from

// ---- entry points ----
// Stopgap direct entry point (Jason, 2026-07-12): screens 4/5 are normally
// reached via the game-window prompt over the portal (07), but the portal
// and prompt are explicitly out of scope this session -- without this
// button there would be no way to actually start a scored game on the

function openStartGameFlow() {
  const proceed = () => {
    // Seeds the draft from today's classic walk-on order if one exists --
    // the most natural "who's here tonight" signal already captured by the
    // ordinary pre-game flow. Empty seed (tap-to-draft from scratch) is
    // just as valid; nothing about Start Game requires it.
    const seed = order.filter(id => playersById[id]);
    scoringLineupEditor = { mode: 'start', draft: seed, scheduleGameId: pickDefaultScheduleGameId(), unscheduledOpponent: '' };
    state.activeTab = 'lineup';
    render();

  if (pinUnlocked) proceed(); else openPinSheet(proceed);
}
function openMidGameLineupEditor() {
  scoringLineupEditor = { mode: 'edit', draft: scoringState.lineup.slice() };
  render();
}
function cancelScoringLineupEditor() {
  // Cancel beside Done (2026-07-11 polish batch): every draft edit --
  // including a mistaken clear -- is discarded, nothing committed.
  scoringLineupEditor = null;
  fixturePicker = false;
  render();
}

function openPinSheet(onSuccess) { pinSheet = { digits: '', shake: false, onSuccess: onSuccess }; render(); }
function closePinSheet() { pinSheet = null; render(); }
const PIN_LENGTH = 4;
function pinKeyTap(k) {
  if (!pinSheet) return;
  if (k === 'del') { pinSheet.digits = pinSheet.digits.slice(0, -1); render(); return; }
  if (pinSheet.digits.length >= PIN_LENGTH) return;
  pinSheet.digits += k;
  if (pinSheet.digits.length < PIN_LENGTH) { render(); return; }
  if (pinSheet.digits === String(DATA.scoring.teamPin)) {
    pinUnlocked = true;
    saveJSON('scoringPinUnlocked', true);
    const cb = pinSheet.onSuccess;
    pinSheet = null;
    if (cb) cb(); else render();
  } else {
    pinSheet.shake = true;
    render();
    // Wrong PIN shakes and clears -- no error prose (mockup screen 7 note).
    setTimeout(() => { if (pinSheet) { pinSheet.digits = ''; pinSheet.shake = false; render(); } }, 350);
  }
}

// ---- draft list mutation (all local until Done/Start commits an event) ----
function draftAppend(id) {
  if (!scoringLineupEditor || scoringLineupEditor.draft.includes(id)) return;
  scoringLineupEditor.draft.push(id);
  render();
}
function draftRemove(id) {
  if (!scoringLineupEditor) return;
  // The current kicker can't be removed mid-game, only reordered around
  // (mockup screen 5 note) -- the row itself has no ✕ for them, but guard
  // here too against a stale tap racing a half-flip.
  if (scoringLineupEditor.mode === 'edit' && isScoringLive() && scoringState.lineup[scoringState.lineupPointer] === id) return;
  scoringLineupEditor.draft = scoringLineupEditor.draft.filter(x => x !== id);
  render();
}
// Everyone not already drafted: real roster + mid-game subs added via
// player_add (rosterOverlay), sorted the same way the classic bench is.
function draftRosterPool() {
  const inDraft = new Set(scoringLineupEditor.draft);
  const real = DATA.players.filter(p => !inDraft.has(p.id)).map(p => ({ id: p.id, name: p.name, status: p.status }));
  const overlay = (scoringState.rosterOverlay || []).filter(p => !inDraft.has(p.id));
  return real.concat(overlay).sort((a, b) => a.name.localeCompare(b.name));
}

// ---- commit actions (the only points that actually append events) ----
function commitStartGame() {
  const ed = scoringLineupEditor;
  if (!ed || ed.draft.length === 0) return;
  const fixture = scheduleFixtureById(ed.scheduleGameId);
  const payload = {
    opponent: fixture ? (fixture.opponent || 'TBD') : (ed.unscheduledOpponent.trim() || 'Unscheduled Game'),
    lineup: ed.draft.slice(),
    innings: DATA.scoring.inningsPerGame || 7,
  };
  if (fixture) payload.scheduleGameId = fixture.id;
  scoringEvents = appendScoringEvent(scoringEvents, 'game_start', payload);
  scoringState = deriveState(scoringEvents);
  scoringLineupEditor = null;
  scoringClipFiredForBatter = null;
  state.activeTab = 'lineup';
  render();
}
function commitLineupEdit() {
  if (!scoringLineupEditor) return;
  scoringEvents = appendScoringEvent(scoringEvents, 'lineup_set', { lineup: scoringLineupEditor.draft.slice() });
  scoringState = deriveState(scoringEvents);
  scoringLineupEditor = null;
  render();
}
function openEndGameConfirm() { endGameConfirmOpen = true; render(); }
function closeEndGameConfirm() { endGameConfirmOpen = false; render(); }
function commitEndGame() {
  scoringEvents = appendScoringEvent(scoringEvents, 'game_end', { final_us: scoringState.scoreUs, final_them: scoringState.scoreThem });
  scoringState = deriveState(scoringEvents);
  endGameConfirmOpen = false;
  scoringLineupEditor = null;
  cancelPendingAutoplay();
  scoringClipFiredForBatter = null;
  render();
}

function openAddPlayerSheet() { addPlayerSheet = { name: '', status: 'member', clipIndex: 0 }; render(); }
function closeAddPlayerSheet() { addPlayerSheet = null; render(); }
function commitAddPlayer() {
  const s = addPlayerSheet;
  const name = (s.name || '').trim();
  if (!s || !name) return;
  const id = 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
  const clip = (DATA.defaultClips || [])[s.clipIndex] || null;
  scoringEvents = appendScoringEvent(scoringEvents, 'player_add', {
    playerId: id, name: name, status: s.status, defaultClip: clip ? clip.id : null,
  });
  scoringState = deriveState(scoringEvents);
  addPlayerSheet = null;
  // New player lands straight in the order (07's open question, resolved
  // by this sheet's own copy -- "add to order"; flip on preview if it
  // feels wrong per that doc's note).
  if (scoringLineupEditor) draftAppend(id);

// ---- adjust sheet (score-bug tap) ----
function openAdjustSheet() {
  if (scoringCorrection || scoringBoxScoreOpen || !isScoringLive() || scoringState.half !== 'us') return;
  scoringCorrection = {
    mode: 'adjust',
    draft: {
      outs: scoringState.outs, inning: scoringState.inning, half: scoringState.half,
      scoreUs: scoringState.scoreUs, scoreThem: scoringState.scoreThem,
    },
  };
  render();
}
function adjustStep(field, delta) {
  const c = scoringCorrection;
  if (!c || c.mode !== 'adjust') return;
  const d = c.draft;
  if (field === 'outs') {
    d.outs = Math.max(0, Math.min(2, d.outs + delta)); // a third out is a real event, not an adjustment
  } else if (field === 'scoreUs') {
    d.scoreUs = Math.max(0, d.scoreUs + delta);
  } else if (field === 'scoreThem') {
    d.scoreThem = Math.max(0, d.scoreThem + delta);
  } else if (field === 'inning') {
    // Walks halves (mockup screen 8: ▲3 -> ▼3 -> ▲4): us->them stays the
    // same inning number; them->us increments it.
    if (delta > 0) {
      if (d.half === 'us') d.half = 'them'; else { d.half = 'us'; d.inning += 1; }
    } else {
      if (d.half === 'them') d.half = 'us'; else { d.half = 'them'; d.inning = Math.max(1, d.inning - 1); }
    }
  }
  render();
}
// Draft semantics (Jason's revision, mockup screen 8): steppers edit a
// local draft; done commits ONE adjust event per changed field (cleaner
// log than one event per tap); cancel discards everything, even after
// changes -- closeScoringCorrection (existing) handles that path.
function commitAdjust() {
  const c = scoringCorrection;
  if (!c || c.mode !== 'adjust') return;
  const orig = scoringState, d = c.draft;
  if (d.outs !== orig.outs) scoringEvents = appendScoringEvent(scoringEvents, 'adjust', { field: 'outs', value: d.outs });
  if (d.half !== orig.half) scoringEvents = appendScoringEvent(scoringEvents, 'adjust', { field: 'half', value: d.half });
  if (d.inning !== orig.inning) scoringEvents = appendScoringEvent(scoringEvents, 'adjust', { field: 'inning', value: d.inning });
  if (d.scoreUs !== orig.scoreUs) scoringEvents = appendScoringEvent(scoringEvents, 'adjust', { field: 'score_us', value: d.scoreUs });
  if (d.scoreThem !== orig.scoreThem) scoringEvents = appendScoringEvent(scoringEvents, 'adjust', { field: 'score_them', value: d.scoreThem });
  scoringState = deriveState(scoringEvents);
  scoringCorrection = null;
  scoringClipFiredForBatter = null;
  render();
}

// ---- vertical-only drag reorder for draft rows (simplifies the drag math
// behind game-1 defect #2 -- see wireDragTile's header comment for the
// full history; this is that same document-level-listener pattern,
// restricted to Y-axis hit testing since the draft list is single-column). ----
function flipDraftRows(listEl, exceptRow, mutate) {
  const rows = Array.from(listEl.querySelectorAll('.draft-row'));
  const before = new Map();
  rows.forEach(r => before.set(r, r.getBoundingClientRect()));
  mutate();
  rows.forEach(r => {
    if (r === exceptRow) return;
    const b = before.get(r), a = r.getBoundingClientRect();
    const dy = b.top - a.top;
    if (!dy) return;
    r.style.transition = 'none';
    r.style.transform = 'translateY(' + dy + 'px)';
    if (typeof requestAnimationFrame === 'function') {
      requestAnimationFrame(() => requestAnimationFrame(() => { r.style.transition = 'transform 150ms ease'; r.style.transform = ''; }));
    } else { r.style.transition = ''; r.style.transform = ''; }
  });
}
function wireDraftRowDrag(row, id, listEl) {
  // 2026-07-14, Jason (on-device): listeners used to live on the whole row,
  // which fought native scrolling for any touch that started off the
  // handle. Scoped to the handle only -- see the CSS comment on
  // .draft-row-handle for the full story. querySelectorAll (not
  // querySelector, which the dom-stub-test.js FakeElement doesn't
  // implement) keeps this testable under the same harness as everything
  // else in this file.
  const handle = row.querySelectorAll('.draft-row-handle')[0] || row;
  // `down` guards pointermove against firing a drag start from mouse HOVER
  // alone (bug, caught by Jason on-device-in-browser 2026-07-12): a mouse
  // sends real 'pointermove' events on hover with no button pressed, unlike
  // a touchscreen (which only ever sends pointermove while a finger is in
  // contact). Without this flag, startY stayed at its initial 0 until a
  // real pointerdown ever fired on this row, so `e.clientY - startY` was
  // just "current mouse Y" -- always past DRAG_THRESHOLD_PX -- and a bare
  // hover over any row immediately spawned a ghost + placeholder state.
  // Only evaluate the movement threshold after a real pointerdown on THIS
  // row has actually happened.
  let startY = 0, dragging = false, moved = false, ghost = null, lastSwap = null, activePointer = null, down = false;
  function startGhost() {
    const rect = row.getBoundingClientRect();
    ghost = row.cloneNode(true);
    ghost.classList.add('drag-ghost');
    ghost.style.position = 'fixed'; ghost.style.left = rect.left + 'px'; ghost.style.top = rect.top + 'px';
    ghost.style.width = rect.width + 'px'; ghost.style.height = rect.height + 'px';
    ghost.style.margin = '0'; ghost.style.pointerEvents = 'none';
    document.getElementById('app').appendChild(ghost);
    row.classList.add('drag-placeholder');
  }
  function endGhost() {
    if (ghost && ghost.parentElement) ghost.parentElement.removeChild(ghost);
    ghost = null; lastSwap = null;
    row.classList.remove('drag-placeholder');
  }
  function handleMove(e) {
    if (e.preventDefault) e.preventDefault();
    const dy = e.clientY - startY;
    if (ghost) ghost.style.transform = 'translateY(' + dy + 'px)';
    const rows = Array.from(listEl.querySelectorAll('.draft-row'));
    const hoverRow = rows.find(r => {
      if (r === row) return false;
      const rc = r.getBoundingClientRect();
      return e.clientY >= rc.top && e.clientY <= rc.bottom;
    });
    if (hoverRow && hoverRow !== lastSwap) {
      lastSwap = hoverRow;
      const from = rows.indexOf(row), to = rows.indexOf(hoverRow);
      if (from !== -1 && to !== -1 && from !== to) {
        flipDraftRows(listEl, row, () => { listEl.insertBefore(row, from < to ? hoverRow.nextSibling : hoverRow); });
      }
    } else if (!hoverRow) { lastSwap = null; }
  }
  function detachDocHandlers() {
    document.removeEventListener('pointermove', onDocMove);
    document.removeEventListener('pointerup', onDocUp);
    document.removeEventListener('pointercancel', onDocCancel);
  }
  function commitFromDom() {
    const newOrder = Array.from(listEl.querySelectorAll('.draft-row')).map(r => r._playerId);
    if (scoringLineupEditor && newOrder.length === scoringLineupEditor.draft.length) scoringLineupEditor.draft = newOrder;
  }
  function finishDrag() {
    if (!dragging) return;
    dragging = false; detachDocHandlers(); endGhost();
    if (row.isConnected === false) { render(); return; }
    commitFromDom();
    render();
  }
  function cancelDrag() {
    if (!dragging) return;
    dragging = false; detachDocHandlers(); endGhost();
    render();
  }
  function onDocMove(e) { if (e.pointerId === activePointer) handleMove(e); }
  function onDocUp(e) { if (e.pointerId === activePointer) finishDrag(); }
  function onDocCancel(e) { if (e.pointerId === activePointer) cancelDrag(); }
  handle.addEventListener('pointerdown', (e) => {
    startY = e.clientY; moved = false; dragging = false; activePointer = e.pointerId; down = true;
    try { handle.setPointerCapture(e.pointerId); } catch (err) {}
  });
  handle.addEventListener('pointermove', (e) => {
    if (!down) return; // hover guard -- see the `down` comment above
    if (dragging) { if (e.preventDefault) e.preventDefault(); return; }
    if (Math.abs(e.clientY - startY) > DRAG_THRESHOLD_PX) {
      dragging = true; moved = true; startGhost();
      document.addEventListener('pointermove', onDocMove);
      document.addEventListener('pointerup', onDocUp);
      document.addEventListener('pointercancel', onDocCancel);
      handleMove(e);
    }
  });
  handle.addEventListener('pointerup', (e) => {
    down = false;
    try { handle.releasePointerCapture(e.pointerId); } catch (err) {}
    // No tap action on the handle itself beyond drag -- ✕ (its own button,
    // elsewhere in the row) handles removal; a non-drag tap is a no-op.
  });
  handle.addEventListener('pointercancel', () => { down = false; if (!dragging) render(); });
  row._playerId = id;
}

// entry if every dated fixture has already passed (shouldn't happen with
// a real schedule, but keeps the NEXT GAME card from going blank).
function nextScheduledGame() {
  const now = Date.now();
  let next = null, nextMs = Infinity;
  (DATA.schedule || []).forEach(g => {
    if (g.result) return;
    const start = fixtureStartDate(g);
    if (start && start.getTime() > now && start.getTime() < nextMs) { next = g; nextMs = start.getTime(); }
  });

function sortPlayerStatRows(pids, statsByPid, key, dir) {
